                  <span style={{color:'#C47A7A',fontWeight:600}}>{fmtD(totalLtcCost)}</span>
                  <span>inflated care cost</span>
                  <span style={{color:'#8DAFC8',margin:'0 2px'}}>+</span>
                  <span style={{color:'#C47A7A',fontWeight:600}}>{grossUpTaxTotal > 0 ? fmtD(grossUpTaxTotal) : '$0'}</span>
                  <span>gross-up tax</span>
                  <span style={{color:'#8DAFC8',margin:'0 2px'}}>+</span>
                  <span style={{color:'#C47A7A',fontWeight:600}}>{fmtD(compoundingLoss)}</span>
                  <span>compounding lost (age {ltcEnd}→{inputs.planToAge})</span>
                  <span style={{color:'#8DAFC8',margin:'0 2px'}}>=</span>
                  <span style={{color:'#4A9B7A',fontWeight:700}}>{fmtD(portfolioDiff)}</span>
                  <span style={{color:'#4A9B7A'}}>Portfolio Preserved</span>
                </div>
                {/* Return on Protection — Spouse */}
                {(() => {
                  const spouseNet = inputs.spouseLtcNetAmount || 0;
                  const spCareRows = yearsSpouseUninsured?.filter(r => r.age >= ltcAge && r.age < ltcEnd) || [];
                  const spAvgRate = spCareRows.length > 0
                    ? spCareRows.reduce((s,r) => s+(r.allInMarginalRate||r.effectiveTaxRate||0.28),0) / spCareRows.length
                    : 0.28;
                  const spGrossUp = spouseNet * spAvgRate / (1 - spAvgRate);
                  const spTrueCost = spouseNet + spGrossUp;
                  const spLeverage = portfolioDiff > 0 && spTrueCost > 0 ? portfolioDiff / spTrueCost : 0;
                  const fmtR = v => v >= 1000000 ? `$${(v/1000000).toFixed(2)}M` : `$${Math.round(v/1000)}K`;
                  return (
                    <div style={{
                      background:'linear-gradient(135deg, rgba(74,155,122,.06) 0%, rgba(200,169,110,.04) 100%)',
                      border:'1px solid rgba(74,155,122,.25)', borderRadius:12,
                      padding:'16px 20px', marginBottom:14,
                    }}>
                      <div style={{fontSize:11,fontWeight:700,letterSpacing:'.16em',textTransform:'uppercase',color:'#4A9B7A',marginBottom:12}}>
                        Return on Protection — {inputs.spouseName || 'Spouse'}
                      </div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr auto 1fr auto 1fr',alignItems:'center',gap:8,marginBottom:12}}>
                        <div style={{textAlign:'center'}}>
                          <div style={{fontSize:11,color:'#8DAFC8',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:4}}>Policy Investment</div>
                          <div style={{fontSize:26,fontWeight:700,color:'#C47A7A',fontFamily:"'Cormorant Garamond',serif"}}>{fmtR(spTrueCost)}</div>
                          <div style={{fontSize:11,color:'#6A8A9A',marginTop:3}}>{fmtR(spouseNet)} net · {fmtR(spGrossUp)} gross-up</div>
                        </div>
                        <div style={{fontSize:20,color:'#4A9B7A',fontWeight:300}}>→</div>
                        <div style={{textAlign:'center'}}>
                          <div style={{fontSize:11,color:'#8DAFC8',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:4}}>Portfolio Preserved</div>
                          <div style={{fontSize:26,fontWeight:700,color:'#4A9B7A',fontFamily:"'Cormorant Garamond',serif"}}>{fmtD(portfolioDiff)}</div>
                          <div style={{fontSize:11,color:'#6A8A9A',marginTop:3}}>care + tax + compounding protected</div>
                        </div>
                        <div style={{fontSize:20,color:'#C8A96E',fontWeight:300}}>=</div>
                        <div style={{textAlign:'center',background:'rgba(200,169,110,.08)',border:'1px solid rgba(200,169,110,.2)',borderRadius:10,padding:'10px 8px'}}>
                          <div style={{fontSize:11,color:'#C8A96E',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:4}}>Protection Leverage</div>
                          <div style={{fontSize:32,fontWeight:700,color:'#C8A96E',fontFamily:"'Cormorant Garamond',serif"}}>{spLeverage.toFixed(1)}×</div>
                          <div style={{fontSize:11,color:'#8A7A50',marginTop:3}}>return on every dollar invested</div>
                        </div>
                      </div>
                      <div style={{fontSize:12,color:'#6A8A9A',lineHeight:1.6,borderTop:'1px solid rgba(255,255,255,.06)',paddingTop:10}}>
                        Every dollar invested in the policy protects <strong style={{color:'#C8A96E'}}>{spLeverage.toFixed(1)} dollars</strong> of portfolio wealth from permanent destruction — care costs, forced tax draws, and decades of lost compounding.
                      </div>
                    </div>
                  );
                })()}
              </div>
            );
          })()}

          {/* ── Combined Healthcare Event Totals (both primary + spouse) ── */}
          {showLtcComparison && showSpouseLtcComparison && yearsInsured && yearsUninsured && yearsSpouseInsured && yearsSpouseUninsured && (() => {
            const fmtD = v => v >= 1000000 ? `$${(v/1000000).toFixed(2)}M` : `$${Math.round(v/1000)}K`;

            // Primary values — use inflated costs from projection rows
            const pLtcAge = inputs.ltcEventAge, pLtcEnd = pLtcAge + inputs.ltcDuration;
            const pTotalLtcCost = yearsUninsured.filter(r => r.age >= pLtcAge && r.age < pLtcEnd).reduce((s,r) => s+(r.ltcAnnualCost||0), 0);
            const pTodayDollar = inputs.ltcMonthlyCost * 12 * inputs.ltcDuration;
            const pCareRows = yearsUninsured.filter(r => r.age >= pLtcAge && r.age < pLtcEnd);
            const pMargRate = pCareRows.length > 0 ? pCareRows.reduce((s,r) => s+(r.allInMarginalRate||r.effectiveTaxRate||0.28),0)/pCareRows.length : 0.28;
            const pGrossUpTax = pTotalLtcCost * pMargRate / (1 - pMargRate);
            const pPortfolioDiff = (yearsInsured[yearsInsured.length-1]?.totalPortfolio||0) - (yearsUninsured[yearsUninsured.length-1]?.totalPortfolio||0);
            const pDraws = yearsUninsured.filter(r => r.age >= pLtcAge && r.age < pLtcEnd).reduce((s,r) => s+(r.ltcPortfolioDraw||0), 0);
            const pBenefit = pTotalLtcCost;

            // Spouse values
            const sLtcAge = inputs.spouseLtcEventAge, sLtcEnd = sLtcAge + inputs.spouseLtcDuration;
            const sTotalLtcCost = yearsSpouseUninsured.filter(r => r.age >= sLtcAge && r.age < sLtcEnd).reduce((s,r) => s+(r.spouseLtcAnnualCost||0), 0);
            const sTodayDollar = inputs.spouseLtcMonthlyCost * 12 * inputs.spouseLtcDuration;
            const sCareRows = yearsSpouseUninsured.filter(r => r.age >= sLtcAge && r.age < sLtcEnd);
            const sMargRate = sCareRows.length > 0 ? sCareRows.reduce((s,r) => s+(r.allInMarginalRate||r.effectiveTaxRate||0.28),0)/sCareRows.length : 0.28;
            const sGrossUpTax = sTotalLtcCost * sMargRate / (1 - sMargRate);
            const sPortfolioDiff = (yearsSpouseInsured[yearsSpouseInsured.length-1]?.totalPortfolio||0) - (yearsSpouseUninsured[yearsSpouseUninsured.length-1]?.totalPortfolio||0);
            const sDraws = yearsSpouseUninsured.filter(r => r.age >= sLtcAge && r.age < sLtcEnd).reduce((s,r) => s+(r.ltcPortfolioDraw||0), 0);
            const sBenefit = sTotalLtcCost;

            // Combined
            const totalCareCost   = pTotalLtcCost + sTotalLtcCost;
            const totalBenefit    = pBenefit + sBenefit;
            const totalDraws      = pDraws + sDraws;
            const totalGrossUpTax = pGrossUpTax + sGrossUpTax;
            const totalTrueCost   = totalCareCost + totalGrossUpTax;
            const combRet = inputs.portfolioReturn / 100;
            // Compounding lost: each event's direct costs compound forward from their mid-event age
            const pMidAge = inputs.ltcEventAge + (inputs.ltcDuration / 2);
            const sMidAge = inputs.spouseLtcEventAge + (inputs.spouseLtcDuration / 2);
            const pDirectTotal = pTotalLtcCost + pGrossUpTax;
            const sDirectTotal = sTotalLtcCost + sGrossUpTax;
            const totalCompounding = pDirectTotal * (Math.pow(1 + combRet, Math.max(0, inputs.planToAge - pMidAge)) - 1)
                                   + sDirectTotal * (Math.pow(1 + combRet, Math.max(0, inputs.planToAge - sMidAge)) - 1);
            const totalPreserved  = totalTrueCost + totalCompounding;

            // Combined policy investment (grossed up)
            const pPolicyNet = inputs.ltcNetAmount || 0;
            const sPolicyNet = inputs.spouseLtcNetAmount || 0;
            const pPolicyGrossUp = pPolicyNet * pMargRate / (1 - pMargRate);
            const sPolicyGrossUp = sPolicyNet * sMargRate / (1 - sMargRate);
            const totalPolicyInvestment = (pPolicyNet + pPolicyGrossUp) + (sPolicyNet + sPolicyGrossUp);
            const combinedLeverage = totalPreserved > 0 && totalPolicyInvestment > 0 ? totalPreserved / totalPolicyInvestment : 0;

            return (
              <div style={{background:'rgba(200,169,110,.04)',border:'1px solid rgba(200,169,110,.25)',borderRadius:12,padding:'18px 20px',marginBottom:16}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
                  <div style={{fontSize:13,fontWeight:700,letterSpacing:'.14em',textTransform:'uppercase',color:'#C8A96E'}}>
                    Combined Healthcare Impact — Both Partners
                  </div>
                  <div style={{fontSize:13,color:'#8DAFC8',background:'rgba(200,169,110,.08)',padding:'2px 8px',borderRadius:4,border:'1px solid rgba(200,169,110,.2)'}}>
                    Primary + {inputs.spouseName || 'Spouse'} · Total Portfolio Effect
                  </div>
                </div>

                {/* Hero Return on Protection */}
                <div style={{
                  background:'linear-gradient(135deg, rgba(200,169,110,.1) 0%, rgba(74,155,122,.06) 100%)',
                  border:'1px solid rgba(200,169,110,.35)', borderRadius:12,
                  padding:'20px 24px', marginBottom:14,
                  display:'grid', gridTemplateColumns:'1fr auto 1fr auto 1fr',
                  alignItems:'center', gap:12,
                }}>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:11,color:'#8DAFC8',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:6}}>Combined Policy Investment</div>
                    <div style={{fontSize:38,fontWeight:700,color:'#C47A7A',fontFamily:"'Cormorant Garamond',serif",lineHeight:1}}>{fmtD(totalPolicyInvestment)}</div>
                    <div style={{fontSize:12,color:'#6A8A9A',marginTop:6}}>
                      Primary: {fmtD(pPolicyNet + pPolicyGrossUp)} · {inputs.spouseName||'Spouse'}: {fmtD(sPolicyNet + sPolicyGrossUp)}
                    </div>
                    <div style={{fontSize:11,color:'#5A6A7A',marginTop:2}}>net premium + gross-up tax cost</div>
                  </div>
                  <div style={{fontSize:28,color:'#4A9B7A',fontWeight:300,textAlign:'center'}}>→</div>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:11,color:'#8DAFC8',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:6}}>Total Portfolio Preserved</div>
                    <div style={{fontSize:38,fontWeight:700,color:'#4A9B7A',fontFamily:"'Cormorant Garamond',serif",lineHeight:1}}>{fmtD(totalPreserved)}</div>
                    <div style={{fontSize:12,color:'#6A8A9A',marginTop:6}}>care costs + tax + lost compounding</div>
                    <div style={{fontSize:11,color:'#5A6A7A',marginTop:2}}>permanently protected from portfolio</div>
                  </div>
                  <div style={{fontSize:28,color:'#C8A96E',fontWeight:300,textAlign:'center'}}>=</div>
                  <div style={{
                    textAlign:'center',
                    background:'rgba(200,169,110,.12)', border:'2px solid rgba(200,169,110,.4)',
                    borderRadius:12, padding:'16px 12px',
                  }}>
                    <div style={{fontSize:11,color:'#C8A96E',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:6}}>Protection Leverage</div>
                    <div style={{fontSize:48,fontWeight:700,color:'#C8A96E',fontFamily:"'Cormorant Garamond',serif",lineHeight:1}}>{combinedLeverage.toFixed(1)}×</div>
                    <div style={{fontSize:12,color:'#8A7A50',marginTop:6}}>return on every dollar<br/>invested in protection</div>
                  </div>
                </div>

                <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:10,marginBottom:14}}>
                  {[
                    { label:'Total Care Costs', value: fmtD(totalCareCost), sub:`Inflated · today's dollars: ${fmtD(pTodayDollar + sTodayDollar)}`, color:'#C47A7A' },
                    { label:'Combined L2 Benefit', value: fmtD(totalBenefit), sub:'Total care cost covered by policy', color:'#4A9B7A' },
                    { label:'Gross-Up Tax Cost', value: totalGrossUpTax > 0 ? fmtD(totalGrossUpTax) : '—', sub: totalGrossUpTax > 0 ? 'Extra tax on forced IRA draws' : 'None — no forced IRA draws', color: totalGrossUpTax > 0 ? '#C47A7A' : '#4A9B7A' },
                    { label:'Compounding Lost', value: fmtD(totalCompounding), sub:`${Math.round(inputs.portfolioReturn)}% return on depleted base`, color:'#C47A7A' },
                    { label:'Total Portfolio Preserved', value: fmtD(totalPreserved), sub:'Care + tax + compounding', color: totalPreserved > 0 ? '#4A9B7A' : '#C47A7A' },
                  ].map(s => (
                    <div key={s.label} style={{background:'rgba(255,255,255,.03)',borderRadius:8,padding:'10px 12px',border:'1px solid rgba(200,169,110,.1)'}}>
                      <div style={{fontSize:12,color:'#8DAFC8',letterSpacing:'.06em',textTransform:'uppercase',marginBottom:4}}>{s.label}</div>
                      <div style={{fontSize:18,fontWeight:700,color:s.color,fontFamily:"'Cormorant Garamond',serif"}}>{s.value}</div>
                      <div style={{fontSize:12,color:'#8DAFC8',marginTop:3}}>{s.sub}</div>
                    </div>
                  ))}
                </div>
                <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',fontSize:12,color:'#8DAFC8',background:'rgba(255,255,255,.02)',borderRadius:6,padding:'7px 12px',border:'1px solid rgba(200,169,110,.1)'}}>
                  <span style={{color:'#C47A7A',fontWeight:600}}>{fmtD(totalCareCost)}</span>
                  <span>inflated care cost</span>
                  <span style={{color:'#8DAFC8',margin:'0 2px'}}>+</span>
                  <span style={{color:'#C47A7A',fontWeight:600}}>{totalGrossUpTax > 0 ? fmtD(totalGrossUpTax) : '$0'}</span>
                  <span>gross-up tax</span>
                  <span style={{color:'#8DAFC8',margin:'0 2px'}}>+</span>
                  <span style={{color:'#C47A7A',fontWeight:600}}>{fmtD(totalCompounding)}</span>
                  <span>compounding lost</span>
                  <span style={{color:'#8DAFC8',margin:'0 2px'}}>=</span>
                  <span style={{color:'#C8A96E',fontWeight:700}}>{fmtD(totalPreserved)}</span>
                  <span style={{color:'#C8A96E'}}>Combined Portfolio Preserved</span>
                </div>
              </div>
            );
          })()}

          {/* Sequence of returns stress test callout */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
            <div style={{background:'rgba(196,106,106,.05)',border:'1px solid rgba(196,106,106,.15)',borderRadius:10,padding:'14px 16px'}}>
              <div style={{fontSize:13,fontWeight:700,letterSpacing:'.14em',textTransform:'uppercase',color:'#C47A7A',marginBottom:8}}>Sequence of Returns Risk</div>
              <p style={{fontSize:14,lineHeight:1.65,color:'#DDD6C4'}}>
                A 25% market decline in year 1–3 of retirement can permanently reduce portfolio sustainability — even if long-term returns recover. An uninsured care event compounds this: drawing $90K–$120K/year from a market-exposed portfolio with no dedicated Layer 2 protection extends the damage long after care ends. The model above assumes average returns. An income floor of guaranteed sources — including the Roth Fixed Indexed Annuity with GLWB rider (Layer 1 of the IncomeArc™ system) — reduces this exposure significantly. Markets cannot disrupt it and longevity cannot exhaust it.
              </p>
            </div>
            <div style={{background:'rgba(74,155,122,.05)',border:'1px solid rgba(74,155,122,.15)',borderRadius:10,padding:'14px 16px'}}>
              <div style={{fontSize:13,fontWeight:700,letterSpacing:'.14em',textTransform:'uppercase',color:'#4A9B7A',marginBottom:8}}>Guaranteed Income Floor</div>
              <p style={{fontSize:14,lineHeight:1.65,color:'#DDD6C4'}}>
                <strong style={{color:'#4A9B7A'}}>{guaranteedPct}%</strong> of total projected retirement income (age {inputs.retireAge}–{inputs.planToAge}) comes from guaranteed sources (Social Security{inputs.pensionMonthly > 0 ? ', pension' : ''}{inputs.annuityMonthly > 0 ? ', annuity' : ''}). {guaranteedPct < 50 ? 'Increasing this floor through a Roth Fixed Indexed Annuity with GLWB rider (Layer 1) reduces sequence risk and future IRMAA exposure. The ETA structure (Layer 3) can fund the conversion by eliminating the distribution tax via bank non-recourse loan.' : 'A strong floor provides stability against market volatility. Every dollar repositioned into the Roth Annuity (Layer 1) or ETA IUL policy (Layer 3) permanently reduces the future RMD base — lowering mandatory income and IRMAA exposure year after year.'}
              </p>
            </div>
          </div>

          {/* Footer */}
          <div style={{marginTop:24,padding:'18px 20px',background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.06)',borderRadius:10}}>
            <div style={{fontSize:12,fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase',color:'#C8A96E',marginBottom:8}}>
              Proprietary &amp; Confidential
            </div>
            <p style={{fontSize:12,color:'#8DAFC8',lineHeight:1.75,marginBottom:10}}>
              IncomeArc™ and the retirement income architecture methodology contained herein are the <strong style={{color:'#DDD6C4'}}>exclusive proprietary property of Integrated Planning Partners and Jeffrey Faine, CLU, RICP®</strong>. This tool, its underlying logic, design, output, and methodology may not be copied, reproduced, distributed, reverse-engineered, or used in any form without the <strong style={{color:'#DDD6C4'}}>explicit written permission of Integrated Planning Partners and/or Jeffrey Faine</strong>. Unauthorized use constitutes misappropriation of proprietary intellectual property and may result in legal action. IncomeArc™ is a trademark of Integrated Planning Partners. © {new Date().getFullYear()} Integrated Planning Partners · Jeffrey Faine, CLU, RICP®. All rights reserved.
            </p>
            <p style={{fontSize:12,color:'#6E8299',lineHeight:1.7}}>
              Projections are illustrative only and do not constitute financial, tax, or legal advice. Actual results will vary. RMD calculations use IRS Uniform Lifetime Table. IRMAA thresholds reflect 2025 Medicare brackets. Monte Carlo uses 1000 trials with user-defined mean return and 12% standard deviation; expenses inflation-adjusted annually; SS income receives full inflation COLA each year; pension and annuity are fixed with no COLA.
            </p>
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
