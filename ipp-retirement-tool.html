                    style={{width:'100%',background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.1)',borderRadius:6,padding:'7px 10px',fontSize:13,color:'#F5F2EC',outline:'none',fontFamily:"'DM Sans',sans-serif"}}
                  />
                </div>
              )}
              <div>
                <div style={{fontSize:12,color:'#8DAFC8',marginBottom:3,letterSpacing:'.04em'}}>ADVISOR EMAIL (SEND REPORT TO)</div>
                <input
                  type="email"
                  value={clientInfo.advisorEmail}
                  onChange={e=>setClientInfo(p=>({...p,advisorEmail:e.target.value}))}
                  placeholder="advisor@firm.com"
                  style={{width:'100%',background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.1)',borderRadius:6,padding:'7px 10px',fontSize:13,color:'#F5F2EC',outline:'none',fontFamily:"'DM Sans',sans-serif"}}
                />
              </div>
            </div>
          </div>

          {/* Filing Status Toggle */}
          <div style={{marginBottom:10,padding:'10px 12px',background:'rgba(200,169,110,.06)',border:'1px solid rgba(200,169,110,.18)',borderRadius:10}}>
            <div style={{fontSize:14,fontWeight:600,letterSpacing:'.08em',textTransform:'uppercase',color:'#C8A96E',marginBottom:8}}>Filing Status</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
              {[{id:'single',label:'Single'},{id:'mfj',label:'Married (MFJ)'}].map(opt=>(
                <button key={opt.id}
                  onClick={()=>{
                    set('filingStatus', opt.id);
                    if(opt.id === 'mfj' && !inputs.spouseCurrentAge) {
                      set('spouseCurrentAge', null);
                      set('spouseDobOffset', 0);
                    }
                  }}
                  style={{
                    padding:'8px',borderRadius:7,fontSize:14,fontWeight:500,
                    fontFamily:"'DM Sans',sans-serif",cursor:'pointer',
                    background: inputs.filingStatus===opt.id ? 'rgba(200,169,110,.2)' : 'rgba(255,255,255,.04)',
                    border: inputs.filingStatus===opt.id ? '1px solid rgba(200,169,110,.4)' : '1px solid rgba(255,255,255,.08)',
                    color: inputs.filingStatus===opt.id ? '#C8A96E' : '#9EB8CC',
                    transition:'all .2s',
                  }}>
                  {opt.label}
                </button>
              ))}
            </div>
            {inputs.filingStatus==='mfj' && (
              <div style={{marginTop:8,fontSize:14,color:'#8DAFC8',lineHeight:1.5}}>
                MFJ IRMAA brackets applied · Spousal SS calculated · Both spouses on Medicare at 65
              </div>
            )}
          </div>

          <div style={{display:'flex',flexDirection:'column',gap:3}}>

            <Section title="Basic Info" collapsed={sections.basic} onToggle={()=>toggleSection('basic')}>
              <Field label="Current Age"><NumInput value={inputs.currentAge} onChange={v=>{
                set('currentAge', v);
                if(inputs.filingStatus === 'mfj') set('spouseDobOffset', v - inputs.spouseCurrentAge);
              }} suffix="yrs"/></Field>
              {inputs.filingStatus === 'mfj' && (
                <Field label="Spouse's Current Age" hint="Required for accurate MFJ calculations">
                  <NumInput value={inputs.spouseCurrentAge || ''} onChange={v=>{
                    set('spouseCurrentAge', v);
                    set('spouseDobOffset', inputs.currentAge - v);
                  }} suffix="yrs"/>
                </Field>
              )}
              <Field label="Retirement Age"><NumInput value={inputs.retireAge} onChange={v=>set('retireAge',v)} suffix="yrs"/></Field>
              <Field label="Plan Through Age (Primary)"><NumInput value={inputs.planToAge} onChange={v=>set('planToAge',v)} suffix="yrs"/></Field>
            </Section>

            <Section title="Tax &amp; State" collapsed={sections.tax} onToggle={()=>toggleSection('tax')}>
              {/* State selector */}
              <Field label="State of Residence" hint="Affects state tax treatment of retirement income">
                <select
                  value={inputs.stateCode}
                  onChange={e=>set('stateCode', e.target.value)}
                  style={{
                    width:'100%', padding:'7px 10px', borderRadius:6, fontSize:14,
                    background:'#0D1B2A', border:'1px solid rgba(255,255,255,.12)',
                    color:'#F5F2EC', fontFamily:"'DM Sans',sans-serif", cursor:'pointer',
                    appearance:'none', WebkitAppearance:'none',
                  }}>
                  {Object.entries(STATE_TAX_DATA).sort((a,b)=>a[1].name.localeCompare(b[1].name)).map(([code, s])=>(
                    <option key={code} value={code}>
                      {s.name} — {s.rate===0 ? 'No tax' : (s.rate*100).toFixed(2)+'%'} ({s.treatment==='none'?'No tax':s.treatment==='exempt'?'Retirement exempt':s.treatment==='partial'?'Partial exemption':'Fully taxed'})
                    </option>
                  ))}
                </select>
              </Field>

              {/* State tax note */}
              {(() => {
                const st = STATE_TAX_DATA[inputs.stateCode];
                if (!st) return null;
                const treatColor = st.treatment==='none'||st.treatment==='exempt' ? '#4A9B7A' : st.treatment==='partial' ? '#C8A030' : '#C47A7A';
                return (
                  <div style={{padding:'9px 12px',background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.07)',borderRadius:7,marginTop:4,marginBottom:8}}>
                    <div style={{fontSize:14,fontWeight:700,color:treatColor,marginBottom:3,textTransform:'uppercase',letterSpacing:'.06em'}}>
                      {st.treatment==='none'?'No State Income Tax':st.treatment==='exempt'?'Retirement Income Exempt':st.treatment==='partial'?'Partial Retirement Exemption':'All Retirement Income Taxed'}
                    </div>
                    <div style={{fontSize:13,color:'#DDD6C4',lineHeight:1.55}}>{st.note}</div>
                  </div>
                );
              })()}

              {/* Custom rate override */}
              <Field label="Override State Rate" hint="Leave blank to use default · Enter custom % to override (e.g. future rate change)">
                <NumInput value={inputs.customStateRate} onChange={v=>set('customStateRate',v===0?'':v)} suffix="%" placeholder="Default"/>
              </Field>

              {/* Tax Rate Risk — stress test adder */}
              <div style={{marginTop:12,paddingTop:12,borderTop:'1px solid rgba(255,255,255,.06)'}}>
                <div style={{fontSize:14,fontWeight:700,color:'#C8A030',letterSpacing:'.06em',textTransform:'uppercase',marginBottom:8}}>
                  Tax Rate Risk
                </div>
                <div style={{fontSize:14,color:'#8DAFC8',marginBottom:8,lineHeight:1.55}}>
                  Model a future tax rate increase across all income. Adds the selected percentage to all rates throughout retirement — showing the lifetime cost of higher future taxation.
                </div>
                <Field label="Rate Increase Stress Test" hint="Adds this % to all marginal rates — shows lifetime tax cost of rising rates">
                  <NumInput value={inputs.taxRateStressAdder} onChange={v=>set('taxRateStressAdder',v)} suffix="% added"/>
                </Field>
                {inputs.taxRateStressAdder > 0 && (
                  <div style={{padding:'8px 12px',background:'rgba(200,160,48,.06)',border:'1px solid rgba(200,160,48,.2)',borderRadius:7,marginTop:6,fontSize:13,color:'#DDD6C4',lineHeight:1.6}}>
                    ⚠ Stress test active — all marginal rates increased by <strong style={{color:'#C8A030'}}>{inputs.taxRateStressAdder}%</strong>. Arc reflects higher-rate scenario.
                  </div>
                )}
              </div>
            </Section>

            <Section title="Assumptions" collapsed={sections.advanced} onToggle={()=>toggleSection('advanced')}>
              <Field label="Portfolio Return">
                <NumInput value={inputs.portfolioReturn} onChange={v=>set('portfolioReturn',v)} suffix="%"/>
              </Field>
              <Field label="Inflation Rate">
                <NumInput value={inputs.inflation} onChange={v=>set('inflation',v)} suffix="%"/>
              </Field>

              {/* Sequence of Returns Risk toggle */}
              <div style={{marginTop:14,paddingTop:14,borderTop:'1px solid rgba(255,255,255,.06)'}}>
                <div style={{fontSize:12,fontWeight:700,color:'#C47A7A',letterSpacing:'.06em',textTransform:'uppercase',marginBottom:6}}>
                  Sequence of Returns Risk
                </div>
                <div style={{fontSize:12,color:'#8DAFC8',lineHeight:1.6,marginBottom:10}}>
                  Models a negative return sequence in the first 5 years of retirement — the most damaging timing for portfolio withdrawals. Overrides the return assumption for years 1–5 only.
                </div>
                {/* Toggle switch */}
                <div style={{display:'flex',alignItems:'center',gap:12,marginBottom: inputs.sorrEnabled ? 12 : 0}}>
                  <div
                    onClick={()=>set('sorrEnabled', !inputs.sorrEnabled)}
                    style={{
                      width:44, height:24, borderRadius:12, cursor:'pointer',
                      background: inputs.sorrEnabled ? '#C47A7A' : 'rgba(255,255,255,.1)',
                      position:'relative', transition:'background .2s', flexShrink:0,
                      border: inputs.sorrEnabled ? '1px solid #C47A7A' : '1px solid rgba(255,255,255,.15)',
                    }}>
                    <div style={{
                      position:'absolute', top:3, left: inputs.sorrEnabled ? 22 : 3,
                      width:16, height:16, borderRadius:8,
                      background:'#F5F2EC', transition:'left .2s',
                      boxShadow:'0 1px 3px rgba(0,0,0,.3)',
                    }}/>
                  </div>
                  <span style={{fontSize:13,color: inputs.sorrEnabled ? '#C47A7A' : '#8DAFC8', fontWeight: inputs.sorrEnabled ? 700 : 400}}>
                    {inputs.sorrEnabled ? 'SORR Stress Active' : 'Off — using base return assumption'}
                  </span>
                </div>

                {/* Return schedule table — shown when enabled */}
                {inputs.sorrEnabled && (
                  <div style={{background:'rgba(196,106,106,.06)',border:'1px solid rgba(196,106,106,.2)',borderRadius:8,padding:'10px 12px'}}>
                    <div style={{fontSize:11,fontWeight:700,color:'#C47A7A',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:8}}>
                      Return Override Schedule
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:6,marginBottom:10}}>
                      {[
                        { yr:'Yr 1', ret:-18, label:'Crash' },
                        { yr:'Yr 2', ret:+4,  label:'Partial' },
                        { yr:'Yr 3', ret:-14, label:'Relapse' },
                        { yr:'Yr 4', ret:+5,  label:'Partial' },
                        { yr:'Yr 5', ret:-10, label:'Drag' },
                      ].map(s => (
                        <div key={s.yr} style={{textAlign:'center',padding:'6px 4px',background:'rgba(0,0,0,.15)',borderRadius:6,border:`1px solid ${s.ret < 0 ? 'rgba(196,106,106,.25)' : 'rgba(74,155,122,.2)'}`}}>
                          <div style={{fontSize:11,color:'#8DAFC8',marginBottom:2}}>{s.yr}</div>
                          <div style={{fontSize:15,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color: s.ret < 0 ? '#C47A7A' : '#4A9B7A'}}>
                            {s.ret > 0 ? '+' : ''}{s.ret}%
                          </div>
                          <div style={{fontSize:10,color:'#8DAFC8',marginTop:1}}>{s.label}</div>
                        </div>
                      ))}
                    </div>
                    <div style={{fontSize:12,color:'#8DAFC8',lineHeight:1.55}}>
                      Year 6+ resumes your <strong style={{color:'#DDD6C4'}}>{inputs.portfolioReturn}%</strong> base return assumption. Cumulative 5-year drag: <strong style={{color:'#C47A7A'}}>−{(((1-0.18)*(1+0.04)*(1-0.14)*(1+0.05)*(1-0.10)-1)*100).toFixed(1)}%</strong> vs a flat-return scenario.
                    </div>
                  </div>
                )}
              </div>
            </Section>


            <Section title="Social Security" collapsed={sections.ss} onToggle={()=>toggleSection('ss')}>
              <Field label="Est. Monthly Benefit at FRA" hint="Find on your Social Security statement or ssa.gov">
                <NumInput value={inputs.ssMonthly} onChange={v=>set('ssMonthly',v)} prefix="$" suffix="/mo"/>
              </Field>
              <Field label="Full Retirement Age (FRA)">
                <select className="ia-select" value={inputs.fra} onChange={e=>set('fra',Number(e.target.value))}>
                  <option value={66}>66 (born 1943–1954)</option>
                  <option value={66.5}>66½ (born 1955)</option>
                  <option value={67}>67 (born 1960+)</option>
                </select>
              </Field>
              <Field label="Planned Claim Age">
                <select className="ia-select" value={inputs.ssClaimAge} onChange={e=>set('ssClaimAge',Number(e.target.value))}>
                  {[62,63,64,65,66,67,68,69,70].map(a=>(
                    <option key={a} value={a}>Age {a}{a===62?' (earliest)':a===70?' (maximum)':''}</option>
                  ))}
                </select>
              </Field>
              {/* SS comparison callout */}
              <div style={{background:'rgba(200,169,110,.05)',border:'1px solid rgba(200,169,110,.12)',borderRadius:7,padding:'10px 12px',marginTop:4}}>
                <div style={{fontSize:14,color:'#C8A96E',fontWeight:600,marginBottom:6}}>Claim Age Comparison</div>
                {[62,67,70].map(a=>(
                  <div key={a} style={{display:'flex',justifyContent:'space-between',padding:'3px 0',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
                    <span style={{fontSize:13,color:'#9EB8CC'}}>Age {a}</span>
                    <span style={{fontSize:13,color: a===inputs.ssClaimAge?'#C8A96E':'#8AABB8',fontWeight: a===inputs.ssClaimAge?600:400}}>
                      {fmt$(ssBenefitAtAge(inputs.ssMonthly, inputs.fra, a) * 12)}/yr
                    </span>
                  </div>
                ))}
              </div>
            </Section>

            {/* Spouse SS — only shown if married */}
            {inputs.filingStatus === 'mfj' && (
              <Section title="Spouse — Social Security" collapsed={sections.spouseSs} onToggle={()=>toggleSection('spouseSs')}>
                <Field label="Spouse Est. Monthly Benefit at FRA" hint="Enter 0 if spouse has no work record — spousal benefit (50%) will be used">
                  <NumInput value={inputs.spouseSsMonthly} onChange={v=>set('spouseSsMonthly',v)} prefix="$" suffix="/mo"/>
                </Field>
                {inputs.spouseSsMonthly > 0 && <>
                  <Field label="Spouse Full Retirement Age">
                    <select className="ia-select" value={inputs.spouseFra} onChange={e=>set('spouseFra',Number(e.target.value))}>
                      <option value={66}>66</option>
                      <option value={66.5}>66½</option>
                      <option value={67}>67</option>
                    </select>
                  </Field>
                  <Field label="Spouse Planned Claim Age">
                    <select className="ia-select" value={inputs.spouseSsClaimAge} onChange={e=>set('spouseSsClaimAge',Number(e.target.value))}>
                      {[62,63,64,65,66,67,68,69,70].map(a=>(
                        <option key={a} value={a}>Age {a}</option>
                      ))}
                    </select>
                  </Field>
                  {/* Spouse comparison */}
                  <div style={{background:'rgba(200,169,110,.05)',border:'1px solid rgba(200,169,110,.12)',borderRadius:7,padding:'10px 12px',marginTop:4}}>
                    <div style={{fontSize:14,color:'#C8A96E',fontWeight:600,marginBottom:6}}>Spouse Claim Age Comparison</div>
                    {[62,67,70].map(a=>(
                      <div key={a} style={{display:'flex',justifyContent:'space-between',padding:'3px 0',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
                        <span style={{fontSize:13,color:'#9EB8CC'}}>Age {a}</span>
                        <span style={{fontSize:13,color: a===inputs.spouseSsClaimAge?'#C8A96E':'#8AABB8',fontWeight: a===inputs.spouseSsClaimAge?600:400}}>
                          {fmt$(ssBenefitAtAge(inputs.spouseSsMonthly, inputs.spouseFra, a) * 12)}/yr
                        </span>
                      </div>
                    ))}
                    <div style={{marginTop:6,paddingTop:6,borderTop:'1px solid rgba(255,255,255,.06)'}}>
                      <div style={{display:'flex',justifyContent:'space-between'}}>
                        <span style={{fontSize:13,color:'#9EB8CC'}}>Spousal benefit (50% of primary)</span>
                        <span style={{fontSize:13,color:'#9B7EC8',fontWeight:500}}>
                          {fmt$(ssBenefitAtAge(inputs.ssMonthly, inputs.fra, inputs.fra) * 0.5 * 12)}/yr
                        </span>
                      </div>
                      <div style={{fontSize:14,color:'#8DAFC8',marginTop:3}}>Used if higher than own benefit</div>
                    </div>
                  </div>
                </>}
                {inputs.spouseSsMonthly === 0 && (
                  <div style={{padding:'10px 12px',background:'rgba(155,126,200,.06)',border:'1px solid rgba(155,126,200,.18)',borderRadius:7,marginTop:4}}>
                    <div style={{fontSize:14,color:'#9B7EC8',fontWeight:600,marginBottom:4}}>Spousal Benefit Applied</div>
                    <p style={{fontSize:13,color:'#DDD6C4',lineHeight:1.5}}>
                      Spouse will receive 50% of your benefit at your FRA: <strong style={{color:'#9B7EC8'}}>{fmt$(ssBenefitAtAge(inputs.ssMonthly, inputs.fra, inputs.fra) * 0.5 * 12)}/yr</strong>
                    </p>
                  </div>
                )}

                {/* Widow/Widower Scenario */}
                <div style={{marginTop:12,paddingTop:12,borderTop:'1px solid rgba(255,255,255,.06)'}}>
                  <div style={{fontSize:14,fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',color:'#C47A7A',marginBottom:8}}>
                    Widow/Widower Scenario
                  </div>
                  <Field label="Model Primary Death at Age" hint="Enter 0 to exclude · When primary dies, surviving spouse experiences SS survivor benefit, IRMAA bracket shift to single, and tax bracket compression">
                    <NumInput value={inputs.primaryDeathAge} onChange={v=>set('primaryDeathAge',v)} suffix="yrs (primary age)"/>
                  </Field>
                  {inputs.primaryDeathAge > 0 && (
                    <div style={{padding:'10px 12px',background:'rgba(196,106,106,.06)',border:'1px solid rgba(196,106,106,.2)',borderRadius:7,marginTop:4}}>
                      <div style={{fontSize:14,color:'#C47A7A',fontWeight:600,marginBottom:5}}>Widow's Penalty — What Changes at Primary's Death</div>
                      <div style={{fontSize:13,color:'#DDD6C4',lineHeight:1.75}}>
                        <div>⟶ SS drops to <strong style={{color:'#F5F2EC'}}>one check</strong> (higher of the two)</div>
                        <div>⟶ IRMAA brackets shift to <strong style={{color:'#F5F2EC'}}>single thresholds</strong> immediately</div>
                        <div>⟶ Tax brackets <strong style={{color:'#F5F2EC'}}>compress to single</strong> — same income, higher rate</div>
                        <div>⟶ Single life pension <strong style={{color:'#F5F2EC'}}>ceases</strong> · J&S reduces to elected %</div>
                        <div>⟶ Modeled from age <strong style={{color:'#C47A7A'}}>{inputs.primaryDeathAge}</strong> forward</div>
                      </div>
                    </div>
                  )}
                </div>
              </Section>
            )}

            <Section title="Pension" collapsed={sections.pension} onToggle={()=>toggleSection('pension')}>

              {/* Primary pension */}
              <div style={{fontSize:13,fontWeight:700,color:'#9EB8CC',letterSpacing:'.06em',textTransform:'uppercase',marginBottom:8}}>
                Primary Pension
              </div>
              <Field label="Monthly Pension Benefit" hint="Enter 0 if no pension">
                <NumInput value={inputs.pensionMonthly} onChange={v=>set('pensionMonthly',v)} prefix="$" suffix="/mo"/>
              </Field>

              {inputs.pensionMonthly > 0 && <>
                <Field label="Pension Start Age">
                  <NumInput value={inputs.pensionStartAge} onChange={v=>set('pensionStartAge',v)} suffix="yrs"/>
                </Field>

                {inputs.filingStatus === 'mfj' && (
                  <Field label="Pension Type">
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                      {[{id:'single',label:'Single Life'},{id:'joint',label:'Joint & Survivor'}].map(opt=>(
                        <button key={opt.id}
                          onClick={()=>set('pensionType',opt.id)}
                          style={{
                            padding:'7px 6px',borderRadius:6,fontSize:13,fontWeight:500,
                            fontFamily:"'DM Sans',sans-serif",cursor:'pointer',
                            background: inputs.pensionType===opt.id ? 'rgba(200,169,110,.2)' : 'rgba(255,255,255,.04)',
                            border: inputs.pensionType===opt.id ? '1px solid rgba(200,169,110,.4)' : '1px solid rgba(255,255,255,.08)',
                            color: inputs.pensionType===opt.id ? '#C8A96E' : '#9EB8CC',
                          }}>
                          {opt.label}
                        </button>
                      ))}
                    </div>
                  </Field>
                )}

                {inputs.pensionType === 'single' && inputs.filingStatus === 'mfj' && (
                  <div style={{background:'rgba(196,122,122,.08)',border:'1px solid rgba(196,122,122,.2)',borderRadius:6,padding:'9px 12px',fontSize:13,color:'#C47A7A',lineHeight:1.5}}>
                    ⚠ Single life — pension payments cease at the primary's death. Model with "Primary Death Age" in the Widow/Widower Scenario.
                  </div>
                )}

                {inputs.pensionType === 'joint' && inputs.filingStatus === 'mfj' && (
                  <Field label="Survivor Benefit" hint="% of pension the surviving spouse receives after primary's death">
                    <select className="ia-select" value={inputs.pensionSurvivorPct} onChange={e=>set('pensionSurvivorPct',Number(e.target.value))}>
                      <option value={100}>100% — Full continuation</option>
                      <option value={75}>75% — Three-quarter survivor</option>
                      <option value={50}>50% — Half survivor</option>
                      <option value={25}>25% — Quarter survivor</option>
                    </select>
                  </Field>
                )}
              </>}

              {/* Spouse pension — only when married */}
              {inputs.filingStatus === 'mfj' && <>
                <div style={{marginTop:16,paddingTop:14,borderTop:'1px solid rgba(255,255,255,.06)',fontSize:13,fontWeight:700,color:'#9EB8CC',letterSpacing:'.06em',textTransform:'uppercase',marginBottom:8}}>
                  Spouse Pension
                </div>
                <Field label="Spouse Monthly Pension" hint="Enter 0 if no spouse pension">
                  <NumInput value={inputs.spousePensionMonthly} onChange={v=>set('spousePensionMonthly',v)} prefix="$" suffix="/mo"/>
                </Field>
                {inputs.spousePensionMonthly > 0 && (
                  <Field label="Spouse Pension Start Age">
                    <NumInput value={inputs.spousePensionStartAge} onChange={v=>set('spousePensionStartAge',v)} suffix="yrs"/>
                  </Field>
                )}
              </>}

            </Section>

{/* Portfolio Balances section */}
            <Section title="Portfolio Balances" collapsed={sections.portfolio} onToggle={()=>toggleSection('portfolio')}>

              {/* Today's balances */}
              <div style={{fontSize:14,fontWeight:700,color:'#9EB8CC',letterSpacing:'.06em',textTransform:'uppercase',marginBottom:10}}>
                Current Balances (Today)
              </div>

              {/* Primary balances */}
              <div style={{fontSize:13,fontWeight:700,color:'#9EB8CC',letterSpacing:'.06em',textTransform:'uppercase',marginBottom:6}}>
                {inputs.filingStatus === 'mfj' ? 'Primary' : 'Balances'}
              </div>
              <Field label="Traditional / Pre-Tax" hint="401(k), IRA, 403(b) — today's balance">
                <NumInput value={inputs.traditionalBalance} onChange={v=>set('traditionalBalance',v)} prefix="$"/>
              </Field>
              <Field label="Roth / Tax-Free" hint="Roth IRA, Roth 401(k) — today's balance">
                <NumInput value={inputs.rothBalance} onChange={v=>set('rothBalance',v)} prefix="$"/>
              </Field>
              <Field label="Taxable / Brokerage" hint="Today's balance">
                <NumInput value={inputs.taxableBalance} onChange={v=>set('taxableBalance',v)} prefix="$"/>
              </Field>

              {/* Primary contributions — only show if pre-retirement */}
              {inputs.currentAge < inputs.retireAge && (
                <div style={{marginTop:12,paddingTop:12,borderTop:'1px solid rgba(255,255,255,.06)'}}>
                  <div style={{fontSize:13,fontWeight:700,color:'#9EB8CC',letterSpacing:'.06em',textTransform:'uppercase',marginBottom:8}}>
                    {inputs.filingStatus === 'mfj' ? 'Primary Annual Contributions' : 'Annual Contributions'}
                  </div>
                  <Field label="Traditional / Pre-Tax Contribution" hint="Annual 401(k) or IRA contribution — grows tax-deferred to retirement">
                    <NumInput value={inputs.annualTradContribution} onChange={v=>set('annualTradContribution',v)} prefix="$" suffix="/yr"/>
                  </Field>
                  {inputs.annualTradContribution > 0 && (
                    <Field label="Stop Contributing at Age" hint="Default: retirement age">
                      <NumInput value={inputs.tradContributionEndAge||inputs.retireAge} onChange={v=>set('tradContributionEndAge',v)} suffix="yrs"/>
                    </Field>
                  )}
                  <Field label="Taxable / Brokerage Contribution" hint="Annual after-tax brokerage contribution">
                    <NumInput value={inputs.annualTaxableContribution} onChange={v=>set('annualTaxableContribution',v)} prefix="$" suffix="/yr"/>

                    <div style={{padding:'8px 14px',background:'rgba(200,160,48,.08)',border:'1px solid rgba(200,160,48,.25)',borderRadius:8,textAlign:'center'}}>
                      <div style={{fontSize:13,color:'#C8A030',fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',marginBottom:3}}>Rate Risk Stress</div>
                      <div style={{fontSize:18,fontWeight:700,color:'#C8A030',fontFamily:"'Cormorant Garamond',serif"}}>+{inputs.taxRateStressAdder}%</div>
                      <div style={{fontSize:13,color:'#8DAFC8'}}>applied to all rates</div>
                    </div>
                  )}
                  <div style={{fontSize:14,color:'#8DAFC8',lineHeight:1.6,flex:1,minWidth:180}}>
                    {stateInfo?.note || ''}
                    {inputs.customStateRate !== '' && <div style={{color:'#C8A030',marginTop:3}}>Custom rate: {inputs.customStateRate}% override active</div>}
                  </div>
                </div>
              </div>
            );
          })()}

          {/* Main chart + confidence */}
          <div style={{background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.06)',borderRadius:12,padding:'18px 20px',marginBottom:16}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14,flexWrap:'wrap',gap:12}}>
              <div>
                <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:400,color:'#F5F2EC',marginBottom:3}}>
                  Income Arc — Age {inputs.retireAge} to {inputs.planToAge}
                </h2>
                <p style={{fontSize:13,color:'#8DAFC8'}}>
                  After-tax net income by source · expense line overlay · {inputs.ltcEventAge > 0 ? 'healthcare event marked' : 'no healthcare event modeled'}
                </p>
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:10}}>
                <ConfidenceRing score={confidence}/>
                {fixedStreams && fixedStreams.some(s => s.yearOffset > 0) && (
                  <div style={{background:'rgba(74,155,122,.06)',border:'1px solid rgba(74,155,122,.18)',borderRadius:8,padding:'8px 12px',minWidth:170,maxWidth:210}}>
                    <div style={{fontSize:13,fontWeight:700,color:'#4A9B7A',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:6}}>
                      Deferred Income — MC Schedule
                    </div>
                    {fixedStreams.map((s, i) => {
                      const streamLabel = i === 0 && s.yearOffset === 0 ? 'Pension'
                        : s.yearOffset === 0 ? 'Annuity (active)' : null;
                      const activateAge = mcStartAge + s.yearOffset;
                      const yrsDeferred = s.yearOffset;
                      return (
                        <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4,gap:8}}>
                          <div>
                            <div style={{fontSize:13,color:yrsDeferred > 0 ? '#C8A96E' : '#4A9B7A',fontWeight:600}}>
                              {yrsDeferred > 0 ? `Activates age ${activateAge}` : `Active at start`}
                            </div>
                            <div style={{fontSize:13,color:'#8DAFC8'}}>{yrsDeferred > 0 ? `${yrsDeferred} yr deferral` : `Age ${mcStartAge}+`}</div>
                          </div>
                          <div style={{fontSize:13,fontWeight:600,color:'#F5F2EC',fontFamily:"'Cormorant Garamond',serif",whiteSpace:'nowrap'}}>
                            ${Math.round(s.annual/12).toLocaleString()}/mo
                          </div>
                        </div>
                      );
                    })}
                    <div style={{borderTop:'1px solid rgba(74,155,122,.15)',paddingTop:5,marginTop:3,fontSize:13,color:'#8DAFC8',lineHeight:1.5}}>
                      Deferred income reduces portfolio draws until each stream activates — reflected in confidence score
                    </div>
                  </div>
                )}
              </div>
            </div>

            {view === 'visual' ? (
              <>
                <Legend insuredData={yearsInsured}/>
                <ArcChart data={yearsUninsured || yearsWithLtc} view={view} insuredData={yearsInsured} sorrEnabled={inputs.sorrEnabled}/>
              </>
            ) : (
              <DataTable data={yearsWithLtc}/>
            )}
          </div>

          {/* LTC With vs Without Comparison Panel */}
          {showLtcComparison && yearsInsured && yearsUninsured && (() => {
            const ltcAge = inputs.ltcEventAge;
            const ltcEnd = ltcAge + inputs.ltcDuration;
            // IMPORTANT: all uninsured calculations must use yearsUninsured (with LTC shock),
            // NOT years (which is now the clean baseline with ltcEventAge:0)
            const uninsuredFinal = yearsUninsured[yearsUninsured.length-1];
            const insuredFinal = yearsInsured[yearsInsured.length-1];

            // Raw care cost (net expense, before tax friction)
            const totalLtcCost = inputs.ltcMonthlyCost * 12 * inputs.ltcDuration;
            const coveredAmt = (inputs.ltcMonthlyBenefit||inputs.ltcMonthlyCost) * 12 * inputs.ltcDuration;

            // Gross-up tax actually incurred in the uninsured projection during LTC years
            // This is the real additional tax burden caused by forced grossed-up withdrawals
            const grossUpTaxTotal = yearsUninsured
              .filter(r => r.age >= ltcAge && r.age < ltcEnd)
              .reduce((sum, r) => sum + (r.ltcGrossUpTax || 0), 0);

            // True total cost = care cost + gross-up tax friction
            const trueTotalCost = totalLtcCost + grossUpTaxTotal;

            // Portfolio preserved = full ending balance difference — captures gross-up AND compounding
            const portfolioDiff = insuredFinal && uninsuredFinal
              ? (insuredFinal.totalPortfolio - uninsuredFinal.totalPortfolio)
              : 0;

            // Compounding loss = portfolioDiff minus the direct costs (care + gross-up tax)
            // This is the pure growth the depleted portfolio never earned from event age → plan-to age
            // portfolioDiff is the authoritative number — both projections ran full engine independently
            const compoundingLoss = Math.max(0, portfolioDiff - trueTotalCost);

            // "Covered by Income" = how much of the care cost is absorbed by income surplus
            // AFTER fixed + lifestyle expenses are already paid.
            // We look at each LTC year in the UNINSURED projection:
            //   - row.spendableIncome = SS + pension + RMDs + annuity (excluding arch events)
            //   - row.totalExpense includes living expenses + LTC cost
            //   - Income surplus after living expenses = spendableIncome - (totalExpense - ltcUncovered)
            //   - That surplus (if any) absorbs part of the LTC cost before portfolio is touched
            const incomeOffset = yearsUninsured
              .filter(r => r.age >= ltcAge && r.age < ltcEnd)
              .reduce((sum, r) => {
                const livingExpenses = (r.totalExpense || 0) - (r.ltcUncovered || 0);
                const surplusAfterLiving = Math.max(0, (r.spendableIncome || 0) - livingExpenses);
                return sum + Math.min(surplusAfterLiving, r.ltcUncovered || 0);
              }, 0);

            const annualBenefit = (inputs.ltcMonthlyBenefit || inputs.ltcMonthlyCost) * 12;
            const totalBenefit = annualBenefit * inputs.ltcDuration;
            const benefitGap = Math.max(0, totalLtcCost - totalBenefit);
            // Forced portfolio draws = care cost not covered by income surplus (gross, before tax)
            // For display we use the engine-computed draw difference between projections
            const uninsuredLtcYearDraws = yearsUninsured
              .filter(r => r.age >= ltcAge && r.age < ltcEnd)
              .reduce((sum, r) => sum + (r.sources.rmd || 0) + (r.sources.taxable || 0), 0);
            const insuredLtcYearDraws = yearsInsured
              .filter(r => r.age >= ltcAge && r.age < ltcEnd)
              .reduce((sum, r) => sum + (r.sources.rmd || 0) + (r.sources.taxable || 0), 0);
            const extraGrossDraws = Math.max(0, uninsuredLtcYearDraws - insuredLtcYearDraws);
            // "Covered by Income" only meaningful when there's a benefit gap or no insurance.
            // When benefit fully covers care, this should be $0 — income doesn't need to absorb anything.
            const showBenefitCard = totalBenefit > 0; // insured scenario
            const incomeAbsorbed = showBenefitCard ? Math.max(0, benefitGap - extraGrossDraws) : incomeOffset;

            const fmtD = v => v >= 1000000 ? `$${(v/1000000).toFixed(2)}M` : `$${Math.round(v/1000)}K`;
            return (
              <div style={{background:'rgba(74,155,122,.04)',border:'1px solid rgba(74,155,122,.2)',borderRadius:12,padding:'18px 20px',marginBottom:16}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
                  <div style={{fontSize:13,fontWeight:700,letterSpacing:'.14em',textTransform:'uppercase',color:'#4A9B7A'}}>
                    Healthcare Event — Layer 2 Impact Analysis
                  </div>
                  <div style={{fontSize:13,color:'#8DAFC8',background:'rgba(74,155,122,.08)',padding:'2px 8px',borderRadius:4,border:'1px solid rgba(74,155,122,.15)'}}>
                    Age {ltcAge}–{ltcEnd} · {inputs.ltcDuration} yr event
                  </div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:10,marginBottom:14}}>
                  {[
                    { label:'Total Care Cost', value: fmtD(totalLtcCost), sub:'Full cost if uninsured', color:'#C47A7A' },
                    showBenefitCard
                      ? { label:'Layer 2 Benefit', value: fmtD(totalBenefit), sub: benefitGap > 0 ? `$${Math.round(benefitGap/1000)}K gap remains` : 'Fully covers care cost', color:'#4A9B7A' }
                      : { label:'Covered by Income', value: incomeOffset > 0 ? fmtD(incomeOffset) : '—', sub:'Income surplus after living expenses (e.g. RMDs exceeding bills)', color:'#8DAFC8' },
                    { label:'Forced Portfolio Draws', value: extraGrossDraws > 0 ? fmtD(extraGrossDraws) : '—', sub: showBenefitCard && benefitGap === 0 ? 'None — policy absorbs all' : 'Gross IRA/taxable drawn above income', color: extraGrossDraws > 0 ? '#C47A7A' : '#4A9B7A' },
                    { label:'Gross-Up Tax Cost', value: grossUpTaxTotal > 0 ? fmtD(grossUpTaxTotal) : '—', sub: grossUpTaxTotal > 0 ? 'Extra tax on forced IRA draws' : 'None — no forced IRA draws', color: grossUpTaxTotal > 0 ? '#C47A7A' : '#4A9B7A' },
                    { label:'Portfolio Preserved', value: fmtD(portfolioDiff), sub:`Draws + tax + compounding — full Layer 2 benefit`, color: portfolioDiff > 0 ? '#4A9B7A' : '#C47A7A' },
                  ].map(s => (
                    <div key={s.label} style={{background:'rgba(255,255,255,.03)',borderRadius:8,padding:'10px 12px',border:'1px solid rgba(255,255,255,.06)'}}>
                      <div style={{fontSize:12,color:'#8DAFC8',letterSpacing:'.06em',textTransform:'uppercase',marginBottom:4}}>{s.label}</div>
                      <div style={{fontSize:18,fontWeight:700,color:s.color,fontFamily:"'Cormorant Garamond',serif"}}>{s.value}</div>
                      <div style={{fontSize:12,color:'#8DAFC8',marginTop:3}}>{s.sub}</div>
                    </div>
                  ))}
                </div>
                {/* Equation line explaining how Portfolio Preserved is composed */}
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:12,flexWrap:'wrap',fontSize:12,color:'#8DAFC8',background:'rgba(255,255,255,.02)',borderRadius:6,padding:'7px 12px',border:'1px solid rgba(255,255,255,.05)'}}>
                  <span style={{color:'#C47A7A',fontWeight:600}}>{fmtD(extraGrossDraws)}</span>
                  <span>forced draws</span>
                  {incomeOffset > 0 && <><span style={{color:'#8DAFC8',margin:'0 2px'}}>+</span>
                  <span style={{color:'#8DAFC8',fontWeight:600}}>{fmtD(incomeOffset)}</span>
                  <span>covered by income surplus</span></>}
                  <span style={{color:'#8DAFC8',margin:'0 2px'}}>+</span>
                  <span style={{color:'#C47A7A',fontWeight:600}}>{grossUpTaxTotal > 0 ? fmtD(grossUpTaxTotal) : '$0'}</span>
                  <span>gross-up tax</span>
                  <span style={{color:'#8DAFC8',margin:'0 2px'}}>+</span>
                  <span style={{color:'#C47A7A',fontWeight:600}}>{fmtD(compoundingLoss)}</span>
                  <span>compounding loss (age {ltcEnd}→{inputs.planToAge})</span>
                  <span style={{color:'#8DAFC8',margin:'0 2px'}}>=</span>
                  <span style={{color:'#4A9B7A',fontWeight:700}}>{fmtD(portfolioDiff)}</span>
                  <span style={{color:'#4A9B7A'}}>Portfolio Preserved</span>
                </div>
                {/* Dual Monte Carlo Confidence Comparison */}
                {confidenceInsured !== null && confidenceUninsured !== null && (() => {
                  const delta = confidenceInsured - confidenceUninsured;
                  const deltaColor = delta > 0 ? '#4A9B7A' : delta < 0 ? '#C47A7A' : '#8DAFC8';
                  const barW = (pct) => `${Math.max(4, pct)}%`;
                  return (
                    <div style={{background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.07)',borderRadius:10,padding:'14px 16px',marginBottom:14}}>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:10}}>
                        {/* Column headers aligned with data below */}
                        <div style={{fontSize:12,fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase',color:'#C47A7A'}}>
                          WITHOUT LAYER 2
                          <span style={{fontWeight:400,marginLeft:6,color:'#5A7A8A',fontSize:11}}>· care event, no policy</span>
                        </div>
                        <div style={{fontSize:12,fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase',color:'#4A9B7A'}}>
                          WITH LAYER 2
                          <span style={{fontWeight:400,marginLeft:6,color:'#5A7A8A',fontSize:11}}>· care cost shock absorbed</span>
                        </div>
                      </div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:10}}>
                        {/* Without Layer 2 — uninsured shock applied */}
                        <div>
                          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
                            <span style={{fontSize:28,fontWeight:700,color:'#C47A7A',fontFamily:"'Cormorant Garamond',serif"}}>{confidenceUninsured}%</span>
                          </div>
                          <div style={{height:8,background:'rgba(255,255,255,.06)',borderRadius:4,overflow:'hidden'}}>
                            <div style={{height:'100%',width:barW(confidenceUninsured),background:'#C47A7A',borderRadius:4,transition:'width .6s ease'}}/>
                          </div>
                          <div style={{fontSize:11,color:'#8DAFC8',marginTop:4}}>Portfolio depleted by {fmtD(trueTotalCost)} in care years</div>
                        </div>
                        {/* With Layer 2 — insured, no shock */}
                        <div>
                          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
                            <span style={{fontSize:28,fontWeight:700,color:'#4A9B7A',fontFamily:"'Cormorant Garamond',serif"}}>{confidenceInsured}%</span>
                          </div>
                          <div style={{height:8,background:'rgba(255,255,255,.06)',borderRadius:4,overflow:'hidden'}}>
                            <div style={{height:'100%',width:barW(confidenceInsured),background:'#4A9B7A',borderRadius:4,transition:'width .6s ease'}}/>
                          </div>
                          <div style={{fontSize:11,color:'#8DAFC8',marginTop:4}}>Care costs covered by dedicated benefit pool</div>
                        </div>
                      </div>
                      <div style={{textAlign:'center',fontSize:13,color:deltaColor,fontWeight:700,borderTop:'1px solid rgba(255,255,255,.06)',paddingTop:10}}>
                        {delta > 0
                          ? `Layer 2 improves plan survival confidence by +${delta} percentage points`
                          : delta < 0
                          ? `Layer 2 reduces confidence by ${Math.abs(delta)} pts (review benefit sizing)`
                          : 'No confidence difference — benefit fully offset by premium cost'}
                      </div>
                    </div>
                  );
                })()}
                <p style={{fontSize:13,color:'#DDD6C4',lineHeight:1.65}}>
                  The <strong style={{color:'#C47A7A'}}>solid red line</strong> shows expenses when the care event draws directly from your retirement portfolio — permanently reducing the compounding base. The <strong style={{color:'#4A9B7A'}}>dashed green line</strong> shows the same retirement with a Living Benefits IUL (Layer 2) covering the event: care costs draw from a dedicated pool, your income architecture remains intact, and the portfolio difference compounds for the remainder of retirement.
                </p>
                {(() => {
                  const ltcYears = years.filter(y => y.ltcEvent && y.ltcGrossUpTax > 0);
                  if (ltcYears.length === 0) return null;
                  const totalGrossUpTax = ltcYears.reduce((s,y) => s+(y.ltcGrossUpTax||0), 0);
                  const avgMAGI = ltcYears.reduce((s,y) => s+(y.magi||0), 0) / ltcYears.length;
                  return (
                    <div style={{marginTop:10,padding:'10px 12px',background:'rgba(155,126,200,.06)',border:'1px solid rgba(155,126,200,.18)',borderRadius:7}}>
                      <div style={{fontSize:14,fontWeight:700,color:'#9B7EC8',marginBottom:5,letterSpacing:'.06em',textTransform:'uppercase'}}>Tax Gross-Up Impact During Care Years</div>
                      <p style={{fontSize:13,color:'#DDD6C4',lineHeight:1.65}}>
                        Drawing from a taxable or traditional account to cover care costs requires a <strong style={{color:'#F5F2EC'}}>gross-up</strong> — you must withdraw more than the care cost so the after-tax net covers the actual expense. During the LTC event years, this model grossed up withdrawals by an estimated <strong style={{color:'#C47A7A'}}>${Math.round(totalGrossUpTax/1000)}K additional tax</strong> across {ltcYears.length} year{ltcYears.length>1?'s':''}. Average MAGI in care years: <strong style={{color:'#9B7EC8'}}>${Math.round(avgMAGI/1000)}K</strong> — check Number Table for IRMAA bracket impact (⬆ flag). A Layer 2 benefit eliminates this entirely — care draws from a dedicated tax-free pool.
                      </p>
                    </div>
                  );
                })()}
              </div>
            );
          })()}

          {/* Sequence of returns stress test callout */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
            <div style={{background:'rgba(196,106,106,.05)',border:'1px solid rgba(196,106,106,.15)',borderRadius:10,padding:'14px 16px'}}>
              <div style={{fontSize:13,fontWeight:700,letterSpacing:'.14em',textTransform:'uppercase',color:'#C47A7A',marginBottom:8}}>Sequence of Returns Risk</div>
              <p style={{fontSize:14,lineHeight:1.65,color:'#DDD6C4'}}>
                A 25% market decline in year 1–3 of retirement can permanently reduce portfolio sustainability — even if long-term returns recover. An uninsured care event compounds this: drawing $90K–$120K/year from a market-exposed portfolio with no dedicated Layer 2 protection extends the damage long after care ends. The model above assumes average returns. An income floor of guaranteed sources — including the Roth Fixed Indexed Annuity with GLWB rider (Layer 1 of the IncomeArc™ system) — reduces this exposure significantly. Markets cannot disrupt it and longevity cannot exhaust it.
              </p>
            </div>
            <div style={{background:'rgba(74,155,122,.05)',border:'1px solid rgba(74,155,122,.15)',borderRadius:10,padding:'14px 16px'}}>
              <div style={{fontSize:13,fontWeight:700,letterSpacing:'.14em',textTransform:'uppercase',color:'#4A9B7A',marginBottom:8}}>Guaranteed Income Floor</div>
              <p style={{fontSize:14,lineHeight:1.65,color:'#DDD6C4'}}>
                <strong style={{color:'#4A9B7A'}}>{guaranteedPct}%</strong> of total projected retirement income (age {inputs.retireAge}–{inputs.planToAge}) comes from guaranteed sources (Social Security{inputs.pensionMonthly > 0 ? ', pension' : ''}{inputs.annuityMonthly > 0 ? ', annuity' : ''}). {guaranteedPct < 50 ? 'Increasing this floor through a Roth Fixed Indexed Annuity with GLWB rider (Layer 1) reduces sequence risk and future IRMAA exposure. The ETA structure (Layer 3) can fund the conversion by eliminating the distribution tax via bank non-recourse loan.' : 'A strong floor provides stability against market volatility. Every dollar repositioned into the Roth Annuity (Layer 1) or ETA IUL policy (Layer 3) permanently reduces the future RMD base — lowering mandatory income and IRMAA exposure year after year.'}
              </p>
            </div>
          </div>

          {/* Footer */}
          <div style={{marginTop:24,padding:'18px 20px',background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.06)',borderRadius:10}}>
            <div style={{fontSize:12,fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase',color:'#C8A96E',marginBottom:8}}>
              Proprietary &amp; Confidential
            </div>
            <p style={{fontSize:12,color:'#8DAFC8',lineHeight:1.75,marginBottom:10}}>
              IncomeArc™ and the retirement income architecture methodology contained herein are the <strong style={{color:'#DDD6C4'}}>exclusive proprietary property of Integrated Planning Partners and Jeffrey Faine, CLU, RICP®</strong>. This tool, its underlying logic, design, output, and methodology may not be copied, reproduced, distributed, reverse-engineered, or used in any form without the <strong style={{color:'#DDD6C4'}}>explicit written permission of Integrated Planning Partners and/or Jeffrey Faine</strong>. Unauthorized use constitutes misappropriation of proprietary intellectual property and may result in legal action. IncomeArc™ is a trademark of Integrated Planning Partners. © {new Date().getFullYear()} Integrated Planning Partners · Jeffrey Faine, CLU, RICP®. All rights reserved.
            </p>
            <p style={{fontSize:12,color:'#6E8299',lineHeight:1.7}}>
              Projections are illustrative only and do not constitute financial, tax, or legal advice. Actual results will vary. RMD calculations use IRS Uniform Lifetime Table. IRMAA thresholds reflect 2025 Medicare brackets. Monte Carlo uses 500 trials with user-defined mean return and 12% standard deviation; expenses inflation-adjusted annually; SS income receives full inflation COLA each year; pension and annuity are fixed with no COLA.
            </p>
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
