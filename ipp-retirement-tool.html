// Returns annual IRMAA surcharge (per person × number of medicare-eligible persons in household)
function calcIRMAA(magi, filingStatus, personsOnMedicare) {
  const brackets = filingStatus === 'mfj' ? IRMAA_MFJ : IRMAA_SINGLE;
  let perPerson = 0;
  for (const b of brackets) {
    if (magi <= b.limit) { perPerson = b.add; break; }
  }
  if (perPerson === 0 && magi > brackets[brackets.length-1].limit) perPerson = 3570;
  return perPerson * (personsOnMedicare || 1);
}

// ── Social Security benefit estimate by age ──
function ssBenefitAtAge(baseMonthly, fra, claimAge) {
  const diff = claimAge - fra;
  if (diff < 0) {
    const months = Math.abs(diff) * 12;
    const reduction = months <= 36 ? months * (5/9/100) : (36 * 5/9/100) + ((months-36) * 5/12/100);
    return baseMonthly * (1 - reduction);
  } else {
    return baseMonthly * (1 + diff * 0.08);
  }
}

function getRMDFactor(age) {
  const factors = {72:27.4,73:26.5,74:25.5,75:24.6,76:23.7,77:22.9,78:22.0,79:21.1,80:20.2,81:19.4,82:18.5,83:17.7,84:16.8,85:16.0,86:15.2,87:14.4,88:13.7,89:12.9,90:12.2,91:11.5,92:10.8,93:10.1,94:9.5,95:8.9};
  return factors[Math.min(Math.max(age, 72), 95)] || 8.9;
}

// ── Monte Carlo simulation ──
// ssIncome: SS benefit at retirement — gets full inflation COLA each year
// fixedIncome: pension + annuity — fixed, no COLA (real value erodes with inflation)
// totalExpensesY1: base annual expenses — grow with inflation each year
// mean: wired to user portfolio return input
// stddev: fixed 0.12 — realistic annual equity volatility
// fixedStreams: array of { yearOffset: number, annual: number }
//   yearOffset = years after MC start age when this stream BEGINS (0 = starts immediately)
//   annual     = fixed annual amount (no COLA — purchasing power erodes)
// This allows deferred annuities to turn on mid-simulation rather than being counted from day 1.
//
// seed: derived from input values so the same scenario always produces the same score.
// Toggling dropdowns / UI state does NOT change the seed — only real data changes do.
function seededRandom(seed) {
  // Mulberry32 — fast, high-quality 32-bit seeded PRNG
  let s = seed >>> 0;
  return function() {
    s += 0x6D2B79F5;
    let z = s;
    z = Math.imul(z ^ (z >>> 15), z | 1);
    z ^= z + Math.imul(z ^ (z >>> 7), z | 61);
    return ((z ^ (z >>> 14)) >>> 0) / 4294967296;
  };
}

function runMonteCarlo(startBalance, annualWithdraw, years, trials=1000, mean=0.065, inflation=0.028, ssIncome=0, fixedStreams=[], totalExpensesY1=0, ltcShockYear=-1, ltcShockAnnual=0, ltcShockDuration=0, spouseLtcShockYear=-1, spouseLtcShockAnnual=0, spouseLtcShockDuration=0, ltcCareInflation=0.04, expenseShockAmount=0, expenseShockFrequency=8) {
  // ltcShockAnnual / spouseLtcShockAnnual: today's-dollar NET care costs.
  // MC grosses up by 1/(1-MC_TAX_RATE) and inflates to care-year dollars.
  // netDraw also grossed up — withdrawing $X net from IRA requires ~$X/(1-0.28) gross.
  const MC_TAX_RATE = 0.28;
  let successes = 0;
  const stddev = 0.12;
  const streams = Array.isArray(fixedStreams)
    ? fixedStreams
    : (fixedStreams > 0 ? [{ yearOffset: 0, annual: fixedStreams }] : []);

  const seedVal = Math.round(
    (startBalance * 0.001)
    + (annualWithdraw * 0.1)
    + (years * 1000)
    + (mean * 99991)
    + (inflation * 77777)
    + (ssIncome * 0.01)
    + (totalExpensesY1 * 0.007)
    + (ltcShockAnnual * 0.0013)
    + (ltcShockYear * 333)
    + (spouseLtcShockAnnual * 0.0009)
    + (spouseLtcShockYear * 211)
    + (expenseShockAmount * 0.0017)
    + (expenseShockFrequency * 53)
    + streams.reduce((a, s) => a + s.annual * 0.003 + s.yearOffset * 17, 0)
  ) ^ 0xDEADBEEF;
  const rand = seededRandom(seedVal);

  for (let t = 0; t < trials; t++) {
    let bal = startBalance;
    let failed = false;
    for (let y = 0; y < years; y++) {
      const r = mean + stddev * (Math.sqrt(-2*Math.log(rand())) * Math.cos(2*Math.PI*rand()));
      const inflFactor = Math.pow(1 + inflation, y);
      const expensesThisYear = totalExpensesY1 * inflFactor;
      const ssThisYear = ssIncome * inflFactor;
      const fixedThisYear = streams.reduce((sum, s) => sum + (y >= s.yearOffset ? s.annual : 0), 0);
      // Gross up net shortfall — IRA draw needs to cover both expense and tax on the draw
      const netShortfall = Math.max(0, expensesThisYear - ssThisYear - fixedThisYear);
      const grossDraw = netShortfall / (1 - MC_TAX_RATE);
      // Primary care cost: inflate using care-specific inflation rate to event-year dollars, then gross up
      const ltcCareInflFactor = Math.pow(1 + ltcCareInflation, y);
      const ltcShock = (ltcShockYear >= 0 && y >= ltcShockYear && y < ltcShockYear + ltcShockDuration)
        ? (ltcShockAnnual * ltcCareInflFactor) / (1 - MC_TAX_RATE) : 0;
      // Spouse care cost: independent event, same care inflation rate
      const spouseLtcShock = (spouseLtcShockYear >= 0 && y >= spouseLtcShockYear && y < spouseLtcShockYear + spouseLtcShockDuration)
        ? (spouseLtcShockAnnual * ltcCareInflFactor) / (1 - MC_TAX_RATE) : 0;
      // Expense shock — recurring unplanned expense every N years, inflation-adjusted, grossed up
      const expShock = (expenseShockAmount > 0 && expenseShockFrequency > 0 && y % expenseShockFrequency === 0)
        ? (expenseShockAmount * inflFactor) / (1 - MC_TAX_RATE) : 0;
      bal = bal * (1 + r) - grossDraw - ltcShock - spouseLtcShock - expShock;
      if (bal <= 0) { failed = true; break; }
    }
    if (!failed) successes++;
  }
  return Math.round((successes / trials) * 100);
}

// Calculate state tax on retirement income
function calcStateTax(sources, stateCode, inflFactor, customRate, stressAdder = 0) {
  const state = STATE_TAX_DATA[stateCode];
  if (!state) return 0;

  // customRate is a % value (e.g. 5 for 5%); convert to decimal
  // stressAdder is already decimal (e.g. 0.05 for 5%)
  const effectiveRate = customRate !== undefined
    ? Math.min(customRate / 100 + stressAdder, 0.99)
    : Math.min(state.rate + stressAdder, 0.99);
  if (effectiveRate === 0 || state.treatment === 'none') return 0;

  const ss       = sources.ss      || 0;
  const pension  = sources.pension || 0;
  const rmd      = sources.rmd     || 0;
  const parttime = sources.parttime|| 0;
  const annuity  = sources.annuity || 0;
  const taxable  = sources.taxable || 0;
  // Roth always tax-free

  let stateOrdinary = 0;
  switch (state.treatment) {
    case 'exempt':
      // Only tax earned income (part-time); all retirement sources (SS, pension, IRA, annuity) exempt
      stateOrdinary = parttime;
      break;
    case 'none':
      return 0;
    case 'partial':
      // Most partial states: SS exempt, qualified plan (IRA/pension) at 80% inclusion,
      // annuity gain (exclusion already applied) at 100%, part-time fully taxable.
      stateOrdinary = (pension + rmd) * 0.80 + annuity + parttime + taxable * 0.15;
      break;
    case 'full':
    default:
      // All retirement income taxed; SS at 85%, annuity gain at 100% (exclusion already applied)
      stateOrdinary = pension + rmd + annuity + parttime + ss * 0.85 + taxable * 0.15;
      break;
  }

  return Math.max(0, stateOrdinary * effectiveRate);
}

// Standard deduction 2025
const STD_DEDUCTION_SINGLE = 15000;
const STD_DEDUCTION_MFJ = 30000;

function calcAnnualTax(sources, filingStatus, inflFactor, stressAdder = 0) {
  const isMFJ = filingStatus === 'mfj';
  const deduction = (isMFJ ? STD_DEDUCTION_MFJ : STD_DEDUCTION_SINGLE) * inflFactor;
  // Apply stress adder to all bracket rates
  const brackets = (isMFJ ? TAX_BRACKETS_MFJ_2025 : TAX_BRACKETS_SINGLE_2025)
    .map(b => ({ limit: b.limit * inflFactor, rate: Math.min(b.rate + stressAdder, 0.99) }));
  const ltcgBrackets = (isMFJ ? LTCG_MFJ_2025 : LTCG_SINGLE_2025)
    .map(b => ({ limit: b.limit * inflFactor, rate: Math.min(b.rate + stressAdder, 0.99) }));

  const ss        = sources.ss        || 0;
  const pension   = sources.pension   || 0;
  const rmd       = sources.rmd       || 0;
  const parttime  = sources.parttime  || 0;
  const annuity   = sources.annuity   || 0; // taxable gain portion only (exclusion ratio already applied at booking)
  const taxable   = sources.taxable   || 0; // assume 100% LTCG (conservative simplification)
  // Roth is tax-free — no impact. Non-qual annuity tax-free return-of-basis in sources.annuityTaxFree (not taxed).

  // SS taxability: up to 85% included in ordinary income
  const provisionalIncome = (ss * 0.5) + pension + rmd + parttime + annuity + taxable;
  let ssTaxable = 0;
  if (provisionalIncome > (isMFJ ? 44000 : 34000) * inflFactor) {
    ssTaxable = Math.min(ss * 0.85, 0.85 * ss);
  } else if (provisionalIncome > (isMFJ ? 32000 : 25000) * inflFactor) {
    ssTaxable = Math.min(ss * 0.50, 0.50 * ss);
  }

  // Ordinary income = SS taxable portion + pension + RMD + part-time + annuity gain (exclusion already applied)
  const ordinaryGross = ssTaxable + pension + rmd + parttime + annuity;
  const ordinaryAGI = Math.max(0, ordinaryGross - deduction);

  // Marginal tax on ordinary income (stacked brackets)
  let ordinaryTax = 0;
  let prev = 0;
  for (const b of brackets) {
    if (ordinaryAGI <= prev) break;
    ordinaryTax += (Math.min(ordinaryAGI, b.limit) - prev) * b.rate;
    prev = b.limit;
  }

  // LTCG tax on taxable portfolio draw — stacked on top of ordinary income
  let ltcgTax = 0;
  if (taxable > 0) {
    const ltcgBase = ordinaryAGI; // LTCG stacks on top of ordinary
    let ltcgPrev = 0;
    for (const b of ltcgBrackets) {
      if (ltcgBase >= b.limit) { ltcgPrev = b.limit; continue; }
      const spaceInBracket = b.limit - Math.max(ltcgBase, ltcgPrev);
      const ltcgInBracket = Math.min(taxable, spaceInBracket);
      ltcgTax += ltcgInBracket * b.rate;
      ltcgPrev = b.limit;
      if (ltcgInBracket >= taxable) break;
    }
  }

  const totalTax = ordinaryTax + ltcgTax;
  const effectiveRate = (ordinaryGross + taxable) > 0 ? totalTax / (ordinaryGross + taxable) : 0;

  // Marginal rate = rate of the bracket where the last dollar of ordinary income falls
  let marginalRate = brackets[0].rate;
  let prev2 = 0;
  for (const b of brackets) {
    if (ordinaryAGI > prev2) marginalRate = b.rate;
    if (ordinaryAGI <= b.limit) break;
    prev2 = b.limit;
  }

  return { totalTax, ordinaryTax, ltcgTax, effectiveRate, marginalRate, ordinaryAGI, ssTaxable };
}

// ── Project income arc data ──
function projectArc(inputs) {
  const {
    currentAge, retireAge, planToAge,
    ssMonthly, ssClaimAge, fra,
    filingStatus = 'single',
    spouseSsMonthly = 0, spouseSsClaimAge = 67, spouseFra = 67,
    spouseDobOffset = 0, spouseCurrentAge = null,
    // Strategic drawdown
    annualTradDrawdown = 0,       // intentional IRA/trad draw per year (pre-RMD Roth Annuity conversion; ETA can fund conversion tax cost)
    tradDrawdownStartAge = 0,     // age to begin intentional draws
    tradDrawdownEndAge = 0,       // age to stop (0 = stop when RMDs kick in)
    annualTaxableDrawdown = 0,    // intentional brokerage draw per year
    taxableDrawdownStartAge = 0,
    taxableDrawdownEndAge = 0,
    annualRothDrawdown = 0,       // intentional Roth draw per year
    rothDrawdownStartAge = 0,
    rothDrawdownEndAge = 0,
    pensionMonthly,
    pensionStartAge = 65, pensionType = 'single', pensionSurvivorPct = 50,
    spousePensionMonthly = 0, spousePensionStartAge = 65,
    primaryDeathAge = 0,
    traditionalBalance, rothBalance, taxableBalance,
    spouseTraditionalBalance = 0,
    rothAnnuityMonthly = 0, rothAnnuityStartAge = 65,
    etaAnnualIncome = 0, etaStartAge = 70, etaColaRate = 0,
    etaFundingAmount = 0, etaFundingAge = 0,
    architectureEnabled = false,
    rothConversionAmount = 0, rothConversionAge = 0, rothConversionFinanced = 0,
    nonQualAnnuityMonthly = 0, nonQualAnnuityStartAge = 65,
    qualAnnuityPremium = 0, qualAnnuityPremiumAge = 0,
    qualAnnuityMonthly = 0, qualAnnuityStartAge = 0,
    householdIncome = 0,
    nonQualAnnuityBasis = 0, nonQualAnnuityTotalValue = 0,
    partTimeMonthly, partTimeEndAge,
    fixedExpenses, lifestyleExpenses,
    stateCode = 'IL', customStateRate, taxRateStressAdder = 0,
    ltcEventAge, ltcMonthlyCost, ltcDuration, ltcShowComparison = true, ltcMonthlyBenefit, ltcBenefitDuration, ltcInsured = false,
    ltcCareInflationRate = 0.04,
    spouseLtcEventAge = 0, spouseLtcMonthlyCost = 0, spouseLtcDuration = 3,
    spouseLtcMonthlyBenefit = 0, spouseLtcBenefitDuration = 3, spouseLtcInsured = false,
    ltcNetAmount = 0, ltcFundingAge = 0,
    spouseLtcNetAmount = 0, spouseLtcFundingAge = 0,
    portfolioReturn = 0.065,
    inflation = 0.028,
    sorrEnabled = false,
    expenseShockEnabled = false,
    expenseShockAmount = 50000,
    expenseShockFrequency = 8,
    annualTradContribution = 0,
    tradContributionEndAge = 0,
    annualTaxableContribution = 0,
    taxableContributionEndAge = 0,
    annualSpouseTradContribution = 0,
    spouseTradContributionEndAge = 0,
  } = inputs;

  // Sequence of Returns Risk overrides — years 0-4 of retirement (index = age - retireAge)
  // Pattern: 3 negative years skewed to early retirement, 2 weak recovery years
  // Year 1: -18%, Year 2: +4%, Year 3: -14%, Year 4: +5%, Year 5: -10%
  // Year 6+ resumes normal portfolioReturn assumption
  const SORR_SCHEDULE = sorrEnabled
    ? [-0.18, 0.04, -0.14, 0.05, -0.10]
    : null;

  const years = [];

  // ── Architecture toggle — when disabled, zero out all IncomeArc™ layers ──
  const archRothAnnuityMonthly   = architectureEnabled ? rothAnnuityMonthly   : 0;
  const archEtaAnnualIncome      = architectureEnabled ? etaAnnualIncome      : 0;
  const archEtaFundingAmount     = architectureEnabled ? etaFundingAmount     : 0;
  const archNonQualAnnuityMonthly= architectureEnabled ? nonQualAnnuityMonthly: 0;
  const archQualAnnuityMonthly   = architectureEnabled ? qualAnnuityMonthly   : 0;
  const archAnnualTradDrawdown   = architectureEnabled ? annualTradDrawdown   : 0;
  const archAnnualTaxableDrawdown= architectureEnabled ? annualTaxableDrawdown: 0;
  const archAnnualRothDrawdown   = architectureEnabled ? annualRothDrawdown   : 0;
  const archRothConversionAmount = architectureEnabled ? rothConversionAmount : 0;
  const archLtcNetAmount         = architectureEnabled ? (ltcNetAmount || 0)     : 0;
  const archSpouseLtcNetAmount   = architectureEnabled ? (spouseLtcNetAmount || 0) : 0;

  // ── Pre-retirement accumulation: grow balances from currentAge to retireAge ──
  // Apply portfolio return each year and add contributions if modeled.
  // Contributions stop at tradContributionEndAge / taxableContributionEndAge (default: retireAge).
  let trad = traditionalBalance;
  let roth = rothBalance;
  let taxable = taxableBalance;
  let spouseTrad = (filingStatus === 'mfj') ? (spouseTraditionalBalance || 0) : 0;

  // Pre-retirement marginal rate — from householdIncome. Falls back to 0.24 if not set.
  const preRetMarginalRate = (() => {
    if (!householdIncome || householdIncome <= 0) return 0.24;
    const mfj = filingStatus === 'mfj';
    const br = mfj
      ? [{l:23200,r:.10},{l:94300,r:.12},{l:201050,r:.22},{l:383900,r:.24},{l:487450,r:.32},{l:731200,r:.35},{l:Infinity,r:.37}]
      : [{l:11600,r:.10},{l:47150,r:.12},{l:100525,r:.22},{l:191950,r:.24},{l:243725,r:.32},{l:609350,r:.35},{l:Infinity,r:.37}];
    const taxable = Math.max(0, householdIncome - (mfj ? 29200 : 14600));
    return (br.find(b => taxable <= b.l) || br[br.length-1]).r;
  })();

  if (currentAge < retireAge) {
    const tradStopAge    = tradContributionEndAge    > 0 ? tradContributionEndAge    : retireAge;
    const taxableStopAge = taxableContributionEndAge > 0 ? taxableContributionEndAge : retireAge;
    const spouseTradStopAge = spouseTradContributionEndAge > 0 ? spouseTradContributionEndAge : retireAge;
    for (let a = currentAge; a < retireAge; a++) {
      const tradContrib    = (annualTradContribution    > 0 && a < tradStopAge)    ? annualTradContribution    : 0;
      const taxableContrib = (annualTaxableContribution > 0 && a < taxableStopAge) ? annualTaxableContribution : 0;
      const spouseTradContrib = (annualSpouseTradContribution > 0 && a < spouseTradStopAge) ? annualSpouseTradContribution : 0;
      // ETA funding event — reduce trad balance in the funding year (pre-retirement)
      if (archEtaFundingAmount > 0 && etaFundingAge > 0 && a === etaFundingAge) {
        trad = Math.max(0, trad - archEtaFundingAmount);
      }
      // Roth conversion event — reduce trad balance in conversion year (pre-retirement)
      if (archRothConversionAmount > 0 && rothConversionAge > 0 && a === rothConversionAge) {
        trad = Math.max(0, trad - archRothConversionAmount);
      }
      // LTC policy funding draw — reduce trad balance (pre-retirement, approximate gross-up at 24% + penalty)
      if (archLtcNetAmount > 0 && ltcFundingAge > 0 && a === ltcFundingAge) {
        const preRetPenalty = ltcFundingAge < 59.5 ? 0.10 : 0;
        const approxGross = archLtcNetAmount / Math.max(0.01, 1 - preRetMarginalRate - preRetPenalty);
        trad = Math.max(0, trad - approxGross - (approxGross * preRetPenalty));
      }
      if (archSpouseLtcNetAmount > 0 && spouseLtcFundingAge > 0 && a === spouseLtcFundingAge) {
        const preRetPenaltySp = spouseLtcFundingAge < 59.5 ? 0.10 : 0;
        const approxGrossSp = archSpouseLtcNetAmount / Math.max(0.01, 1 - preRetMarginalRate - preRetPenaltySp);
        trad = Math.max(0, trad - approxGrossSp - (approxGrossSp * preRetPenaltySp));
      }
      // Grow existing balance then add contribution (end-of-year)
      trad    = trad    * (1 + portfolioReturn) + tradContrib;
      taxable = taxable * (1 + portfolioReturn) + taxableContrib;
      roth    = roth    * (1 + portfolioReturn);
      spouseTrad = spouseTrad * (1 + portfolioReturn) + spouseTradContrib;
    }
  }

  // IRMAA 2-year lookback — Medicare uses MAGI from 2 years prior to set premiums.
  // magiHistory[age] = that year's MAGI, stored as the loop runs.
  // When computing IRMAA for age X, we look up magiHistory[X - 2].
  const magiHistory = {};

  // Pre-seed magiHistory for ages before retirement so the first two retirement years
  // don't fall back to current MAGI. Pre-retirement MAGI estimate: SS not yet started
  // (if claiming at/after retireAge), pension may have started, no RMDs, part-time may be active.
  // Conservative: use pension + part-time income as a floor for pre-retirement MAGI.
  const preRetireMagi = (pensionMonthly > 0 ? pensionMonthly * 12 : 0)
    + (partTimeMonthly > 0 ? partTimeMonthly * 12 : 0);
  magiHistory[retireAge - 2] = preRetireMagi;
  magiHistory[retireAge - 1] = preRetireMagi;

  for (let age = retireAge; age <= planToAge; age++) {
    const yr = age - retireAge;
    const inflFactor = Math.pow(1 + inflation, yr);
    const stressAdder = (taxRateStressAdder || 0) / 100; // available throughout loop incl. gross-up
    // Effective return this year — SORR overrides first 5 years when enabled
    const yearReturn = (SORR_SCHEDULE && yr < SORR_SCHEDULE.length)
      ? SORR_SCHEDULE[yr]
      : portfolioReturn;
    const row = { age, sources: {}, totalIncome: 0, totalExpense: 0, gap: 0 };
    row.yearReturn = yearReturn; // stored for chart annotation

    // ── ETA Lump-Sum Funding Event ──
    // Tax AND any early withdrawal penalty are financed externally (bank loan / policy financing).
    // IRA is reduced by the gross funding amount only. No penalty hits the portfolio here.
    if (archEtaFundingAmount > 0 && etaFundingAge > 0 && age === etaFundingAge) {
      const fundAmt = Math.min(archEtaFundingAmount, trad);
      trad = Math.max(0, trad - fundAmt);
      row.etaFundingEvent = true;
      row.etaFundingAmount = fundAmt;
      // NOT added to sources.rmd — this is a capital reallocation, not spendable income
      row.totalIncome += fundAmt;
    }

    // ── Roth Annuity Conversion Event (Layer 1) ──
    // Full conversion amount is ordinary income. Tax is partially or fully financed (rothConversionFinanced).
    // Unfinanced tax overage is grossed up from IRA after calcAnnualTax runs (see below).
    // Early withdrawal penalty is NOT modeled here — 72(t) SEPP or other structuring handles it.
    if (archRothConversionAmount > 0 && rothConversionAge > 0 && age === rothConversionAge) {
      const convAmt = Math.min(archRothConversionAmount, trad);
      trad = Math.max(0, trad - convAmt);
      row.rothConversionEvent = true;
      row.rothConversionAmount = convAmt;
      // Conversion is taxable income for tax calc but NOT a spendable bar source
      // NOT added to sources.rmd to avoid bar spikes
      row.totalIncome += convAmt;
      // Flag for post-tax overage gross-up. financed covers as much of the tax as specified.
      row._conversionOveragePending = { convAmt, financed: Math.min(rothConversionFinanced || 0, convAmt) };
    }

    // ── Primary LTC Policy Funding Draw ──
    // User enters NET amount needed (policy premium after tax). We gross up from IRA to net that amount.
    // Tax is NOT financed. Early withdrawal penalty (age < 59½) applied as additional IRA deduction.
    if (archLtcNetAmount > 0 && ltcFundingAge > 0 && age === ltcFundingAge) {
      // Build stressed ordinary brackets at this point in the loop
      const ordBracketsLtc = (effectiveStatus === 'mfj' ? TAX_BRACKETS_MFJ_2025 : TAX_BRACKETS_SINGLE_2025)
        .map(b => ({ limit: b.limit * inflFactor, rate: Math.min(b.rate + stressAdder, 0.99) }));
      const currentAGI = (row.sources.ss||0)*0.85 + (row.sources.pension||0) + (row.sources.rmd||0) + (row.sources.parttime||0) + (row.sources.annuity||0);
      const earlyPenaltyRate = age < 59.5 ? 0.10 : 0;
      // Gross up: net needed / (1 - marginalRate - penaltyRate) approximation, refined iteratively
      const { grossDraw: ltcGross, taxOnDraw: ltcTax } = grossUpIterative(archLtcNetAmount, ordBracketsLtc, currentAGI);
      const ltcFund = Math.min(ltcGross, trad);
      const earlyPenalty = ltcFund * earlyPenaltyRate;
      trad = Math.max(0, trad - ltcFund - earlyPenalty);
      row.ltcFundingEvent = true;
      row.ltcFundingAmount = ltcFund;
      row.ltcFundingNet = archLtcNetAmount;
      row.ltcFundingTax = ltcTax;
      row.ltcEarlyPenalty = earlyPenalty;
      // NOT added to sources.rmd — capital reallocation, not spendable income for bars
      row.totalIncome += ltcFund;
    }

    // ── Spouse LTC Policy Funding Draw ──
    if (archSpouseLtcNetAmount > 0 && spouseLtcFundingAge > 0 && age === spouseLtcFundingAge) {
      const ordBracketsSpLtc = (effectiveStatus === 'mfj' ? TAX_BRACKETS_MFJ_2025 : TAX_BRACKETS_SINGLE_2025)
        .map(b => ({ limit: b.limit * inflFactor, rate: Math.min(b.rate + stressAdder, 0.99) }));
      const currentAGISp = (row.sources.ss||0)*0.85 + (row.sources.pension||0) + (row.sources.rmd||0) + (row.sources.parttime||0) + (row.sources.annuity||0);
      const earlyPenaltyRateSp = age < 59.5 ? 0.10 : 0;
      const { grossDraw: spLtcGross, taxOnDraw: spLtcTax } = grossUpIterative(archSpouseLtcNetAmount, ordBracketsSpLtc, currentAGISp);
      const spLtcFund = Math.min(spLtcGross, trad);
      const spEarlyPenalty = spLtcFund * earlyPenaltyRateSp;
      trad = Math.max(0, trad - spLtcFund - spEarlyPenalty);
      row.spouseLtcFundingEvent = true;
      row.spouseLtcFundingAmount = spLtcFund;
      row.spouseLtcFundingNet = archSpouseLtcNetAmount;
      row.spouseLtcFundingTax = spLtcTax;
      row.spouseLtcEarlyPenalty = spEarlyPenalty;
      // NOT added to sources.rmd — capital reallocation, not spendable income for bars
      row.totalIncome += spLtcFund;
    }

    // Determine effective filing status this year (primary death triggers surviving spouse scenario)
    const spouseAlive = filingStatus === 'mfj' && (primaryDeathAge === 0 || age <= primaryDeathAge);
    const effectiveStatus = spouseAlive ? 'mfj' : 'single';
    row.spouseAlive = spouseAlive;
    row.primaryDiedThisYear = (filingStatus === 'mfj' && primaryDeathAge > 0 && age === primaryDeathAge);

    // Social Security — primary
    let primarySS = 0, spouseSS = 0;
    if (age >= ssClaimAge) {
      primarySS = ssBenefitAtAge(ssMonthly, fra, ssClaimAge) * 12 * inflFactor;
    }
    const spouseAge = age - spouseDobOffset;
    if (spouseAlive) {
      if (spouseSsMonthly > 0 && spouseAge >= spouseSsClaimAge) {
        // Spouse has own SS record — receives greater of own benefit or 50% spousal benefit
        const ownBenefit = ssBenefitAtAge(spouseSsMonthly, spouseFra, spouseSsClaimAge) * 12 * inflFactor;
        const spousalBenefit = ssBenefitAtAge(ssMonthly, fra, fra) * 0.5 * 12 * inflFactor;
        spouseSS = Math.max(ownBenefit, spousalBenefit);
      } else if (spouseSsMonthly === 0 && spouseCurrentAge !== null && age >= ssClaimAge) {
        // Spouse has no own record — receives 50% spousal benefit while primary is alive
        spouseSS = ssBenefitAtAge(ssMonthly, fra, fra) * 0.5 * 12 * inflFactor;
      }
    } else if (filingStatus === 'mfj' && primaryDeathAge > 0) {
      // Primary has died — surviving spouse receives higher of their own benefit or deceased primary's
      const deceasedPrimaryBenefit = ssBenefitAtAge(ssMonthly, fra, ssClaimAge) * 12 * inflFactor;
      const survivorBenefit = Math.max(spouseSsMonthly > 0
        ? ssBenefitAtAge(spouseSsMonthly, spouseFra, spouseSsClaimAge) * 12 * inflFactor
        : 0, deceasedPrimaryBenefit);
      primarySS = survivorBenefit; // survivor receives one check — the higher of the two
      row.survivorBenefit = true;
      // Only ONE check in retirement after primary death
    }
    const totalSS = primarySS + spouseSS;
    if (totalSS > 0) {
      row.sources.ss = totalSS;
      row.totalIncome += totalSS;
    }

    // Primary Pension
    if (pensionMonthly > 0 && age >= pensionStartAge) {
      const primaryAlive = primaryDeathAge === 0 || age <= primaryDeathAge;
      let effectivePension = 0;

      if (filingStatus === 'single') {
        // Single: pension runs entire time — no survivor scenario
        effectivePension = pensionMonthly;
      } else {
        // Married
        if (primaryAlive) {
          // Primary is alive — full pension
          effectivePension = pensionMonthly;
        } else {
          // Primary has died
          if (pensionType === 'single') {
            effectivePension = 0; // single life — ceases at primary's death
          } else {
            // Joint & Survivor — spouse receives the prescribed percentage
            effectivePension = pensionMonthly * (pensionSurvivorPct / 100); // spouse receives survivor %
          }
        }
      }

      if (effectivePension > 0) {
        const pAnnual = effectivePension * 12 * inflFactor;
        row.sources.pension = (row.sources.pension || 0) + pAnnual;
        row.totalIncome += pAnnual;
      }
    }

    // Spouse Pension — starts at spousePensionStartAge, runs to planToAge
    if (spousePensionMonthly > 0 && filingStatus === 'mfj') {
      const spouseAge = age - spouseDobOffset;
      if (spouseAge >= spousePensionStartAge) {
        const spPAnnual = spousePensionMonthly * 12 * inflFactor;
        row.sources.pension = (row.sources.pension || 0) + spPAnnual;
        row.totalIncome += spPAnnual;
      }
    }

    // Part-time income
    if (partTimeMonthly > 0 && age <= partTimeEndAge) {
      const ptAnnual = partTimeMonthly * 12 * inflFactor;
      row.sources.parttime = ptAnnual;
      row.totalIncome += ptAnnual;
    }

    // Roth Annuity (Layer 1 — GLWB, tax-free)
    if (archRothAnnuityMonthly > 0 && age >= rothAnnuityStartAge) {
      const raAnnual = archRothAnnuityMonthly * 12;
      row.sources.roth = (row.sources.roth || 0) + raAnnual;
      row.totalIncome += raAnnual;
      row.rothAnnuityIncome = raAnnual;
    }

    // Non-Qualified Annuity (taxable over basis — exclusion ratio)
    // Exclusion ratio = basis / total contract value; that fraction of each payment is tax-free return of basis.
    // The remainder (gain portion) is ordinary income.
    if (archNonQualAnnuityMonthly > 0 && age >= nonQualAnnuityStartAge) {
      const nqAnnual = archNonQualAnnuityMonthly * 12;
      // Exclusion ratio: if basis and total value provided, compute; else default 50% (conservative)
      const exclusionRatio = (nonQualAnnuityBasis > 0 && nonQualAnnuityTotalValue > 0)
        ? Math.min(nonQualAnnuityBasis / nonQualAnnuityTotalValue, 1.0)
        : 0.50;
      const taxablePortion = nqAnnual * (1 - exclusionRatio); // ordinary income
      const taxFreePortion = nqAnnual * exclusionRatio;       // return of basis — not taxable
      row.sources.annuity = (row.sources.annuity || 0) + taxablePortion;
      row.sources.annuityTaxFree = (row.sources.annuityTaxFree || 0) + taxFreePortion;
      row.totalIncome += nqAnnual; // full cash received
      row.nonQualAnnuityIncome = nqAnnual;
    }
    // Qualified Annuity — Layer 1 (fully taxable, ordinary income)
    if (archQualAnnuityMonthly > 0 && age >= (qualAnnuityStartAge || retireAge)) {
      const qaAnnual = archQualAnnuityMonthly * 12 * inflFactor;
      row.sources.qualAnnuity = (row.sources.qualAnnuity || 0) + qaAnnual;
      row.qualAnnuityIncome = qaAnnual;
    }
    // Deduct premium at premium age
    if (qualAnnuityPremium > 0 && age === (qualAnnuityPremiumAge || retireAge) && architectureEnabled) {
      trad = Math.max(0, trad - qualAnnuityPremium);
      row.qualAnnuityPremiumDeducted = qualAnnuityPremium;
    }

    // ETA — Layer 3 IUL Policy Loan Income (IRC 7702 — tax-free, zero MAGI impact)
    // Income amount entered from advisor-run illustration (age, gender, health rating baked into illustration)
    if (archEtaAnnualIncome > 0 && age >= etaStartAge) {
      const etaYrs = age - etaStartAge; // years since income started
      const etaThisYear = etaColaRate > 0
        ? archEtaAnnualIncome * Math.pow(1 + etaColaRate, etaYrs)
        : archEtaAnnualIncome;
      row.sources.eta = (row.sources.eta || 0) + etaThisYear;
      row.totalIncome += etaThisYear;
      row.etaIncome = etaThisYear;
    }

    // RMD — Primary
    if (age >= 73 && trad > 0) {
      const rmdAmt = trad / getRMDFactor(age);
      row.sources.rmd = rmdAmt;
      row.totalIncome += rmdAmt;
      trad = Math.max(0, trad - rmdAmt); // growth applied end-of-year
    }

    // RMD — Spouse (separate account, separate schedule based on spouse's age)
    if (filingStatus === 'mfj' && spouseTrad > 0) {
      const spouseAge = age - spouseDobOffset;
      if (spouseAge >= 73) {
        const spouseRmdAmt = spouseTrad / getRMDFactor(spouseAge);
        row.sources.rmd = (row.sources.rmd || 0) + spouseRmdAmt;
        row.totalIncome += spouseRmdAmt;
        spouseTrad = Math.max(0, spouseTrad - spouseRmdAmt); // growth applied end-of-year
      }
    }

    // Strategic drawdown — intentional pre-gap draws (Roth Annuity conversion window, bracket filling; ETA funds tax cost)
    // Traditional / IRA intentional draw (pre-RMD Roth Annuity conversion; ETA helps fund the tax cost)
    const tradDrawStart = tradDrawdownStartAge || retireAge;
    const tradDrawEnd = tradDrawdownEndAge || 72; // default: stop when RMDs begin
    if (archAnnualTradDrawdown > 0 && age >= tradDrawStart && age <= tradDrawEnd && trad > 0) {
      const draw = Math.min(archAnnualTradDrawdown, trad);
      row.sources.rmd = (row.sources.rmd || 0) + draw; // shows as trad/ordinary income
      row.totalIncome += draw;
      trad = Math.max(0, trad - draw);
      row.strategicTradDraw = draw;
    }
    // Taxable brokerage intentional draw
    const taxableDrawStart = taxableDrawdownStartAge || retireAge;
    const taxableDrawEnd = taxableDrawdownEndAge || planToAge;
    if (archAnnualTaxableDrawdown > 0 && age >= taxableDrawStart && age <= taxableDrawEnd && taxable > 0) {
      const draw = Math.min(archAnnualTaxableDrawdown, taxable);
      row.sources.taxable = (row.sources.taxable || 0) + draw;
      row.totalIncome += draw;
      taxable = Math.max(0, taxable - draw);
      row.strategicTaxableDraw = draw;
    }
    // Roth intentional draw
    const rothDrawStart = rothDrawdownStartAge || retireAge;
    const rothDrawEnd = rothDrawdownEndAge || planToAge;
    if (archAnnualRothDrawdown > 0 && age >= rothDrawStart && age <= rothDrawEnd && roth > 0) {
      const draw = Math.min(archAnnualRothDrawdown, roth);
      row.sources.roth = (row.sources.roth || 0) + draw;
      row.totalIncome += draw;
      roth = Math.max(0, roth - draw);
      row.strategicRothDraw = draw;
    }

    // Expenses
    let expenses = (fixedExpenses + lifestyleExpenses) * 12 * inflFactor;
    row.baseExpense = expenses; // living expenses only — before any care event is added

    // LTC event — net cost after any Layer 2 benefit coverage
    if (ltcEventAge > 0 && age >= ltcEventAge && age < ltcEventAge + ltcDuration) {
      // Inflate from today's dollars to event-year dollars using care-specific inflation rate
      const careInflYrs = ltcEventAge - retireAge;
      const ltcInflFactor = Math.pow(1 + ltcCareInflationRate, careInflYrs);
      const ltcAnnualCost = ltcMonthlyCost * 12 * ltcInflFactor;
      const benefitCoverage = ltcInsured ? ltcAnnualCost : 0;
      const uncoveredLtcCost = ltcAnnualCost - benefitCoverage;
      expenses += uncoveredLtcCost;
      row.ltcEvent = true;
      row.ltcAnnualCost = ltcAnnualCost;
      row.ltcCoverage = benefitCoverage;
      row.ltcUncovered = uncoveredLtcCost;
      row.ltcInflFactor = ltcInflFactor;
    }

    // Spouse LTC event — same mechanics, independent age/cost/duration
    if (spouseLtcEventAge > 0 && age >= spouseLtcEventAge && age < spouseLtcEventAge + spouseLtcDuration) {
      const spCareInflYrs = spouseLtcEventAge - retireAge;
      const spLtcInflFactor = Math.pow(1 + ltcCareInflationRate, spCareInflYrs);
      const spLtcAnnualCost = spouseLtcMonthlyCost * 12 * spLtcInflFactor;
      const spBenefitCoverage = spouseLtcInsured ? spLtcAnnualCost : 0;
      const spUncoveredLtcCost = spLtcAnnualCost - spBenefitCoverage;
      expenses += spUncoveredLtcCost;
      row.spouseLtcEvent = true;
      row.spouseLtcAnnualCost = spLtcAnnualCost;
      row.spouseLtcCoverage = spBenefitCoverage;
      row.spouseLtcUncovered = spUncoveredLtcCost;
      row.spouseLtcInflFactor = spLtcInflFactor;
    }

    // Expense shock — recurring unplanned expense every N years (e.g. $50K every 8 years)
    if (expenseShockEnabled && expenseShockAmount > 0 && expenseShockFrequency > 0) {
      const yearsIntoRetirement = age - retireAge;
      if (yearsIntoRetirement >= 0 && yearsIntoRetirement % expenseShockFrequency === 0) {
        const shockInflated = expenseShockAmount * inflFactor;
        expenses += shockInflated;
        row.expenseShockAmount = shockInflated;
      }
    }

    row.totalExpense = expenses;
    // Gap uses only spendable income — purpose-driven events (ETA funding, Roth conversion,
    // LTC policy premium draw) are non-spendable IRA distributions that go directly to
    // the policy/conversion, not into the client's pocket to pay living expenses.
    // Treating them as spendable would cause the model to skip the gap-fill in event years,
    // making living expenses appear "free" and understating portfolio draws.
    const nonSpendableEvents = (row.etaFundingAmount || 0)
      + (row.rothConversionAmount || 0)
      + (row.ltcFundingAmount || 0);
    row.spendableIncome = row.totalIncome - nonSpendableEvents;
    row.gap = row.spendableIncome - expenses;

    // ── Shared gross-up utilities — hoisted outside gap block so IRMAA fill can also use them ──
    const isMFJeff = effectiveStatus === 'mfj';
    const stdDed = (isMFJeff ? STD_DEDUCTION_MFJ : STD_DEDUCTION_SINGLE) * inflFactor;
    const ordIncomeBeforeDraw =
      (row.sources.ss||0)*0.85
      + (row.sources.pension||0)
      + (row.sources.rmd||0)
      + (row.sources.parttime||0)
      + (row.sources.annuity||0); // gain portion only (exclusion already applied)
    const baseOrdAGI = Math.max(0, ordIncomeBeforeDraw - stdDed);

    const grossUpIterative = (netNeeded, brackets, currentAGI) => {
      let grossSoFar = 0, taxSoFar = 0, netSoFar = 0;
      let position = currentAGI;
      for (const b of brackets) {
        if (netSoFar >= netNeeded) break;
        if (position >= b.limit) continue;
        const spaceGross = b.limit - position;
        const netRate = 1 - b.rate;
        const spaceNet = spaceGross * netRate;
        const stillNeed = netNeeded - netSoFar;
        if (spaceNet >= stillNeed) {
          const grossSlice = netRate > 0 ? stillNeed / netRate : stillNeed;
          grossSoFar += grossSlice;
          taxSoFar += grossSlice * b.rate;
          netSoFar = netNeeded;
          break;
        } else {
          grossSoFar += spaceGross;
          taxSoFar += spaceGross * b.rate;
          netSoFar += spaceNet;
          position = b.limit;
        }
      }
      if (netSoFar < netNeeded) {
        const topRate = brackets[brackets.length - 1].rate;
        const stillNeed = netNeeded - netSoFar;
        const grossSlice = topRate < 1 ? stillNeed / (1 - topRate) : stillNeed * 5;
        grossSoFar += grossSlice;
        taxSoFar += grossSlice * topRate;
      }
      return { grossDraw: grossSoFar, taxOnDraw: taxSoFar };
    };

    // ── Gap-fill with bracket-creep-aware gross-up ──
    // For LTC years: compute how much of the gap is specifically due to LTC cost,
    // so we can accurately report gross-up tax attributable to the care event.
    const baseGapWithoutLtc = row.ltcEvent
      ? row.totalIncome - (row.totalExpense - (row.ltcUncovered || 0))
      : null;
    // Include spouse LTC cost in the driven-gap calculation so portfolio draws are attributed
    const ltcDrivenGap = (row.ltcEvent ? (row.ltcUncovered || 0) : 0)
                       + (row.spouseLtcEvent ? (row.spouseLtcUncovered || 0) : 0);
    const isAnyLtcEvent = row.ltcEvent || row.spouseLtcEvent;

    if (row.gap < 0) {
      const needed = Math.abs(row.gap);
      let remaining = needed;
      // Track how much of the draw is attributable to LTC vs baseline gap
      const baselineGapAmt = Math.max(0, baseGapWithoutLtc !== null ? -baseGapWithoutLtc : needed);
      const ltcPortionOfGap = Math.min(needed, ltcDrivenGap);
      let ltcRemaining = ltcPortionOfGap; // track LTC-specific portion

      // --- Taxable brokerage: LTCG gross-up, stacked on ordinary income ---
      if (taxable > 0 && remaining > 0) {
        const ltcgBracketsEff = (isMFJeff ? LTCG_MFJ_2025 : LTCG_SINGLE_2025)
          .map(b => ({ limit: b.limit * inflFactor, rate: Math.min(b.rate + stressAdder, 0.99) }));
        // LTCG stacks on top of ordinary income — start bracket walk at baseOrdAGI
        const netToDraw = Math.min(remaining, taxable * 0.9);
        const { grossDraw, taxOnDraw } = grossUpIterative(netToDraw, ltcgBracketsEff, baseOrdAGI);
        const actualGross = Math.min(taxable, grossDraw);
        const taxProportion = grossDraw > 0 ? taxOnDraw / grossDraw : 0;
        const actualTax = actualGross * taxProportion;
        const actualNet = actualGross - actualTax;
        row.sources.taxable = (row.sources.taxable || 0) + actualGross;
        row.totalIncome += actualGross;
        // Only attribute gross-up tax to LTC for the LTC-driven portion of this draw
        if (isAnyLtcEvent && ltcRemaining > 0 && !ltcInsured) {
          const ltcShare = Math.min(actualNet, ltcRemaining) / Math.max(actualNet, 0.01);
          row.ltcGrossUpTax = (row.ltcGrossUpTax || 0) + actualTax * ltcShare;
          row.ltcPortfolioDraw = (row.ltcPortfolioDraw || 0) + actualGross * ltcShare;
          ltcRemaining -= Math.min(actualNet, ltcRemaining);
        }
        taxable = Math.max(0, taxable - actualGross);
        remaining -= actualNet;
      }

      // --- Roth / tax-free: no gross-up needed ---
      if (remaining > 0 && roth > 0) {
        const draw = Math.min(roth, remaining);
        row.sources.roth = (row.sources.roth || 0) + draw;
        row.totalIncome += draw;
        if (isAnyLtcEvent && ltcRemaining > 0) ltcRemaining -= Math.min(draw, ltcRemaining);
        roth = Math.max(0, roth - draw);
        remaining -= draw;
      }

      // --- Traditional / IRA: ordinary income gross-up ---
      if (remaining > 0 && trad > 0) {
        const ordBracketsEff = (isMFJeff ? TAX_BRACKETS_MFJ_2025 : TAX_BRACKETS_SINGLE_2025)
          .map(b => ({ limit: b.limit * inflFactor, rate: Math.min(b.rate + stressAdder, 0.99) }));
        // Start ordinary bracket walk at baseOrdAGI + any taxable gross-up already added
        const adjOrdAGI = baseOrdAGI + (row.sources.taxable || 0) * 0.15;
        const netToDraw = Math.min(remaining, trad);
        const { grossDraw, taxOnDraw } = grossUpIterative(netToDraw, ordBracketsEff, adjOrdAGI);
        const actualGross = Math.min(trad, grossDraw);
        const taxProportion = grossDraw > 0 ? taxOnDraw / grossDraw : 0;
        const actualTax = actualGross * taxProportion;
        const actualNet = actualGross - actualTax;
        row.sources.rmd = (row.sources.rmd || 0) + actualGross;
        row.totalIncome += actualGross;
        // Only attribute gross-up tax to LTC for the LTC-driven portion of this draw
        if (isAnyLtcEvent && ltcRemaining > 0 && !ltcInsured) {
          const ltcShare = Math.min(actualNet, ltcRemaining) / Math.max(actualNet, 0.01);
          row.ltcGrossUpTax = (row.ltcGrossUpTax || 0) + actualTax * ltcShare;
          row.ltcPortfolioDraw = (row.ltcPortfolioDraw || 0) + actualGross * ltcShare;
          ltcRemaining -= Math.min(actualNet, ltcRemaining);
        }
        trad = Math.max(0, trad - actualGross);
        remaining -= actualNet;
      }

      row.gap = 0;
    }
    // Note: if gap >= 0, all expenses including LTC are already covered by existing income.
    // No additional draw needed — the gap < 0 path above handles all portfolio draws.

    // End-of-year growth — applied once here for ALL paths (deficit, surplus, LTC surplus)
    taxable = taxable * (1 + yearReturn);
    roth = roth * (1 + yearReturn);
    trad = trad * (1 + yearReturn);
    spouseTrad = spouseTrad * (1 + yearReturn);

    // Portfolio snapshot
    row.totalPortfolio = trad + roth + taxable + spouseTrad;
    row.trad = trad; row.roth = roth; row.taxable = taxable; row.spouseTrad = spouseTrad;

    // IRMAA MAGI — only taxable sources count. Tax-free sources (Roth, ETA policy loans,
    // LTC benefit proceeds, Roth annuity) are explicitly excluded — they do not appear
    // in MAGI and cannot trigger IRMAA surcharges. sources.roth and sources.eta are
    // intentionally absent from this calculation.
    // Taxable portfolio distributions count at ~15% (gain portion) for MAGI approximation
    // Traditional/RMD counts fully as ordinary income
    const magi = (row.sources.ss||0)*0.85
      + (row.sources.rmd||0)
      + (row.sources.pension||0)
      + (row.sources.parttime||0)
      + (row.sources.annuity||0)       // gain portion only (exclusion already applied)
      + (row.sources.taxable||0)*0.85; // conservative — treat most of taxable as gain
    row.magi = magi;
    magiHistory[age] = magi; // store for IRMAA lookback in future years

    // IRMAA 2-year lookback: Medicare uses MAGI from 2 years prior.
    // If lookback year has no data (e.g. pre-retirement), fall back to current MAGI
    // so the tool is conservative and doesn't under-estimate in early retirement years.
    const irmaaMagi = magiHistory[age - 2] !== undefined ? magiHistory[age - 2] : preRetireMagi;
    row.irmaaMagi = irmaaMagi; // stored for display/debug
    row.irmaaMagiYear = magiHistory[age - 2] !== undefined ? age - 2 : retireAge - 2;
    // After spouse death: single IRMAA brackets apply immediately (no year of death grace on brackets)
    const personsOnMedicare = spouseAlive
      ? (age >= 65 ? 1 : 0) + ((age - spouseDobOffset) >= 65 ? 1 : 0)
      : (age >= 65 ? 1 : 0);
    row.irmaa = personsOnMedicare > 0 ? calcIRMAA(irmaaMagi, effectiveStatus, personsOnMedicare) : 0;
    // IRMAA is a real expense — subtract from net spendable income
    // IRMAA spikes in LTC years because grossed-up draws push MAGI higher.
    // We need to fill the IRMAA gap from the portfolio too (gross it up from trad if available).
    if (row.irmaa > 0) {
      row.totalExpense += row.irmaa;
      row.irmaaExpense = row.irmaa;
      // Fill IRMAA gap — draw from Roth first (no gross-up), then traditional (gross-up)
      let irmaaRemaining = row.irmaa;
      if (roth > 0 && irmaaRemaining > 0) {
        const draw = Math.min(roth, irmaaRemaining);
        row.sources.roth = (row.sources.roth || 0) + draw;
        row.totalIncome += draw;
        roth = Math.max(0, roth - draw);
        irmaaRemaining -= draw;
      }
      if (trad > 0 && irmaaRemaining > 0) {
        // Gross up from traditional to cover IRMAA net cost
        const ordBracketsIrmaa = (isMFJeff ? TAX_BRACKETS_MFJ_2025 : TAX_BRACKETS_SINGLE_2025)
          .map(b => ({ limit: b.limit * inflFactor, rate: Math.min(b.rate + stressAdder, 0.99) }));
        const adjAGIForIrmaa = baseOrdAGI + (row.sources.taxable || 0) * 0.15 + (row.sources.rmd || 0);
        const { grossDraw, taxOnDraw } = grossUpIterative(irmaaRemaining, ordBracketsIrmaa, adjAGIForIrmaa);
        const actualGross = Math.min(trad, grossDraw);
        row.sources.rmd = (row.sources.rmd || 0) + actualGross;
        row.totalIncome += actualGross;
        trad = Math.max(0, trad - actualGross);
      }
    }

    // ── Annual income tax estimate (federal + state) ──
    // row.sources already includes grossed-up LTC draws — elevated income in LTC years
    // is fully captured. stressAdder defined at loop top applies throughout.
    const taxResult = calcAnnualTax(row.sources, effectiveStatus, inflFactor, stressAdder);
    // State tax
    const stateCustom = customStateRate !== '' && customStateRate !== undefined
      ? parseFloat(customStateRate) : undefined;
    const effectiveStateRate = stateCustom !== undefined
      ? stateCustom + stressAdder * 100   // stressAdder is already /100, convert back for % math
      : undefined;
    const stateTax = calcStateTax(row.sources, stateCode, inflFactor, effectiveStateRate, stressAdder);

    row.effectiveTaxRate = taxResult.effectiveRate;
    row.marginalFedRate = taxResult.marginalRate;
    // All-in marginal = federal marginal + state effective rate on top dollar
    const stateEffRate = (customStateRate !== '' && customStateRate !== undefined)
      ? Math.min(parseFloat(customStateRate) / 100 + stressAdder, 0.99)
      : Math.min((STATE_TAX_DATA[stateCode]?.rate || 0) + stressAdder, 0.99);
    row.allInMarginalRate = Math.min(taxResult.marginalRate + stateEffRate, 0.99);
    row.stateTaxRate = stateEffRate;
    row.ordinaryTax = taxResult.ordinaryTax;
    row.ltcgTax = taxResult.ltcgTax;
    row.ltcGrossUpTaxNote = row.ltcEvent && row.ltcGrossUpTax > 0
      ? `LTC draws grossed up — $${Math.round((row.ltcGrossUpTax||0)/1000)}K additional tax this year`
      : null;

    // ── Roth Conversion Overage Gross-Up (resolved post-tax with actual marginal rate) ──
    // Now that calcAnnualTax has run with the full income stack (including the conversion amount),
    // we know the real marginal rate for this year. Use it to:
    //   1. Compute actual tax on the conversion:  convTax = convAmt × marginalRate
    //   2. Subtract financed portion (bank loan — no IRA draw needed): overage = convTax − financed
    //   3. Gross up the overage: grossUp = overage / (1 − marginalRate)
    // This is the additional IRA withdrawal needed to net exactly the overage tax after taxes.
    if (row._conversionOveragePending) {
      const { convAmt, financed } = row._conversionOveragePending;
      const allInRate = row.allInMarginalRate || taxResult.marginalRate;
      const convTax = convAmt * allInRate;                              // actual tax on conversion
      const overageTax = Math.max(0, convTax - financed);              // unfinanced portion — must come from IRA
      if (overageTax > 0 && trad > 0) {
        const grossUp = Math.min(trad, overageTax / (1 - allInRate));  // gross-up so net covers the overage
        trad = Math.max(0, trad - grossUp);
        // NOT added to sources.rmd — tax-covering draw, not spendable income
        row.totalIncome += grossUp;
        row.rothConversionOverage = grossUp;
        row.rothConversionOverageTax = overageTax;
        row.rothConversionMarginalRate = allInRate;
      }
      delete row._conversionOveragePending;
    }

    // estimatedTax captured here — after overage gross-up resolves so the tax on
    // the gross-up draw (which increased totalIncome) is fully reflected.
    // grossUp tax ≈ grossUp × allInRate, already baked into the re-run of calcAnnualTax implicitly
    // via the income stack. We approximate by adding overageTax to the base federal tax.
    row.federalTax = taxResult.totalTax + (row.rothConversionOverageTax || 0);
    row.stateTax   = stateTax + (row.rothConversionOverage || 0) * stateEffRate;
    row.estimatedTax = row.federalTax + row.stateTax;

    // Capture gross income (pre-tax, excludes overage gross-up draw which is a tax-covering draw not spendable income)
    row.grossIncome = row.totalIncome - (row.rothConversionOverage || 0);

    // Capture pre-tax guaranteed income for the stat card ratio
    // (sources are reduced by tax apportionment below — capture them now while still gross)
    row.grossGuaranteedIncome =
      (row.sources.ss      || 0) +
      (row.sources.pension || 0) +
      (row.rothAnnuityIncome    || 0) +
      (row.nonQualAnnuityIncome || 0) +
      (row.qualAnnuityIncome     || 0);

    // Combined all-in tax (federal + state; IRMAA already in expenses)
    const totalAllInTax = taxResult.totalTax + stateTax;

    // Reduce each source proportionally to show after-tax net on the arc
    const taxableSources = ['ss','pension','rmd','parttime','taxable','annuity'];
    const totalTaxableIncome = taxableSources.reduce((s, k) => s + (row.sources[k] || 0), 0);
    if (totalAllInTax > 0 && totalTaxableIncome > 0) {
      taxableSources.forEach(k => {
        if (row.sources[k]) {
          const share = row.sources[k] / totalTaxableIncome;
          row.sources[k] = Math.max(0, row.sources[k] - totalAllInTax * share);
        }
      });
      row.totalIncome = Math.max(0, row.totalIncome - totalAllInTax);
    }

    // chartSources: bars show all spendable income.
    // Only strip one-time capital reallocation draws (ETA premium, Roth conversion,
    // LTC/spouse policy premiums) — these are portfolio movements, not income.
    // Everything else including RMDs and care gap-fill draws stays in the bars.
    const _nonSpend = (row.etaFundingAmount || 0)
      + (row.rothConversionAmount || 0) + (row.rothConversionOverage || 0)
      + (row.ltcFundingAmount || 0) + (row.spouseLtcFundingAmount || 0);
    row.chartSources = { ...row.sources };
    if (_nonSpend > 0 && row.chartSources.rmd) {
      row.chartSources.rmd = Math.max(0, row.chartSources.rmd - _nonSpend);
      if (row.chartSources.rmd === 0) delete row.chartSources.rmd;
    }
    years.push(row);
  }

  // Monte Carlo — run from the actual post-LTC portfolio balance so that a care event
  // correctly reduces the confidence score when uninsured (portfolio is already depleted
  // by the time Monte Carlo picks up). Without this, toggling insurance has zero effect
  // on confidence because the simulation always starts from pre-LTC balances.
  const totalExpensesY1 = (fixedExpenses + lifestyleExpenses) * 12;
  const spouseSsAtRetire = filingStatus === 'mfj' ? (spouseSsMonthly > 0 ? ssBenefitAtAge(spouseSsMonthly, spouseFra, spouseSsClaimAge)*12 : ssBenefitAtAge(ssMonthly, fra, fra)*0.5*12) : 0;
  const ssIncomeY1 = (ssBenefitAtAge(ssMonthly, fra, ssClaimAge) * 12) + spouseSsAtRetire;

  // MC always runs from retirement for the FULL span — this correctly captures the
  // compounding impact of a mid-retirement care event. Running from post-LTC only tests
  // a short tail (e.g. 8 years) where even a depleted portfolio usually survives,
  // making insured vs uninsured look nearly identical — which is wrong.
  const mcStartAge = retireAge;
  const mcStartBalance = years[0] ? years[0].totalPortfolio : (traditionalBalance + rothBalance + taxableBalance);
  const mcYears = planToAge - retireAge;
  const ssAtMcStart = ssIncomeY1; // MC starts at retirement — no inflation offset needed
  const expensesAtMcStart = totalExpensesY1;

  // Build fixed income streams — each stream has a yearOffset (years after MC start age
  // when it begins). Pension is always immediate (started at retirement).
  // Annuities may be deferred — their start ages are compared to mcStartAge.
  // IMPORTANT: use arch-gated values so MC respects Architecture ON/OFF toggle.
  const fixedStreams = [];

  // Pension — respects start age relative to MC start (retirement age)
  if (pensionMonthly > 0) {
    const offset = Math.max(0, pensionStartAge - mcStartAge);
    fixedStreams.push({ yearOffset: offset, annual: pensionMonthly * 12 });
  }
  // Spouse pension — added to fixed streams if married
  if (spousePensionMonthly > 0 && filingStatus === 'mfj') {
    const spOffset = Math.max(0, spousePensionStartAge - mcStartAge);
    fixedStreams.push({ yearOffset: spOffset, annual: spousePensionMonthly * 12 });
  }

  // Roth annuity — only when architecture is enabled (Layer 1 product)
  if (archRothAnnuityMonthly > 0) {
    const offset = Math.max(0, rothAnnuityStartAge - mcStartAge);
    fixedStreams.push({ yearOffset: offset, annual: archRothAnnuityMonthly * 12 });
  }

  // Non-qualified annuity — only when architecture is enabled
  if (archNonQualAnnuityMonthly > 0) {
    const offset = Math.max(0, nonQualAnnuityStartAge - mcStartAge);
    fixedStreams.push({ yearOffset: offset, annual: archNonQualAnnuityMonthly * 12 });
  }

  // ETA policy loan income — only when architecture is enabled (Layer 3 product)
  // MC uses Year 1 amount as a conservative floor — COLA growth is reflected in the main projection arc
  if (archEtaAnnualIncome > 0) {
    const offset = Math.max(0, etaStartAge - mcStartAge);
    fixedStreams.push({ yearOffset: offset, annual: archEtaAnnualIncome });
  }

  // LTC shock: pass today's-dollar NET care cost. MC handles inflation + gross-up.
  // Do NOT use ltcPortfolioDraw — it is 0 when RMDs cover care costs in the
  // deterministic run, causing MC to see no shock on large portfolios.
  const ltcShockYear = (ltcEventAge > 0 && !ltcInsured) ? ltcEventAge - retireAge : -1;
  const ltcShockAnnual = (ltcShockYear >= 0) ? ltcMonthlyCost * 12 : 0;
  const spouseLtcShockYear = (spouseLtcEventAge > 0 && !spouseLtcInsured) ? spouseLtcEventAge - retireAge : -1;
  const spouseLtcShockAnnual = (spouseLtcShockYear >= 0) ? spouseLtcMonthlyCost * 12 : 0;

  const confidence = runMonteCarlo(
    mcStartBalance,
    0,
    mcYears,
    1000,
    portfolioReturn,
    inflation,
    ssAtMcStart,
    fixedStreams,
    expensesAtMcStart,
    ltcShockYear,
    ltcShockAnnual,
    ltcDuration,
    spouseLtcShockYear,
    spouseLtcShockAnnual,
    spouseLtcDuration,
    ltcCareInflationRate,
    expenseShockEnabled ? (expenseShockAmount || 50000) : 0,
    expenseShockEnabled ? (expenseShockFrequency || 8) : 0
  );

  return { years, confidence, fixedStreams, mcStartAge };
}

// ── Input field component ──
function Field({ label, hint, children }) {
  return (
    <div style={{marginBottom:18}}>
      <div style={{fontSize:14,fontWeight:500,color:'#8AABB8',letterSpacing:'.04em',marginBottom:6,textTransform:'uppercase'}}>{label}</div>
      {hint && <div style={{fontSize:13,color:'#8DAFC8',marginBottom:7,lineHeight:1.5}}>{hint}</div>}
      {children}
    </div>
  );
}

function NumInput({ value, onChange, placeholder, prefix, suffix }) {
  const isDollar = prefix === '$';
  const [focused, setFocused] = React.useState(false);
  const [raw, setRaw] = React.useState('');

  // Format a number with commas for display
  const formatNum = v => {
    if (v === 0 || v === '' || v === null || v === undefined) return '';
    const n = Number(v);
    if (isNaN(n)) return '';
    return n.toLocaleString('en-US', { maximumFractionDigits: 0 });
  };

  // Strip commas and parse
  const parseNum = str => {
    const stripped = String(str).replace(/,/g, '').replace(/[^0-9.-]/g, '');
    return stripped === '' ? 0 : Number(stripped);
  };

  const displayValue = focused
    ? raw
    : (isDollar ? formatNum(value) : (value || ''));

  const handleFocus = () => {
    setFocused(true);
    setRaw(value ? String(value) : '');
  };

  const handleChange = e => {
    const v = e.target.value;
    if (isDollar) {
      // Allow only digits, commas, dots, minus
      const clean = v.replace(/[^0-9.,\-]/g, '');
      setRaw(clean);
      const parsed = parseNum(clean);
      onChange(parsed);
    } else {
      setRaw(v);
      onChange(v === '' ? 0 : Number(v));
    }
  };

  const handleBlur = () => {
    setFocused(false);
    setRaw('');
  };

  return (
    <div style={{position:'relative',display:'flex',alignItems:'center'}}>
      {prefix && <span style={{position:'absolute',left:13,color:'#9EB8CC',fontSize:13,pointerEvents:'none'}}>{prefix}</span>}
      <input
        className="ia-input"
        type="text"
        inputMode={isDollar ? 'numeric' : 'decimal'}
        value={displayValue}
        onChange={handleChange}
        onFocus={handleFocus}
        onBlur={handleBlur}
        placeholder={placeholder || '0'}
        style={{paddingLeft: prefix ? 26 : 14, paddingRight: suffix ? 40 : 14}}
      />
      {suffix && <span style={{position:'absolute',right:13,color:'#9EB8CC',fontSize:13,pointerEvents:'none'}}>{suffix}</span>}
    </div>
  );
}

// ── Arc SVG Chart ──
function ArcChart({ data, view, insuredData, uninsuredData, sorrEnabled }) {
  const svgRef = useRef(null);
  const W = 720;
  const MAIN_H = 240, IRMAA_H = 48, IRMAA_GAP = 10, AGE_H = 20;
  const H = MAIN_H + IRMAA_GAP + IRMAA_H + AGE_H;
  const PAD = { t:20, r:20, b:0, l:50 };
  const chartW = W - PAD.l - PAD.r;
  const chartH = MAIN_H - PAD.t;

  if (!data || data.length === 0) return null;

  // Architecture mode = insuredData present (Architecture ON with LTC comparison)
  const archMode = !!insuredData;

  // maxVal: scale chart to the expense line with headroom.
  // We use max totalExpense * 1.25 so bars that slightly exceed expenses still fit,
  // but we don't let large RMD surplus years (where income >> expenses) blow out the scale.
  // Also ensure the expense line itself always fits with 25% room.
  const maxExpense = Math.max(
    ...data.map(d => d.totalExpense || 0),
    ...(insuredData ? insuredData.map(d => d.totalExpense || 0) : []),
    ...(uninsuredData ? uninsuredData.map(d => d.totalExpense || 0) : [])
  );
  const maxBarNatural = Math.max(
    ...data.map(d => {
      const src = d.chartSources || d.sources;
      return Object.values(src).reduce((s,v) => s+(v||0), 0);
    }),
    ...(insuredData ? insuredData.map(d => {
      const src = d.chartSources || d.sources;
      return Object.values(src).reduce((s,v) => s+(v||0), 0);
    }) : [])
  );
  // Cap bar-driven scale at 1.5x max expense; always show at least max expense * 1.25
  const maxVal = Math.max(maxExpense * 1.25, Math.min(maxBarNatural, maxExpense * 1.5)) * 1.05;
  const barW = Math.max(4, Math.floor(chartW / data.length) - 2);

  const xScale = i => PAD.l + (i / (data.length - 1)) * chartW;
  const yScale = v => PAD.t + chartH - (v / maxVal) * chartH;

  // STATUS QUO mode: single expense line = totalExpense (with LTC spike)
  // ARCHITECTURE mode: use base data (non-arch) totalExpense for the uninsured spike line
  const expenseSrcData = (archMode && uninsuredData) ? uninsuredData : data;
  const expensePath = expenseSrcData.map((d, i) => {
    const val = d.totalExpense || 0;
    return `${i === 0 ? 'M' : 'L'} ${xScale(i).toFixed(1)} ${yScale(val).toFixed(1)}`;
  }).join(' ');

  // (careEventPath removed — in arch mode, expensePath uses uninsuredData and shows spike directly)

  // ARCHITECTURE mode: insured/protected line uses arch-ON data baseExpense (flat — policy absorbs care)
  const insuredExpensePath = archMode ? data.map((d, i) =>
    `${i === 0 ? 'M' : 'L'} ${xScale(i).toFixed(1)} ${yScale(d.baseExpense || d.totalExpense || 0).toFixed(1)}`
  ).join(' ') : null;

  // Pre-compute care event bands: one band per distinct event period
  // In arch mode, use uninsuredData (which has the care events) for band detection
  const careEventSrc = (archMode && uninsuredData) ? uninsuredData : data;
  const careEventBands = (() => {
    const bands = [];
    const ltcRows = careEventSrc.reduce((acc, d, i) => { if (d.ltcEvent) acc.push(i); return acc; }, []);
    if (ltcRows.length > 0) bands.push({ indices: ltcRows, label: 'HC Event', color: 'rgba(196,106,106,' });
    const spLtcRows = careEventSrc.reduce((acc, d, i) => { if (d.spouseLtcEvent) acc.push(i); return acc; }, []);
    if (spLtcRows.length > 0) bands.push({ indices: spLtcRows, label: 'Spouse HC', color: 'rgba(196,120,180,' });
    return bands;
  })();

  // Care-event-only expense path — rendered thicker on top of main line to highlight spike
  const careExpensePath = !archMode ? (() => {
    const segs = [];
    let current = [];
    expenseSrcData.forEach((d, i) => {
      if (d.ltcEvent || d.spouseLtcEvent) {
        current.push(`${current.length === 0 ? 'M' : 'L'} ${xScale(i).toFixed(1)} ${yScale(d.totalExpense || 0).toFixed(1)}`);
      } else if (current.length > 0) {
        segs.push(current.join(' '));
        current = [];
      }
    });
    if (current.length > 0) segs.push(current.join(' '));
    return segs.length > 0 ? segs.join(' M ') : null;
  })() : null;

  const sourceKeys = ['ss','pension','annuity','qualAnnuity','parttime','roth','eta','taxable','rmd'];

  const fmt = v => v >= 1000000 ? `$${(v/1000000).toFixed(1)}M` : v >= 1000 ? `$${Math.round(v/1000)}K` : `$${Math.round(v)}`;

  return (
    <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto',overflow:'visible'}}>
      <defs>
        {sourceKeys.map(k => (
          <linearGradient key={k} id={`grad-${k}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={COLORS[k].fill} stopOpacity="0.9"/>
            <stop offset="100%" stopColor={COLORS[k].fill} stopOpacity="0.5"/>
          </linearGradient>
        ))}
        <linearGradient id="grad-expense" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor="#C47A7A" stopOpacity="0.9"/>
          <stop offset="100%" stopColor="#C8A030" stopOpacity="0.9"/>
        </linearGradient>
        <linearGradient id="grad-care-event" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor="#C47A7A" stopOpacity="1"/>
          <stop offset="100%" stopColor="#C47A7A" stopOpacity="0.8"/>
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      {/* Grid lines */}
      {[0, 0.25, 0.5, 0.75, 1].map(f => {
        const y = PAD.t + chartH * (1 - f);
        return (
          <g key={f}>
            <line x1={PAD.l} x2={W-PAD.r} y1={y} y2={y} stroke="rgba(255,255,255,.05)" strokeWidth="1"/>
            <text x={PAD.l-6} y={y+4} textAnchor="end" fill="#8DAFC8" fontSize="11" fontFamily="DM Sans">
              {fmt(maxVal * f)}
            </text>
          </g>
        );
      })}

      {/* Care event bands — rendered behind bars, one clean span per event period */}
      {careEventBands.map((band, bi) => {
        const x0 = xScale(band.indices[0]) - barW/2 - 2;
        const x1 = xScale(band.indices[band.indices.length-1]) + barW/2 + 2;
        const bandW = x1 - x0;
        const midX = (x0 + x1) / 2;
        const startAge = data[band.indices[0]]?.age;
        const endAge = data[band.indices[band.indices.length-1]]?.age;
        const labelY = PAD.t - 6;
        return (
          <g key={bi}>
            {/* Shaded band behind bars */}
            <rect x={x0} y={PAD.t} width={bandW} height={chartH}
              fill={`${band.color}0.09)`} rx="2"/>
            {/* Left dotted boundary */}
            <line x1={x0} x2={x0} y1={PAD.t} y2={PAD.t + chartH}
              stroke={`${band.color}0.7)`} strokeWidth="1.5" strokeDasharray="4,3"/>
            {/* Right dotted boundary */}
            <line x1={x1} x2={x1} y1={PAD.t} y2={PAD.t + chartH}
              stroke={`${band.color}0.7)`} strokeWidth="1.5" strokeDasharray="4,3"/>
            {/* Top bracket line */}
            <line x1={x0} x2={x1} y1={PAD.t} y2={PAD.t}
              stroke={`${band.color}0.5)`} strokeWidth="1"/>
            {/* Label above chart */}
            <text x={midX} y={labelY} textAnchor="middle"
              fill={`${band.color}0.85)`} fontSize="9" fontFamily="DM Sans" fontWeight="600" letterSpacing="0.04em">
              {band.label} {startAge}–{endAge}
            </text>
          </g>
        );
      })}

      {/* Stacked bars */}
      {data.map((d, i) => {
        let yBottom = PAD.t + chartH;
        const x = xScale(i) - barW/2;
        return (
          <g key={i}>
            {sourceKeys.map(k => {
              const v = (d.chartSources || d.sources)[k] || 0;
              if (v <= 0) return null;
              const barH = (v / maxVal) * chartH;
              const y = yBottom - barH;
              yBottom -= barH;
              return (
                <rect
                  key={k}
                  x={x} y={y} width={barW} height={barH}
                  fill={`url(#grad-${k})`}
                  className="bar-segment"
                  style={{animationDelay: `${i * 0.02}s`}}
                />
              );
            })}
            {/* ETA Funding Event marker */}
            {d.etaFundingEvent && (
              <g>
                <line x1={xScale(i)} x2={xScale(i)} y1={PAD.t} y2={PAD.t+chartH}
                  stroke="rgba(168,197,216,.6)" strokeWidth="2" strokeDasharray="4,3"/>
                <text x={xScale(i)+4} y={PAD.t+14} textAnchor="start"
                  fill="#A8C5D8" fontSize="9" fontFamily="DM Sans" fontWeight="700">
                  ⚡ ETA
                </text>
              </g>
            )}
            {/* Roth Conversion Event marker */}
            {d.rothConversionEvent && (
              <g>
                <line x1={xScale(i)} x2={xScale(i)} y1={PAD.t} y2={PAD.t+chartH}
                  stroke="rgba(123,175,132,.6)" strokeWidth="2" strokeDasharray="4,3"/>
                <text x={xScale(i)+4} y={PAD.t+26} textAnchor="start"
                  fill="#7BAF84" fontSize="9" fontFamily="DM Sans" fontWeight="700">
                  ✦ ROTH
                </text>
              </g>
            )}
            {/* LTC Funding Event marker */}
            {d.ltcFundingEvent && (
              <g>
                <line x1={xScale(i)} x2={xScale(i)} y1={PAD.t} y2={PAD.t+chartH}
                  stroke="rgba(155,126,200,.5)" strokeWidth="2" strokeDasharray="4,3"/>
                <text x={xScale(i)+4} y={PAD.t+38} textAnchor="start"
                  fill="#9B7EC8" fontSize="9" fontFamily="DM Sans" fontWeight="700">
                  ♥ LTC
                </text>
              </g>
            )}
            {/* SORR year overlay — shade the first 5 retirement years, only when SORR active */}
            {sorrEnabled && d.yearReturn !== undefined && i < 5 && (() => {
              const isNeg = d.yearReturn < 0;
              const fillCol = isNeg ? 'rgba(196,106,106,.13)' : 'rgba(74,155,122,.08)';
              const strokeCol = isNeg ? 'rgba(196,106,106,.35)' : 'rgba(74,155,122,.25)';
              return (
                <g>
                  <rect x={xScale(i)-barW/2-1} y={PAD.t} width={barW+2} height={chartH}
                    fill={fillCol} rx="1"/>
                  <text x={xScale(i)} y={PAD.t+13} textAnchor="middle"
                    fill={isNeg ? '#C47A7A' : '#4A9B7A'} fontSize="10" fontFamily="DM Sans" fontWeight="700">
                    {d.yearReturn > 0 ? '+' : ''}{(d.yearReturn*100).toFixed(0)}%
                  </text>
                </g>
              );
            })()}
            {/* Spouse death indicator */}
            {d.spouseDiedThisYear && (
              <g>
                <line x1={xScale(i)} x2={xScale(i)} y1={PAD.t} y2={PAD.t+chartH}
                  stroke="rgba(155,126,200,.7)" strokeWidth="2"/>
                <text x={xScale(i)+4} y={PAD.t+14} fill="#9B7EC8" fontSize="10" fontFamily="DM Sans" fontWeight="700">
                  Surviving Spouse
                </text>
              </g>
            )}
            {/* Expense shock marker */}
            {d.expenseShockAmount > 0 && (() => {
              const cx = xScale(i);
              const labelY = PAD.t + 52;
              return (
                <g>
                  <line x1={cx} x2={cx} y1={PAD.t} y2={PAD.t + chartH}
                    stroke="rgba(200,160,48,.5)" strokeWidth="1.5" strokeDasharray="3,3"/>
                  <text x={cx} y={labelY} textAnchor="middle"
                    fill="#C8A030" fontSize="13" fontFamily="DM Sans" fontWeight="700">
                    ⚡
                  </text>
                  <text x={cx} y={labelY + 12} textAnchor="middle"
                    fill="#C8A030" fontSize="8" fontFamily="DM Sans" fontWeight="700" letterSpacing="0.06em">
                    SHOCK
                  </text>
                </g>
              );
            })()}
          </g>
        );
      })}

      {/* Expense line — Uninsured (with LTC costs hitting portfolio) */}
      <path d={expensePath} fill="none" stroke="url(#grad-expense)" strokeWidth="2"
        strokeDasharray="2000" strokeDashoffset="0" filter="url(#glow)"
        style={{animation:'arcDraw 1.5s ease both'}}/>

      {/* Care event expense highlight — thicker segment during care years to show spike clearly */}
      {careExpensePath && (
        <path d={careExpensePath} fill="none" stroke="#C47A7A" strokeWidth="4"
          strokeLinecap="round" opacity="0.85" filter="url(#glow)"
          style={{animation:'arcDraw 1.5s ease both'}}/>
      )}

      {/* Expense line — Insured / Architecture base (flat — no LTC spike) */}
      {insuredExpensePath && (
        <path d={insuredExpensePath} fill="none" stroke="#4A9B7A" strokeWidth="1.5"
          strokeDasharray="5,3" opacity="0.85"
          style={{animation:'arcDraw 1.5s ease both'}}/>
      )}

      {/* Main chart bottom border */}
      <line x1={PAD.l} x2={W-PAD.r} y1={PAD.t+chartH} y2={PAD.t+chartH} stroke="rgba(255,255,255,.08)" strokeWidth="1"/>

      {/* ── IRMAA Panel ── */}
      {data.some(d => d.irmaa > 0) && (() => {
        const irmaaTop = MAIN_H + IRMAA_GAP;
        const irmaaBottom = irmaaTop + IRMAA_H;
        const maxIrmaa = Math.max(...data.map(d => d.irmaa || 0)) || 1;
        return (
          <g>
            <rect x={PAD.l} y={irmaaTop} width={chartW} height={IRMAA_H}
              fill="rgba(232,148,58,.04)" rx="3"/>
            <text x={PAD.l-6} y={irmaaTop + IRMAA_H/2 + 4} textAnchor="end"
              fill="#E8943A" fontSize="9" fontFamily="DM Sans" fontWeight="700">
              IRMAA
            </text>
            <text x={PAD.l-6} y={irmaaTop + IRMAA_H/2 + 14} textAnchor="end"
              fill="#E8943A" fontSize="9" fontFamily="DM Sans" opacity="0.7">
              annual
            </text>
            {data.map((d, i) => {
              if (!d.irmaa) return null;
              const bh = Math.max(2, (d.irmaa / maxIrmaa) * (IRMAA_H - 8));
              const bx = xScale(i) - barW/2;
              const by = irmaaBottom - bh - 2;
              return (
                <g key={i}>
                  <rect x={bx} y={by} width={barW} height={bh}
                    fill="#E8943A" fillOpacity="0.7" rx="1"
                    className="bar-segment" style={{animationDelay:`${i*0.02+0.3}s`}}/>
                </g>
              );
            })}
            {(() => {
              // Only label bracket CHANGES, and only if they're spaced far enough apart (>=4 bars)
              let lastLabelIdx = -99;
              return data
                .map((d, i) => ({ d, i }))
                .filter(({ d, i }) => {
                  if (!d.irmaa) return false;
                  const prev = data[i - 1];
                  if (prev && prev.irmaa === d.irmaa) return false; // same tier, no label
                  if (i - lastLabelIdx < 4) return false; // too close to last label
                  lastLabelIdx = i;
                  return true;
                })
                .map(({ d, i }) => (
                  <text key={i} x={xScale(i)} y={irmaaTop - 3}
                    textAnchor="middle" fill="#E8943A" fontSize="9" fontFamily="DM Sans" fontWeight="600">
                    +${d.irmaa.toLocaleString()}
                  </text>
                ));
            })()}
            <line x1={PAD.l} x2={W-PAD.r} y1={irmaaBottom} y2={irmaaBottom}
              stroke="rgba(196,106,106,.15)" strokeWidth="1"/>
          </g>
        );
      })()}

      {/* Age axis labels */}
      {data.filter((d,i) => i % 5 === 0 || i === data.length-1).map((d) => {
        const i = data.indexOf(d);
        return (
          <text key={d.age} x={xScale(i)} y={H-4} textAnchor="middle" fill="#8DAFC8" fontSize="12" fontFamily="DM Sans">
            {d.age}
          </text>
        );
      })}
    </svg>
  );
}

// ── Confidence Ring ──
function ConfidenceRing({ score }) {
  const r = 54, circ = 2 * Math.PI * r;
  const offset = circ * (1 - score/100);
  const color = score >= 85 ? '#4A9B7A' : score >= 70 ? '#C8A030' : '#C47A7A';
  const label = score >= 85 ? 'Strong' : score >= 70 ? 'Moderate' : 'At Risk';

  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
      <svg width="130" height="130" viewBox="0 0 130 130">
        <circle cx="65" cy="65" r={r} fill="none" stroke="rgba(255,255,255,.05)" strokeWidth="8"/>
        <circle cx="65" cy="65" r={r} fill="none" stroke={color} strokeWidth="8"
          strokeDasharray={circ} strokeDashoffset={offset}
          strokeLinecap="round" transform="rotate(-90 65 65)"
          className="confidence-ring"/>
        <text x="65" y="60" textAnchor="middle" fill={color} fontSize="24" fontWeight="600" fontFamily="Cormorant Garamond">{score}%</text>
        <text x="65" y="78" textAnchor="middle" fill="#9EB8CC" fontSize="11" fontFamily="DM Sans">{label}</text>
      </svg>
      <div style={{fontSize:13,color:'#9EB8CC',textAlign:'center',lineHeight:1.5}}>
        Monte Carlo<br/>Confidence Score
      </div>
    </div>
  );
}

// ── IRMAA Warning ──
function IrmaaBar({ years }) {
  if (!years || years.length === 0) return null;
  const irmaaYears = years.filter(y => y.irmaa > 0);
  if (irmaaYears.length === 0) return null;
  const maxIrmaa = Math.max(...irmaaYears.map(y => y.irmaa));

  return (
    <div style={{padding:'14px 16px',background:'rgba(196,106,106,.06)',border:'1px solid rgba(196,106,106,.18)',borderRadius:8,marginBottom:16}}>
      <div style={{fontSize:13,fontWeight:700,letterSpacing:'.14em',textTransform:'uppercase',color:'#E8943A',marginBottom:6}}>IRMAA Exposure Detected</div>
      <p style={{fontSize:14,lineHeight:1.6,color:'#DDD6C4'}}>
        Based on projected income, Medicare Part B &amp; D surcharges may apply in {irmaaYears.length} year{irmaaYears.length>1?'s':''} of retirement.
        Peak annual IRMAA surcharge: <strong style={{color:'#E8943A'}}>${maxIrmaa.toLocaleString()}</strong>.
        Roth Annuity conversion (Layer 1) can reduce this exposure. ETA — Layer 3 of the IncomeArc™ system — uses a bank non-recourse loan to pay the IRA distribution tax, so the full gross proceeds enter a tax-free IUL policy rather than the after-tax net. The tax that would have left permanently instead compounds tax-free.
      </p>
    </div>
  );
}

// ── Number table view ──
function DataTable({ data }) {
  const fmt$ = v => v >= 1000 ? '$'+Math.round(v/1000)+'K' : '$'+Math.round(v||0);
  const fmtM = v => v >= 1000000 ? '$'+(v/1000000).toFixed(1)+'M' : fmt$(v);
  const fmtPct = v => v > 0 ? (v*100).toFixed(1)+'%' : '—';

  return (
    <div style={{overflowX:'auto'}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:13,fontFamily:'DM Sans'}}>
        <thead>
          <tr>
            {['Age','Soc Sec','Pension','Roth Ann.','NQ Ann.','ETA (L3)','RMD/Trad','Roth IRA','Taxable','Part-Time','Gross In','Fed Tax','State Tax','Eff. Rate','MAGI','Net Income','Expenses','IRMAA','Portfolio'].map(h=>(
              <th key={h} style={{padding:'6px 8px',textAlign:'right',color: h==='Net Income'?'#C8A96E': h==='Fed Tax'||h==='State Tax'||h==='Eff. Rate'?'#C47A7A': h==='MAGI'?'#9B7EC8':'#9EB8CC',fontWeight:500,letterSpacing:'.04em',fontSize:14,borderBottom:'1px solid rgba(255,255,255,.06)',whiteSpace:'nowrap'}}>
                {h}
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {data.map((d,i)=>(
            <tr key={d.age} style={{background: d.rothConversionEvent ? 'rgba(123,175,132,.07)' : d.ltcFundingEvent ? 'rgba(155,126,200,.07)' : d.etaFundingEvent ? 'rgba(168,197,216,.07)' : d.ltcEvent ? 'rgba(196,106,106,.06)' : i%2===0?'rgba(255,255,255,.015)':'transparent'}}>
              <td style={{padding:'5px 8px',textAlign:'right',color:'#C8A96E',fontWeight:600}}>
                {d.age}
                {d.etaFundingEvent && <span title={`ETA funding — $${Math.round((d.etaFundingAmount||0)/1000)}K IRA repositioned`} style={{color:'#A8C5D8',marginLeft:3,cursor:'help'}}>⚡</span>}
                {d.rothConversionEvent && <span title={`Roth conversion — $${Math.round((d.rothConversionAmount||0)/1000)}K converted${d.rothConversionOverage>0?' | Tax: $'+Math.round((d.rothConversionOverageTax||0)/1000)+'K − $'+Math.round(((d.rothConversionAmount||0)*(d.rothConversionMarginalRate||0)-(d.rothConversionOverageTax||0))/1000)+'K financed = $'+Math.round((d.rothConversionOverageTax||0)/1000)+'K overage → $'+Math.round((d.rothConversionOverage||0)/1000)+'K gross-up draw':''}`} style={{color:'#7BAF84',marginLeft:3,cursor:'help'}}>✦</span>}
                {d.ltcFundingEvent && <span title={`LTC policy funding — $${Math.round((d.ltcFundingAmount||0)/1000)}K IRA draw`} style={{color:'#9B7EC8',marginLeft:3,cursor:'help'}}>♥</span>}
              </td>
              <td style={{padding:'5px 8px',textAlign:'right',color:COLORS.ss.fill}}>{fmt$(d.sources.ss||0)}</td>
              <td style={{padding:'5px 8px',textAlign:'right',color:COLORS.pension.fill}}>{fmt$(d.sources.pension||0)}</td>
              <td style={{padding:'5px 8px',textAlign:'right',color:'#4A9B7A'}}>{d.rothAnnuityIncome>0?fmt$(d.rothAnnuityIncome):'—'}</td>
              <td style={{padding:'5px 8px',textAlign:'right',color:COLORS.annuity.fill}}>{d.nonQualAnnuityIncome>0?fmt$(d.nonQualAnnuityIncome):'—'}</td>
              <td style={{padding:'5px 8px',textAlign:'right',color:COLORS.eta.fill}}>{d.etaIncome>0?fmt$(d.etaIncome):'—'}</td>
              <td style={{padding:'5px 8px',textAlign:'right',color:COLORS.rmd.fill}}>{fmt$(d.sources.rmd||0)}</td>
              <td style={{padding:'5px 8px',textAlign:'right',color:COLORS.roth.fill}}>{fmt$(d.sources.roth||0)}</td>
              <td style={{padding:'5px 8px',textAlign:'right',color:COLORS.taxable.fill}}>{fmt$(d.sources.taxable||0)}</td>
              <td style={{padding:'5px 8px',textAlign:'right',color:COLORS.parttime.fill}}>{fmt$(d.sources.parttime||0)}</td>
              <td style={{padding:'5px 8px',textAlign:'right',color:'#8DAFC8'}}>{fmt$(d.grossIncome||d.totalIncome)}</td>
