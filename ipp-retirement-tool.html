// ── Legend ──
function Legend({ insuredData, data }) {
  // Only show sources that have non-zero values in the data
  const activeSources = new Set();
  if (data) {
    data.forEach(d => {
      Object.entries(d.sources || {}).forEach(([k, v]) => {
        if (v > 0) activeSources.add(k);
      });
    });
  }
  const hasShocks = data && data.some(d => (d.expenseShockAmount || 0) > 0);
  const hasIrmaa = data && data.some(d => (d.irmaa || 0) > 0);

  return (
    <div style={{display:'flex',flexWrap:'wrap',gap:'8px 16px',marginBottom:16}}>
      {Object.entries(COLORS).filter(([k]) => k !== 'expense' && k !== 'fedtax' && k !== 'statetax' && activeSources.has(k)).map(([k,v])=>(
        <div key={k} style={{display:'flex',alignItems:'center',gap:5}}>
          <div style={{width:10,height:10,borderRadius:2,background:v.fill,flexShrink:0}}/>
          <span style={{fontSize:13,color:'#9EB8CC'}}>{v.label}</span>
          {v.tax && TAX_BADGES[v.tax] && (
            <span style={{fontSize:13,color:TAX_BADGES[v.tax].color,background:'rgba(255,255,255,.04)',padding:'1px 5px',borderRadius:3}}>
              {TAX_BADGES[v.tax].label}
            </span>
          )}
        </div>
      ))}
      <div style={{display:'flex',alignItems:'center',gap:5}}>
        <div style={{width:18,height:2,background:'linear-gradient(90deg,#C47A7A,#C8A030)',borderRadius:1}}/>
        <span style={{fontSize:13,color:'#9EB8CC'}}>{insuredData ? 'Expenses — Uninsured' : 'Expense Line'}</span>
      </div>
      {insuredData && (
        <div style={{display:'flex',alignItems:'center',gap:5}}>
          <svg width="18" height="6" style={{flexShrink:0}}><line x1="0" y1="3" x2="18" y2="3" stroke="#4A9B7A" strokeWidth="1.5" strokeDasharray="4,2"/></svg>
          <span style={{fontSize:13,color:'#4A9B7A'}}>Expenses — Layer 2 Insured</span>
        </div>
      )}
      {hasShocks && (
        <div style={{display:'flex',alignItems:'center',gap:5}}>
          <span style={{fontSize:13}}>⚡</span>
          <span style={{fontSize:13,color:'#C8A030'}}>Expense Shock</span>
        </div>
      )}
      {hasIrmaa && (

    ltcCareInflationRate: (inputs.ltcCareInflationRate || 4) / 100,
  };
  // Clean baseline — no LTC events, used for main confidence when events are OFF
  const { years: yearsClean, confidence: confidenceClean, fixedStreams, mcStartAge } = projectArc({ ...baseProjectionInputs, ltcInsured: false, ltcEventAge: 0, spouseLtcEventAge: 0 });

  // Report arch baselines — always architectureEnabled: true regardless of UI toggle
  // These drive the IncomeArc™ ring scores in the PDF report
  const { confidence: rptArchBaseConf } = projectArc({ ...baseProjectionInputs, architectureEnabled: true, sorrEnabled: false, expenseShockEnabled: false, ltcEventAge: 0, spouseLtcEventAge: 0, ltcInsured: false });
  const { confidence: rptArchStormConf } = projectArc({ ...baseProjectionInputs, architectureEnabled: true, sorrEnabled: true, expenseShockEnabled: true, expenseShockAmount: inputs.expenseShockAmount||50000, expenseShockFrequency: inputs.expenseShockFrequency||8, ltcInsured: true, spouseLtcInsured: inputs.filingStatus==='mfj' });

  const hasLtcEvent = inputs.ltcEventEnabled && inputs.ltcEventAge > 0 && inputs.ltcMonthlyCost > 0;
  const hasSpouseLtcEvent = (inputs.filingStatus === 'mfj') && inputs.spouseLtcEventEnabled && inputs.spouseLtcEventAge > 0 && inputs.spouseLtcMonthlyCost > 0;

  // When health events are ON and architecture is OFF: yearsWithLtc drives the chart AND the main MC score
  // This lets the advisor stack SORR + expense shock + healthcare to show the "perfect storm"
  const { years: yearsWithLtc, confidence: confidenceWithLtc } = (hasLtcEvent || hasSpouseLtcEvent)
    ? projectArc({
        ...baseProjectionInputs,
        ltcInsured: false,
        ltcEventAge: hasLtcEvent ? inputs.ltcEventAge : 0,
        spouseLtcEventAge: hasSpouseLtcEvent ? inputs.spouseLtcEventAge : 0,
      })
    : { years: yearsClean, confidence: confidenceClean };

  // Main confidence ring: when architecture OFF + health events ON, show uninsured MC score
  // When architecture ON, show full architecture score (confidenceClean with arch layers)
  const years = yearsWithLtc;
  const confidence = (hasLtcEvent || hasSpouseLtcEvent) && !inputs.architectureEnabled
    ? confidenceWithLtc
    : confidenceClean;

  // LTC comparison projections — only when architecture is enabled and LTC inputs are set.
  // IMPORTANT: both projections zero out ltcNetAmount/spouseLtcNetAmount so the funding draw
  // does not distort the comparison. We are isolating the care event shock impact only.
  // confidenceUninsured = plan survival WITH care event and NO policy (shock applied)
  // confidenceInsured   = plan survival WITH care event and Layer 2 policy (shock absorbed)
  // Option C: HC comparison scores use pure portfolio — no L1/L3 income in either score.
  // This isolates exactly what Layer 2 contributes vs. not having it, on a level playing field.
  // The main confidence ring still includes L1+L3 when architecture is on.
  const isMarried = inputs.filingStatus === 'mfj';
  // HC comparison base: respect current architecture state so scores reflect real plan.
  // Both uninsured and insured run with same architecture — only ltcInsured differs.
  // This produces a meaningful score gap: insured score is higher because the portfolio
  // isn't depleted by care costs, and all architecture income remains intact.
  // Portfolio comparison base: arch=false so portfolio diff purely reflects care cost shock.
  // With arch on, income layers interact with the gap-fill logic and can mask or invert the diff.
  // Isolation on pure portfolio gives a clean, accurate Portfolio Preserved figure.
  const ltcPortfolioBase = { ...baseProjectionInputs, architectureEnabled: false, ltcNetAmount: 0, spouseLtcNetAmount: 0 };

  // Show HC comparison scores whenever health event is ON
  const showLtcComparison = inputs.ltcEventEnabled && inputs.ltcEventAge > 0 && inputs.ltcMonthlyCost > 0;

  // For portfolio draw calculations: arch=false, isolate one event at a time
  const primaryOnlyBase = { ...ltcPortfolioBase, spouseLtcEventAge: 0 };
  const { years: yearsUninsured } = showLtcComparison

    : { years: null };
  const { years: yearsInsured } = showLtcComparison
    ? projectArc({ ...primaryOnlyBase, ltcInsured: true })
    : { years: null };

  // MC scores: uninsured = full plan with BOTH events uninsured (= main ring score when arch OFF)
  // insured = full plan with THIS event insured (other event still uninsured)
  // This shows the marginal value of adding each policy
  const { confidence: confidenceUninsured } = showLtcComparison
    ? projectArc({ ...baseProjectionInputs, ltcInsured: false, spouseLtcInsured: false, ltcNetAmount: 0, spouseLtcNetAmount: 0 })
    : { confidence: null };
  const { confidence: confidenceInsured } = showLtcComparison
    ? projectArc({ ...baseProjectionInputs, ltcInsured: true, spouseLtcInsured: false, spouseLtcNetAmount: 0 })
    : { confidence: null };

  // Spouse LTC comparison
  const showSpouseLtcComparison = isMarried && inputs.spouseLtcEventEnabled && inputs.spouseLtcEventAge > 0 && inputs.spouseLtcMonthlyCost > 0;
  const spouseOnlyBase = { ...ltcPortfolioBase, ltcEventAge: 0 };

    : { years: null };
  const { years: yearsSpouseInsured } = showSpouseLtcComparison
    ? projectArc({ ...spouseOnlyBase, spouseLtcInsured: true })
    : { years: null };

  // Spouse MC: uninsured = both events uninsured (same as primary uninsured = main ring)
  // insured = spouse event insured, primary still uninsured (marginal value of spouse policy)
  const { confidence: confidenceSpouseUninsured } = showSpouseLtcComparison
    ? projectArc({ ...baseProjectionInputs, ltcInsured: false, spouseLtcInsured: false, ltcNetAmount: 0, spouseLtcNetAmount: 0 })
    : { confidence: null };
  const { confidence: confidenceSpouseInsured } = showSpouseLtcComparison
    ? projectArc({ ...baseProjectionInputs, ltcInsured: false, spouseLtcInsured: true, ltcNetAmount: 0 })

  const totalPortfolioAtRetire = years[0] ? years[0].totalPortfolio : (inputs.traditionalBalance + inputs.rothBalance + inputs.taxableBalance);
  const fmt$ = v => '$' + Math.round(v||0).toLocaleString();

  // Key stats

    ? years.reduce((sum, y) => sum + (y.effectiveTaxRate||0), 0) / years.length

    sum + (y.sources.roth||0) + (y.sources.eta||0) + (y.sources.annuityTaxFree||0), 0);

  // All-in marginal rate for year 1 of retirement (most useful single number)
  const retireStateTax = retireData ? (retireData.stateTax || 0) : 0;
  const retireGross = retireData ? (retireData.grossIncome || 0) : 1;
  const allInEffectiveRate = retireData
    ? ((retireData.federalTax||0) + (retireData.stateTax||0) + (retireData.irmaa||0)) / retireGross

  const allInMarginalRate = retireData ? (retireData.allInMarginalRate || 0) : 0;

    if (!years || years.length === 0) return null;

    if (maxRate <= allInMarginalRate) return null; // Year 1 is already the peak — no ribbon needed

    return years.find(y => (y.allInMarginalRate || 0) >= maxRate) || null;
  })();
  const peakMarginalRate = peakMarginalRow ? (peakMarginalRow.allInMarginalRate || 0) : 0;

<!-- ══════════════════════════════════════════════════════════
     PAGE 2 — PART ONE: YOU'VE DONE THE HARD PART
     ══════════════════════════════════════════════════════════ -->
<div class="page">
  <div class="hdr-bar"><div><span class="hdr-logo-txt">Integrated Planning Partners</span><span class="hdr-logo-sub">IncomeArc™</span></div><div class="hdr-client">${fullName} &nbsp;·&nbsp; Integrated Planning Partners</div></div>

    <div class="sec-label">Part One</div>
    <h2>You've Done the Hard Part</h2>
    <div class="sub">Decades of discipline have built something worth protecting. Now comes a different kind of challenge.</div>
  </div>
  <div class="two-col">
    <div class="col-l">
      <p class="lead">For most of your working life, the goal was straightforward: earn, save, and grow. Whether your wealth came from decades of employment, a business you built, or both — you made smart decisions, stayed disciplined, and the result is a level of financial security most Americans never reach.</p>
      <p>But here's what nobody tells you at this stage: the skills that built wealth are not the same skills required to <em>distribute</em> it wisely. Accumulation rewards consistency — whether that came from a salary, a business, or both. Distribution requires strategy — because the rules change completely once the regular income stops and the portfolio has to take over.</p>
      <p>The tax structure that worked in your favor during accumulation can become a headwind in distribution. A portfolio built to grow now has to generate income while absorbing healthcare costs, market volatility, and the unexpected expenses life reliably delivers — without the backstop of a paycheck or business cash flow.</p>
      <div class="pullquote">
        <p>"We make plans to buy a house, send our kids to college, and even to retire — but few Americans plan for <em>how</em> to distribute that wealth once retirement begins."</p>
        <div class="attr">— A. Lynn White, CEO, CareScout Insurance</div>
      </div>
      <p>This document is not about selling anything. It's about laying out the terrain ahead — the predictable challenges, the quantifiable risks, and the question every serious plan must answer: <strong>what is the best way to make your wealth last — while maintaining the retirement lifestyle you intend to enjoy?</strong></p>
    </div>
    <div class="col-r">
      <div class="sec-h">Where you stand — the transition ahead</div>
      <table class="data">

        <tr><td class="td-lbl">Tax on income</td><td class="td-n">Ordinary rate on earnings</td><td class="td-n">Ordinary rate on <em>every</em> IRA draw</td></tr>
        <tr><td class="td-lbl">Healthcare costs</td><td class="td-n">Employer- or business-funded</td><td class="td-n">Self-funded — and rising</td></tr>
        <tr><td class="td-lbl">Portfolio's job</td><td class="td-n">Grow &amp; compound</td><td class="td-n">Grow <em>and</em> generate income simultaneously</td></tr>
        <tr><td class="td-lbl">Risk of bad timing</td><td class="td-n">Minimal — you're adding</td><td class="td-n">Severe — you're withdrawing</td></tr>
        <tr><td class="td-lbl">Longevity risk</td><td class="td-n">An asset</td><td class="td-n">A liability without a plan</td></tr>
      </table>
      <div class="abox params-box">
        <div class="at">The distribution paradox</div>
        <div class="ab">Whether your wealth came through a career of saving into a 401(k), a business that funded a profit-sharing plan or cash balance plan, or both — the result is the same: a large pool of pre-tax dollars the government has never touched. Every dollar you withdraw is taxed as ordinary income. At ${iraBalance} in qualified accounts, you are managing not just your own retirement savings, but a substantial and growing tax liability. The question isn't whether to pay it — it's <em>when</em>, at what rate, and whether the timing is yours to control or the IRS's.</div>
      </div>

<!-- ══════════════════════════════════════════════════════════
     PAGE 3 — PART TWO: PREPARING FOR CHOPPY WATERS
     ══════════════════════════════════════════════════════════ -->
<div class="page">
  <div class="hdr-bar"><div><span class="hdr-logo-txt">Integrated Planning Partners</span><span class="hdr-logo-sub">IncomeArc™</span></div><div class="hdr-client">${fullName} &nbsp;·&nbsp; Integrated Planning Partners</div></div>
  <div class="page-body">  <div class="banner">
    <div class="sec-label">Part Two</div>
    <h2>The Goal: Preparing for Choppy Waters</h2>
    <div class="sub">A durable retirement plan isn't built for average conditions — it's built for the conditions that test it most.</div>
  </div>
  <div class="two-col" style="margin-bottom:0;">
    <div class="col-l">
      <p class="lead">The most experienced ship captains don't study meteorology to plan for calm seas. They study it to know what's coming, how to read the conditions, and how to navigate when the weather turns. The same philosophy applies to retirement planning.</p>
      <p>The goal is not to predict exactly what will happen in your retirement — it is to identify the risks that are <strong>statistically likely</strong>, quantify what they cost if unaddressed, and build a coordinated strategy that performs in a wide range of conditions — not just the good ones.</p>
    </div>
    <div class="col-r">
      <div class="pullquote">
        <p>"The goal is not to predict the storm. The goal is to make sure the ship holds together if one comes."</p>
      </div>
      <p>A coordinated retirement income plan addresses these risks before they become emergencies. The time to build the seawall is not during the flood — it's years before one is possible.</p>
    </div>
  </div>
  <hr class="gold">
  <div class="sec-h" style="margin-bottom:8pt;">The four risks we're systematically addressing</div>
  <div class="risk-grid">

      <div class="ri" style="color:#C0392B;">Risk 1</div>
      <div class="rn">Deferred Tax Exposure</div>
      <ul>
        <li>Every IRA dollar withdrawn is taxed as ordinary income — no capital gains rates</li>
        <li>RMDs begin at age 73 whether you need the money or not</li>
        <li>Higher income can trigger Medicare IRMAA surcharges of up to $594/mo per person</li>
      </ul>

    </div>

      <div class="rn">Healthcare &amp; Long-Term Care</div>
      <ul>
        <li>75% chance at least one spouse in a married couple will need care</li>
        <li>Average care duration is 3.3 years among those who need it</li>
        <li>An uninsured care event requires drawing more from the IRA than the care actually costs</li>
      </ul>
      <div class="rv" style="color:#C8A966;">70%</div>

    </div>

      <div class="rv" style="color:#8B6914;">−30%</div>

        <li>Major home repairs average $15,000–$50,000 and arrive without warning</li>

<!-- ══════════════════════════════════════════════════════════
     PAGE 4 — PART THREE: WHAT THESE RISKS ACTUALLY COST
     ══════════════════════════════════════════════════════════ -->
<div class="page">
  <div class="hdr-bar"><div><span class="hdr-logo-txt">Integrated Planning Partners</span><span class="hdr-logo-sub">IncomeArc™</span></div><div class="hdr-client">${fullName} &nbsp;·&nbsp; Integrated Planning Partners</div></div>

    <div class="sec-label">Part Three</div>
    <h2>What These Risks Actually Cost</h2>
    <div class="sub">Quantifying the challenge — because a risk you can measure is a risk you can plan for.</div>
  </div>
  <div class="two-col">
    <div class="col-l">
      <div class="sec-h">The tax burden: it's larger than most people realize</div>
      <p>Every dollar in your traditional IRA has never been taxed. When you withdraw it — whether voluntarily or because the IRS requires it through RMDs — it becomes ordinary income. At your income level, that means the effective tax rate on IRA withdrawals will likely exceed 30% when federal, state, and IRMAA surcharges are combined.</p>
      <div class="callout-row">
        <div class="callout">
          <div class="cv">${iraBalance}</div>
          <div class="cl">IRA balance at retirement</div>
          <div class="cs">The IRS is a co-owner of your IRA</div>
        </div>
        <div class="callout">
          <div class="cv">${peakMargRateDisp}</div>
          <div class="cl">Peak marginal rate — status quo</div>

          <div class="cv">${lifetimeTaxDisp}</div>
          <div class="cl">Estimated lifetime federal tax</div>

        </div>
      </div>
      <div class="sec-h">The healthcare reality</div>
      <p>Long-term care is not a remote possibility — it is a statistical expectation for the majority of Americans who live into their seventies and eighties. For a married couple, the probability that at least one partner will need significant care is higher than 75%.</p>
      <p>But the financial damage is not just the cost of care itself. When an uninsured event occurs, the IRA must distribute enough to cover both the care cost <em>and the taxes on the distribution</em>.${ltcMonthlyCur > 0 ? ` A $${Math.round(ltcMonthlyCur).toLocaleString()}/month care bill at a ${peakMargRateDisp} marginal rate requires a $${ltcMonthlyGross.toLocaleString()}/month IRA draw. The difference — $${grossUpTaxMo.toLocaleString()}/month — goes directly to the IRS and never compounds for you again.` : ` The difference between what care costs and what the IRA must distribute goes directly to the IRS and never compounds for you again.`}</p>
    </div>
    <div class="col-r">

        <div class="callout">

        <div class="callout">

        <tr><th class="th-lbl">Care setting</th><th class="th-lbl" style="text-align:right;color:#8DAFC8;">Annual Median</th><th class="th-lbl" style="text-align:right;color:#8DAFC8;">Monthly</th></tr>
        <tr><td class="td-lbl">Nursing home — private room</td><td style="text-align:right;color:#C0392B;font-weight:600;">$127,750</td><td style="text-align:right;color:#C0392B;font-weight:600;">$10,646</td></tr>

        <tr><td class="td-lbl">Home health aide (44 hrs/wk)</td><td style="text-align:right;color:#C0392B;font-weight:600;">$77,792</td><td style="text-align:right;color:#C0392B;font-weight:600;">$6,483</td></tr>

      <div style="font-size:6.5pt;color:#8A9AAA;margin-top:-6pt;margin-bottom:8pt;font-style:italic;">Source: Genworth/CareScout 2024 Cost of Care Survey. Care costs increase 4–6% annually.</div>
      <div class="abox warn-box">

        <div class="ab">${ltcMonthlyCur > 0

<!-- ══════════════════════════════════════════════════════════
     PAGE 5 — PART FIVE: THE QUESTION WORTH ASKING
     ══════════════════════════════════════════════════════════ -->
<div class="page">
  <div class="hdr-bar"><div><span class="hdr-logo-txt">Integrated Planning Partners</span><span class="hdr-logo-sub">IncomeArc™</span></div><div class="hdr-client">${fullName} &nbsp;·&nbsp; Integrated Planning Partners</div></div>
  <div class="page-body">  <div class="banner">
    <div class="sec-label">Part Five</div>
    <h2>The Question Worth Asking</h2>
    <div class="sub">What does a coordinated retirement income plan actually look like — and what does it change?</div>
  </div>
  <div class="two-col" style="margin-bottom:0;">
    <div class="col-l">
      <p class="lead">The risks on the previous pages are not new information. Most people near retirement know that taxes will be a factor, that healthcare costs money, and that markets go down. What most people lack is a <em>coordinated response</em> — a plan where each risk has a dedicated solution that doesn't compromise the others.</p>
      <p>The conventional approach asks the portfolio to do everything: generate income, absorb care costs, pay taxes, and still compound. Those objectives conflict directly. Pulling from a portfolio during a downturn to fund care costs forces a sale at the bottom and eliminates future recovery.</p>
    </div>
    <div class="col-r">
      <div class="pullquote">
        <p>"A great ship captain doesn't choose between speed and safety. They build a ship that can do both — and they don't leave port without the right crew in place."</p>
      </div>
      <p>A coordinated plan separates these obligations. Income is guaranteed independently of the market. Care is funded by a dedicated protection layer. Tax exposure is repositioned before RMDs force it. The portfolio — freed from all three — can do the one thing it was built to do: grow.</p>
    </div>
  </div>
  <hr class="gold">
  <div class="sec-h" style="margin-bottom:6pt;">The coordinated approach — four layers, one purpose</div>
  <div class="layer-grid">
    <div class="layer-card" style="border-top-color:#2A9D8F;">
      <div class="li2" style="color:#2A9D8F;">Layer 1 — Income</div>
      <div class="ln">Guaranteed Income Floor</div>
      <div class="ld">A tax-free annuity provides guaranteed lifetime income — no matter what markets do. The portfolio never has to sell holdings to cover living expenses.</div>
      <div class="la" style="color:#2A9D8F;">Addresses Risk 3</div>
      <div class="ls">Mitigates sequence-of-returns risk</div>
    </div>
    <div class="layer-card" style="border-top-color:#C8A96E;">
      <div class="li2" style="color:#C8A96E;">Layer 2 — Protection</div>
      <div class="ln">Living Benefits</div>
      <div class="ld">A permanent life insurance policy with a chronic illness benefit pays care costs directly — tax-free. The IRA is never touched. No gross-up, no forced sale.</div>
      <div class="la" style="color:#C8A96E;">Addresses Risk 2</div>
      <div class="ls">Mitigates the gross-up tax burden</div>
    </div>
    <div class="layer-card" style="border-top-color:#C0392B;">
      <div class="li2" style="color:#C0392B;">Layer 3 — Taxes</div>
      <div class="ln">Tax Architecture</div>
      <div class="ld">Pre-tax IRA dollars are repositioned into a tax-free structure before RMDs begin — shrinking the RMD base, reducing taxable income, suppressing Medicare surcharges.</div>
      <div class="la" style="color:#C0392B;">Addresses Risk 1</div>
      <div class="ls">${taxSavedDisp}</div>
    </div>
    <div class="layer-card" style="border-top-color:#4A6275;">
      <div class="li2" style="color:#4A6275;">Layer 4 — Growth</div>
      <div class="ln">Portfolio — Liberated</div>
      <div class="ld">With income, care, and tax obligations each handled by a dedicated layer, the portfolio has one job: compound. It never sells at the wrong time.</div>
      <div class="la" style="color:#4A6275;">Addresses Risk 4</div>
      <div class="ls">Absorbs shocks from a position of strength</div>
    </div>
  </div>
  </div>

{/* Portfolio Balances section */}

              {inputs.currentAge < inputs.retireAge && <>

                {/* Projected balance at retirement callout */}
                {(() => {
                  const ret = inputs.portfolioReturn / 100;
                  const yrs = inputs.retireAge - inputs.currentAge;
                  const tradStop = inputs.tradContributionEndAge > 0 ? inputs.tradContributionEndAge : inputs.retireAge;
                  const taxStop  = inputs.taxableContributionEndAge > 0 ? inputs.taxableContributionEndAge : inputs.retireAge;
                  const spouseStop = inputs.spouseTradContributionEndAge > 0 ? inputs.spouseTradContributionEndAge : inputs.retireAge;
                  let t = inputs.traditionalBalance, x = inputs.taxableBalance, r = inputs.rothBalance;
                  let st = (inputs.filingStatus === 'mfj') ? (inputs.spouseTraditionalBalance || 0) : 0;
                  for (let a = inputs.currentAge; a < inputs.retireAge; a++) {
                    const tc = (inputs.annualTradContribution > 0 && a < tradStop) ? inputs.annualTradContribution : 0;

                    const sc = (inputs.annualSpouseTradContribution > 0 && a < spouseStop) ? inputs.annualSpouseTradContribution : 0;
                    t = t * (1 + ret) + tc;
                    x = x * (1 + ret) + xc;
                    r = r * (1 + ret);
                    st = st * (1 + ret) + sc;
                  }
                  const total = t + x + r + st;
                  const fmtM = v => v >= 1000000 ? '$'+(v/1000000).toFixed(2)+'M' : '$'+Math.round(v/1000)+'K';

                    <div style={{marginTop:10,padding:'12px 14px',background:'rgba(74,155,122,.06)',border:'1px solid rgba(74,155,122,.2)',borderRadius:8}}>

                          { label:'Traditional', val: t },
                          { label:'Roth', val: r },
                          { label:'Taxable', val: x },
                          ...(inputs.filingStatus === 'mfj' && st > 0 ? [{ label:'Spouse Trad', val: st }] : []),
                        ].map(item => (
                          <div key={item.label} style={{textAlign:'center'}}>
                            <div style={{fontSize:13,color:'#8DAFC8',letterSpacing:'.05em',textTransform:'uppercase',marginBottom:3}}>{item.label}</div>
                            <div style={{fontSize:15,fontWeight:600,color:'#4A9B7A',fontFamily:"'Cormorant Garamond',serif"}}>{fmtM(item.val)}</div>
                          </div>
                        ))}
                      </div>

                  {showTip && (
                    <div style={{position:'absolute',top:42,left:0,right:0,zIndex:200,background:'#0C1A27',border:`1px solid ${accentColor}44`,borderRadius:8,padding:'12px 14px',boxShadow:'0 6px 24px rgba(0,0,0,.65)'}}>
                      {tooltipLines.map((line, i) => (
                        <div key={i} style={{fontSize:12,color:i===0?'#F5F2EC':'#A0B4C4',lineHeight:1.7,fontWeight:i===0?600:400,marginBottom:i===0?5:0}}>{line}</div>
                      ))}
                      <div style={{marginTop:8,textAlign:'right'}}>
                        <span onClick={()=>setShowTip(false)} style={{fontSize:11,color:'#8DAFC8',cursor:'pointer',textDecoration:'underline'}}>close</span>
                      </div>
                    </div>

                  {/* PRIMARY: true marginal rate (fed bracket + state on same dollar) */}
                  <div style={{display:'flex',alignItems:'baseline',gap:6,marginBottom:1}}>
                    <span style={{fontSize:36,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:accentColor,lineHeight:1}}>
                      {(trueMarginal*100).toFixed(1)}%
                    </span>
                    <span style={{fontSize:12,color:'#8DAFC8'}}>marginal rate</span>
                  </div>
                  <div style={{fontSize:12,color:'#7A9BB0',marginBottom:8}}>
                    Fed {(fedMarginal*100).toFixed(0)}% bracket · {stateInfo?.name||'State'} {stateExempt ? '✓ exempt' : (stateMarginal*100).toFixed(2)+'%'}
                  </div>

                  {/* SECONDARY: all-in effective — clearly labeled as blended */}
                  <div style={{display:'flex',alignItems:'baseline',gap:6,marginBottom:10,paddingBottom:10,borderBottom:'1px solid rgba(255,255,255,.06)'}}>
                    <span style={{fontSize:22,fontWeight:600,fontFamily:"'Cormorant Garamond',serif",color:'#6A8BA8'}}>
                      {(allInEffective*100).toFixed(1)}%
                    </span>
                    <span style={{fontSize:11,color:'#506070'}}>effective (blended) · all taxes ÷ gross income</span>
                  </div>

                  {/* 4-col grid */}
                  <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6,marginBottom:10,paddingBottom:10,borderBottom:'1px solid rgba(255,255,255,.06)'}}>
                    {[
                      { label:'Fed Marginal',  value:(fedMarginal*100).toFixed(0)+'%',  color:'#C47A7A' },
                      { label:'Fed Effective', value:(fedEffective*100).toFixed(1)+'%', color:'#C8A96E' },
                      { label: stateInfo?.name||'State',
                        value: stateExempt ? '—' : (stateMarginal*100).toFixed(2)+'%',

            ];

            const peakTooltip = [
              'Peak Marginal Rate — Worst-Case Year',
              'The highest federal bracket rate reached in any single year of the retirement projection. It typically occurs when RMDs are at their largest, often in the mid-to-late 70s.',
              'This is the maximum rate at which any incremental income will be taxed across the plan — the ceiling of tax exposure.',
              'The gap between Peak and Year 1 marginal rates shows how much bracket creep occurs as required minimum distributions compound, and reveals the urgency of pre-RMD Roth conversion planning.',
            ];

            return (
              <div style={{marginBottom:12}}>
                <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                  <RateBox
                    title="Marginal Rate · Year 1"
                    fedMarginal={fedMarginalRate}
                    stateRate={retireData.stateTaxRate||0}
                    fedEffective={retireData.effectiveTaxRate||0}
                    stateTax={retireData.stateTax||0}
                    grossInc={retireGross}
                    irmaaAmt={retireData.irmaa||0}
                    magi={retireData.magi||0}
                    sources={retireData.sources}
                    stateInfo={stateInfo}
                    tooltipLines={y1Tooltip}
                    accentColor={allInMarginalRate > 0.40 ? '#C47A7A' : allInMarginalRate > 0.30 ? '#C8A030' : '#4A9B7A'}
                  />
                  {peakMarginalRow && (
                    <RateBox
                      title="Peak Marginal Rate"
                      fedMarginal={peakFedMarginalRate}
                      stateRate={peakMarginalRow.stateTaxRate||0}
                      fedEffective={peakMarginalRow.effectiveTaxRate||0}
                      stateTax={peakMarginalRow.stateTax||0}
                      grossInc={peakMarginalRow.grossIncome||peakMarginalRow.totalIncome||1}
                      irmaaAmt={peakMarginalRow.irmaa||0}
                      magi={peakMarginalRow.magi||0}
                      sources={peakMarginalRow.sources}
                      peakAge={peakMarginalRow.age}
                      deltaVsY1={((peakMarginalRate - allInMarginalRate)*100).toFixed(1)}
                      stateInfo={stateInfo}
                      tooltipLines={peakTooltip}
                      accentColor={peakMarginalRate > 0.40 ? '#C47A7A' : '#C8A030'}
                    />
                  )}
                </div>

                {/* Stress adder + state note row below both boxes */}
                <div style={{display:'flex',gap:10,marginTop:8,flexWrap:'wrap',alignItems:'flex-start'}}>
                  {inputs.taxRateStressAdder > 0 && (
                    <div style={{padding:'8px 14px',background:'rgba(200,160,48,.08)',border:'1px solid rgba(200,160,48,.25)',borderRadius:8,textAlign:'center'}}>
                      <div style={{fontSize:13,color:'#C8A030',fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',marginBottom:3}}>Rate Risk Stress</div>
                      <div style={{fontSize:18,fontWeight:700,color:'#C8A030',fontFamily:"'Cormorant Garamond',serif"}}>+{inputs.taxRateStressAdder}%</div>
                      <div style={{fontSize:13,color:'#8DAFC8'}}>applied to all rates</div>
                    </div>
                  )}
                  <div style={{fontSize:14,color:'#8DAFC8',lineHeight:1.6,flex:1,minWidth:180}}>
                    {stateInfo?.note || ''}
                    {inputs.customStateRate !== '' && <div style={{color:'#C8A030',marginTop:3}}>Custom rate: {inputs.customStateRate}% override active</div>}
                  </div>
                </div>
              </div>
            );
          })()}

          {/* Main chart + confidence */}
          <div style={{background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.06)',borderRadius:12,padding:'18px 20px',marginBottom:16}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14,flexWrap:'wrap',gap:12}}>
              <div>
                <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:400,color:'#F5F2EC',marginBottom:3}}>
                  Income Arc — Age {inputs.retireAge} to {inputs.planToAge}
                </h2>
                <p style={{fontSize:13,color:'#8DAFC8'}}>
                  After-tax net income by source · expense line overlay · {inputs.ltcEventAge > 0 ? 'healthcare event marked' : 'no healthcare event modeled'}
                </p>
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:10}}>
                <ConfidenceRing score={confidence}/>
                {fixedStreams && fixedStreams.some(s => s.yearOffset > 0) && (
                  <div style={{background:'rgba(74,155,122,.06)',border:'1px solid rgba(74,155,122,.18)',borderRadius:8,padding:'8px 12px',minWidth:170,maxWidth:210}}>
                    <div style={{fontSize:13,fontWeight:700,color:'#4A9B7A',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:6}}>
                      Deferred Income — MC Schedule
                    </div>
                    {fixedStreams.map((s, i) => {
                      const streamLabel = i === 0 && s.yearOffset === 0 ? 'Pension'
                        : s.yearOffset === 0 ? 'Annuity (active)' : null;
                      const activateAge = mcStartAge + s.yearOffset;
                      const yrsDeferred = s.yearOffset;
                      return (
                        <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4,gap:8}}>
                          <div>
                            <div style={{fontSize:13,color:yrsDeferred > 0 ? '#C8A96E' : '#4A9B7A',fontWeight:600}}>
                              {yrsDeferred > 0 ? `Activates age ${activateAge}` : `Active at start`}
                            </div>
                            <div style={{fontSize:13,color:'#8DAFC8'}}>{yrsDeferred > 0 ? `${yrsDeferred} yr deferral` : `Age ${mcStartAge}+`}</div>
                          </div>
                          <div style={{fontSize:13,fontWeight:600,color:'#F5F2EC',fontFamily:"'Cormorant Garamond',serif",whiteSpace:'nowrap'}}>
                            ${Math.round(s.annual/12).toLocaleString()}/mo
                          </div>
                        </div>
                      );
                    })}
                    <div style={{borderTop:'1px solid rgba(74,155,122,.15)',paddingTop:5,marginTop:3,fontSize:13,color:'#8DAFC8',lineHeight:1.5}}>
                      Deferred income reduces portfolio draws until each stream activates — reflected in confidence score
                    </div>
                  </div>
                )}
              </div>
            </div>

            {view === 'visual' ? (
              <>
                <Legend insuredData={inputs.architectureEnabled ? yearsInsured : null} data={yearsWithLtc}/>
                <ArcChart
                  data={inputs.architectureEnabled ? (yearsUninsured || yearsWithLtc) : yearsWithLtc}
                  uninsuredData={inputs.architectureEnabled ? yearsWithLtc : null}
                  view={view}
                  insuredData={inputs.architectureEnabled ? yearsInsured : null}
                  sorrEnabled={inputs.sorrEnabled}/>
                {exhaustionYear && (
                  <div style={{
                    marginTop:8,
                    display:'flex',
                    alignItems:'center',
                    gap:10,
                    background:'rgba(196,106,106,.1)',
                    border:'1px solid rgba(196,106,106,.4)',
                    borderRadius:8,
                    padding:'9px 14px',
                  }}>
                    <span style={{fontSize:16}}>⚠</span>
                    <span style={{fontSize:13,color:'#C47A7A',fontWeight:700}}>
                      Portfolio depleted at age {exhaustionYear.age}
                    </span>
                    <span style={{fontSize:13,color:'#8DAFC8'}}>
                      — {inputs.planToAge - exhaustionYear.age} year{inputs.planToAge - exhaustionYear.age !== 1 ? 's' : ''} before plan end · income from guaranteed sources continues but all portfolio draws cease
                    </span>

                )}
              </>
            ) : view === 'numbers' ? (
              <DataTable data={yearsWithLtc}/>
            ) : view === 'balances' ? (
              <BalancesTable data={yearsWithLtc}/>
            ) : view === 'credits' ? (
              <CreditsTable data={yearsWithLtc}/>
            ) : view === 'debits' ? (
              <DebitsTable data={yearsWithLtc} inputs={inputs}/>
            ) : null}
          </div>

          {/* LTC With vs Without Comparison Panel */}
          {showLtcComparison && yearsInsured && yearsUninsured && (() => {
            const ltcAge = inputs.ltcEventAge;
            const ltcEnd = ltcAge + inputs.ltcDuration;
            // IMPORTANT: all uninsured calculations must use yearsUninsured (with LTC shock),
            // NOT years (which is now the clean baseline with ltcEventAge:0)
            const uninsuredFinal = yearsUninsured[yearsUninsured.length-1];
            const insuredFinal = yearsInsured[yearsInsured.length-1];

            // Inflated care cost — sum actual event-year costs from projection rows (already inflated by engine)
            const totalLtcCost = yearsUninsured
              .filter(r => r.age >= ltcAge && r.age < ltcEnd)
              .reduce((sum, r) => sum + (r.ltcAnnualCost || 0), 0);

            // True gross-up tax: full inflated care cost must come from taxable portfolio accounts.
            // Tax cost = careInflatedCost / (1 - marginalRate) - careInflatedCost
            // Use the average marginal rate during care years from the uninsured projection
            const careYearRows = yearsUninsured.filter(r => r.age >= ltcAge && r.age < ltcEnd);
            const avgMarginalRate = careYearRows.length > 0
              ? careYearRows.reduce((sum, r) => sum + (r.marginalRate || r.effectiveTaxRate || 0.28), 0) / careYearRows.length
              : 0.28;
            const grossUpTaxTotal = totalLtcCost * avgMarginalRate / (1 - avgMarginalRate);

            // Direct costs = care draws + gross-up tax that hit the portfolio
            const pDirectCosts = totalLtcCost + grossUpTaxTotal;
            // Compounding lost = growth those dollars WOULD HAVE earned from mid-event to plan end
            // Use midpoint of care event as the draw date, compound forward to planToAge
            const midEventAge = ltcAge + (inputs.ltcDuration / 2);
            const yearsCompounding = Math.max(0, inputs.planToAge - midEventAge);
            const ret = inputs.portfolioReturn / 100;
            const compoundingLoss = pDirectCosts * (Math.pow(1 + ret, yearsCompounding) - 1);
            // Portfolio Preserved = direct costs + growth lost on those dollars
            const portfolioDiff = pDirectCosts + compoundingLoss;

            const todayDollarCost = inputs.ltcMonthlyCost * 12 * inputs.ltcDuration;
            const careInflRate = inputs.ltcCareInflationRate || 4;

            // Layer 2 fully covers inflated care cost — no gap
            const totalBenefit = totalLtcCost;
            const benefitGap = 0;
            const showBenefitCard = true;

            const fmtD = v => v >= 1000000 ? `$${(v/1000000).toFixed(2)}M` : `$${Math.round(v/1000)}K`;
            return (
              <div style={{background:'rgba(74,155,122,.04)',border:'1px solid rgba(74,155,122,.2)',borderRadius:12,padding:'18px 20px',marginBottom:16}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14,flexWrap:'wrap'}}>
                  <div style={{fontSize:13,fontWeight:700,letterSpacing:'.14em',textTransform:'uppercase',color:'#4A9B7A'}}>
                    Healthcare Event — Layer 2 Impact Analysis
                  </div>
                  <div style={{fontSize:13,color:'#8DAFC8',background:'rgba(74,155,122,.08)',padding:'2px 8px',borderRadius:4,border:'1px solid rgba(74,155,122,.15)'}}>
                    Age {ltcAge}–{ltcEnd} · {inputs.ltcDuration} yr event
                  </div>
                  <div style={{fontSize:12,color:'#C8A030',background:'rgba(200,160,48,.07)',padding:'2px 8px',borderRadius:4,border:'1px solid rgba(200,160,48,.2)'}}>
                    Today's ${Math.round(inputs.ltcMonthlyCost/1000)}K/mo → inflated at {careInflRate}%/yr → {fmtD(totalLtcCost / inputs.ltcDuration / 12)}/mo at age {ltcAge}
                  </div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:10,marginBottom:14}}>
                  {[
                    { label:'Total Care Cost', value: fmtD(totalLtcCost), sub:`Inflated ${careInflRate}%/yr · today: ${fmtD(todayDollarCost)}`, color:'#C47A7A' },
                    { label:'Layer 2 Benefit', value: fmtD(totalBenefit), sub:'Fully covers inflated care cost', color:'#4A9B7A' },
                    { label:'Gross-Up Tax Cost', value: grossUpTaxTotal > 0 ? fmtD(grossUpTaxTotal) : '—', sub: grossUpTaxTotal > 0 ? 'Tax on forced IRA draws if uninsured' : 'None — policy eliminates this', color: grossUpTaxTotal > 0 ? '#C47A7A' : '#4A9B7A' },
                    { label:'Compounding Lost', value: compoundingLoss > 0 ? fmtD(compoundingLoss) : '—', sub:`Growth lost on depleted dollars age ${ltcEnd}→${inputs.planToAge}`, color: compoundingLoss > 0 ? '#C47A7A' : '#4A9B7A' },
                    { label:'Portfolio Preserved', value: portfolioDiff > 0 ? fmtD(portfolioDiff) : fmtD(Math.abs(portfolioDiff)), sub:'Direct care draws + tax prevented from hitting portfolio', color: portfolioDiff > 0 ? '#4A9B7A' : '#C47A7A' },
                  ].map(s => (
                    <div key={s.label} style={{background:'rgba(255,255,255,.03)',borderRadius:8,padding:'10px 12px',border:'1px solid rgba(255,255,255,.06)'}}>

                    <div style={{fontSize:48,fontWeight:700,color:'#C8A96E',fontFamily:"'Cormorant Garamond',serif",lineHeight:1}}>{combinedLeverage.toFixed(1)}×</div>
                    <div style={{fontSize:12,color:'#8A7A50',marginTop:6}}>return on every dollar<br/>invested in protection</div>
                  </div>
                </div>

                <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:10,marginBottom:14}}>
                  {[
                    { label:'Total Care Costs', value: fmtD(totalCareCost), sub:`Inflated · today's dollars: ${fmtD(pTodayDollar + sTodayDollar)}`, color:'#C47A7A' },
                    { label:'Combined L2 Benefit', value: fmtD(totalBenefit), sub:'Total care cost covered by policy', color:'#4A9B7A' },
                    { label:'Gross-Up Tax Cost', value: totalGrossUpTax > 0 ? fmtD(totalGrossUpTax) : '—', sub: totalGrossUpTax > 0 ? 'Extra tax on forced IRA draws' : 'None — no forced IRA draws', color: totalGrossUpTax > 0 ? '#C47A7A' : '#4A9B7A' },
                    { label:'Compounding Lost', value: fmtD(totalCompounding), sub:`${Math.round(inputs.portfolioReturn)}% return on depleted base`, color:'#C47A7A' },
                    { label:'Total Portfolio Preserved', value: fmtD(totalPreserved), sub:'Care + tax + compounding', color: totalPreserved > 0 ? '#4A9B7A' : '#C47A7A' },
                  ].map(s => (
                    <div key={s.label} style={{background:'rgba(255,255,255,.03)',borderRadius:8,padding:'10px 12px',border:'1px solid rgba(200,169,110,.1)'}}>
                      <div style={{fontSize:12,color:'#8DAFC8',letterSpacing:'.06em',textTransform:'uppercase',marginBottom:4}}>{s.label}</div>
                      <div style={{fontSize:18,fontWeight:700,color:s.color,fontFamily:"'Cormorant Garamond',serif"}}>{s.value}</div>
                      <div style={{fontSize:12,color:'#8DAFC8',marginTop:3}}>{s.sub}</div>
                    </div>
                  ))}
                </div>
                <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',fontSize:12,color:'#8DAFC8',background:'rgba(255,255,255,.02)',borderRadius:6,padding:'7px 12px',border:'1px solid rgba(200,169,110,.1)'}}>
                  <span style={{color:'#C47A7A',fontWeight:600}}>{fmtD(totalCareCost)}</span>
                  <span>inflated care cost</span>
                  <span style={{color:'#8DAFC8',margin:'0 2px'}}>+</span>
                  <span style={{color:'#C47A7A',fontWeight:600}}>{totalGrossUpTax > 0 ? fmtD(totalGrossUpTax) : '$0'}</span>
                  <span>gross-up tax</span>
                  <span style={{color:'#8DAFC8',margin:'0 2px'}}>+</span>
                  <span style={{color:'#C47A7A',fontWeight:600}}>{fmtD(totalCompounding)}</span>
                  <span>compounding lost</span>
                  <span style={{color:'#8DAFC8',margin:'0 2px'}}>=</span>
                  <span style={{color:'#C8A96E',fontWeight:700}}>{fmtD(totalPreserved)}</span>
                  <span style={{color:'#C8A96E'}}>Combined Portfolio Preserved</span>
                </div>
              </div>
            );
          })()}

          {/* Sequence of returns stress test callout */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
            <div style={{background:'rgba(196,106,106,.05)',border:'1px solid rgba(196,106,106,.15)',borderRadius:10,padding:'14px 16px'}}>
              <div style={{fontSize:13,fontWeight:700,letterSpacing:'.14em',textTransform:'uppercase',color:'#C47A7A',marginBottom:8}}>Sequence of Returns Risk</div>
              <p style={{fontSize:14,lineHeight:1.65,color:'#DDD6C4'}}>
                A 25% market decline in year 1–3 of retirement can permanently reduce portfolio sustainability — even if long-term returns recover. An uninsured care event compounds this: drawing $90K–$120K/year from a market-exposed portfolio with no dedicated Layer 2 protection extends the damage long after care ends. The model above assumes average returns. An income floor of guaranteed sources — including the Roth Fixed Indexed Annuity with GLWB rider (Layer 1 of the IncomeArc™ system) — reduces this exposure significantly. Markets cannot disrupt it and longevity cannot exhaust it.
              </p>
            </div>
            <div style={{background:'rgba(74,155,122,.05)',border:'1px solid rgba(74,155,122,.15)',borderRadius:10,padding:'14px 16px'}}>
              <div style={{fontSize:13,fontWeight:700,letterSpacing:'.14em',textTransform:'uppercase',color:'#4A9B7A',marginBottom:8}}>Guaranteed Income Floor</div>
              <p style={{fontSize:14,lineHeight:1.65,color:'#DDD6C4'}}>
                <strong style={{color:'#4A9B7A'}}>{guaranteedPct}%</strong> of total projected retirement income (age {inputs.retireAge}–{inputs.planToAge}) comes from guaranteed sources (Social Security{inputs.pensionMonthly > 0 ? ', pension' : ''}{inputs.annuityMonthly > 0 ? ', annuity' : ''}). {guaranteedPct < 50 ? 'Increasing this floor through a Roth Fixed Indexed Annuity with GLWB rider (Layer 1) reduces sequence risk and future IRMAA exposure. The ETA structure (Layer 3) can fund the conversion by eliminating the distribution tax via bank non-recourse loan.' : 'A strong floor provides stability against market volatility. Every dollar repositioned into the Roth Annuity (Layer 1) or ETA IUL policy (Layer 3) permanently reduces the future RMD base — lowering mandatory income and IRMAA exposure year after year.'}
              </p>
            </div>
          </div>

          {/* Footer */}
          <div style={{marginTop:24,padding:'18px 20px',background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.06)',borderRadius:10}}>
            <div style={{fontSize:12,fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase',color:'#C8A96E',marginBottom:8}}>
              Proprietary &amp; Confidential
            </div>
            <p style={{fontSize:12,color:'#8DAFC8',lineHeight:1.75,marginBottom:10}}>
              IncomeArc™ and the retirement income architecture methodology contained herein are the <strong style={{color:'#DDD6C4'}}>exclusive proprietary property of Integrated Planning Partners and Jeffrey Faine, CLU, RICP®</strong>. This tool, its underlying logic, design, output, and methodology may not be copied, reproduced, distributed, reverse-engineered, or used in any form without the <strong style={{color:'#DDD6C4'}}>explicit written permission of Integrated Planning Partners and/or Jeffrey Faine</strong>. Unauthorized use constitutes misappropriation of proprietary intellectual property and may result in legal action. IncomeArc™ is a trademark of Integrated Planning Partners. © {new Date().getFullYear()} Integrated Planning Partners · Jeffrey Faine, CLU, RICP®. All rights reserved.
            </p>
            <p style={{fontSize:12,color:'#6E8299',lineHeight:1.7}}>
              Projections are illustrative only and do not constitute financial, tax, or legal advice. Actual results will vary. RMD calculations use IRS Uniform Lifetime Table. IRMAA thresholds reflect 2025 Medicare brackets. Monte Carlo uses 1000 trials with user-defined mean return and 12% standard deviation; expenses inflation-adjusted annually; SS income receives full inflation COLA each year; pension and annuity are fixed with no COLA.
            </p>
          </div>
        </div>
      </div>
    </div>
  );
}
