<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StructureReview™ — Integrated Planning Partners</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:      #0E1C2E;
    --navy2:     #162032;
    --navy3:     #1E2E44;
    --navy4:     #243550;
    --gold:      #C8A96E;
    --gold2:     #E0C080;
    --gold-dim:  #8A7040;
    --off-white: #F5F2EC;
    --warm:      #D8D0BC;
    --gray:      #6E8299;
    --border:    #2A3F58;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--navy);
    color: var(--off-white);
    font-family: 'Barlow', sans-serif;
    font-weight: 400;
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* ── NOISE TEXTURE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    height: 68px;
    background: rgba(14, 28, 46, 0.95);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
  }

  .nav-logo {
    display: flex;
    flex-direction: column;
    gap: 1px;
    flex-shrink: 0;
  }

  .nav-logo-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.18em;
    color: var(--gold);
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* Visible nav items (right side of bar) */
  .nav-right {
    display: flex;
    align-items: center;
    gap: 20px;
    list-style: none;
  }

  .nav-right a {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--warm);
    text-decoration: none;
    transition: color 0.2s;
    white-space: nowrap;
  }

  .nav-right a:hover { color: var(--gold); }
  .nav-right a span { text-transform: none; }

  .nav-advisor {
    color: var(--gold) !important;
    border: 1px solid var(--gold-dim);
    padding: 7px 18px;
    border-radius: 2px;
    transition: border-color 0.2s, background 0.2s !important;
  }

  .nav-advisor:hover {
    border-color: var(--gold) !important;
    background: rgba(200,169,110,0.08) !important;
    color: var(--gold2) !important;
  }

  .nav-cta {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: none;
    color: var(--navy) !important;
    background: var(--gold);
    padding: 9px 22px;
    border-radius: 2px;
    transition: background 0.2s !important;
  }

  .nav-cta:hover { background: var(--gold2) !important; color: var(--navy) !important; }

  /* Hamburger button */
  .nav-menu-btn {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 5px;
    width: 36px;
    height: 36px;
    cursor: pointer;
    background: none;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 0;
    transition: border-color 0.2s;
    flex-shrink: 0;
  }

  .nav-menu-btn:hover { border-color: var(--gold-dim); }

  .nav-menu-btn span {
    display: block;
    width: 16px;
    height: 1px;
    background: var(--warm);
    transition: background 0.2s;
    letter-spacing: 0;
    text-transform: none;
    font-size: 0;
  }

  .nav-menu-btn:hover span { background: var(--gold); }

  /* ── DRAWER OVERLAY ── */
  .drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 20, 34, 0.6);
    z-index: 300;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    backdrop-filter: blur(2px);
  }

  .drawer-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  /* ── DRAWER PANEL ── */
  .drawer {
    position: fixed;
    top: 0;
    right: 0;
    width: 320px;
    height: 100vh;
    background: var(--navy2);
    border-left: 1px solid var(--border);
    z-index: 400;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    padding: 0;
    overflow-y: auto;
  }

  .drawer.open {
    transform: translateX(0);
  }

  .drawer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    height: 68px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .drawer-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .drawer-close {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    cursor: pointer;
    background: none;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--warm);
    font-size: 16px;
    line-height: 1;
    transition: border-color 0.2s, color 0.2s;
  }

  .drawer-close:hover { border-color: var(--gold-dim); color: var(--gold); }

  .drawer-nav {
    display: flex;
    flex-direction: column;
    padding: 36px 28px;
    gap: 0;
    flex: 1;
  }

  .drawer-nav a {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--warm);
    text-decoration: none;
    padding: 16px 0;
    border-bottom: 1px solid rgba(42, 63, 88, 0.5);
    transition: color 0.2s, padding-left 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .drawer-nav a span { text-transform: none; }

  .drawer-nav a::before {
    content: '';
    display: block;
    width: 0;
    height: 1px;
    background: var(--gold);
    transition: width 0.2s;
    flex-shrink: 0;
  }

  .drawer-nav a:hover {
    color: var(--gold);
    padding-left: 4px;
  }

  .drawer-nav a:hover::before {
    width: 16px;
  }

  .drawer-nav a:last-child { border-bottom: none; }

    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gray);
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 120px 48px 80px;
    overflow: hidden;
  }

  /* Diagonal grid lines */
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(135deg, rgba(200,169,110,0.04) 1px, transparent 1px),
      linear-gradient(45deg, rgba(200,169,110,0.04) 1px, transparent 1px);
    background-size: 80px 80px;
    pointer-events: none;
  }

  .hero-eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 14px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.2s;
  }

  .hero-eyebrow::before {
    content: '';
    display: block;
    width: 40px;
    height: 1px;
    background: var(--gold);
  }

  .hero-headline {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(48px, 7vw, 88px);
    font-weight: 300;
    line-height: 1.05;
    color: var(--off-white);
    max-width: 820px;
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 0.35s;
  }

  .hero-headline em {
    font-style: italic;
    color: var(--gold);
  }

  .hero-tagline {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(22px, 2.5vw, 30px);
    font-weight: 300;
    font-style: italic;
    color: var(--warm);
    max-width: 680px;
    margin-bottom: 52px;
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 0.5s;
  }

  .hero-actions {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 0.65s;
  }

  .btn-primary {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: none;
    color: var(--navy);
    background: var(--gold);
    padding: 18px 40px;
    border-radius: 2px;
    text-decoration: none;
    transition: background 0.2s, transform 0.15s;
    display: inline-block;
  }

  .btn-primary:hover { background: var(--gold2); transform: translateY(-1px); }

  .btn-secondary {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: none;
    color: var(--gold);
    background: transparent;
    padding: 18px 40px;
    border: 1px solid var(--gold-dim);
    border-radius: 2px;
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s, transform 0.15s;
    display: inline-block;
  }

  .btn-secondary:hover {
    border-color: var(--gold);
    color: var(--gold2);
    transform: translateY(-1px);
  }

  /* Hero scroll indicator */

  @keyframes scrollLine {
    0%, 100% { transform: scaleY(1); opacity: 0.4; }
    50% { transform: scaleY(1.2); opacity: 0.8; }
  }

  /* Hero stat bar */
  .hero-stats {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 0;
    opacity: 0;
    animation: fadeLeft 1s ease forwards 0.8s;
  }

  .hero-stat {
    padding: 28px 36px;
    border-left: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    background: rgba(22, 32, 50, 0.6);
    backdrop-filter: blur(8px);
    text-align: right;
    min-width: 220px;
  }

  .hero-stat:last-child { border-bottom: none; }

  .hero-stat-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 6px;
  }

  .hero-stat-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gray);
  }

  /* ── SECTION SHARED ── */
  section { position: relative; z-index: 1; scroll-margin-top: 68px; }

  .section-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 100px 48px;
  }

  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .section-label::before {
    content: '';
    display: block;
    width: 32px;
    height: 1px;
    background: var(--gold);
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(36px, 4.5vw, 58px);
    font-weight: 300;
    line-height: 1.1;
    color: var(--off-white);
    margin-bottom: 20px;
  }

  .section-title em {
    font-style: italic;
    color: var(--gold);
  }

  .section-body {
    font-size: 17px;
    line-height: 1.85;
    color: var(--warm);
    max-width: 640px;
  }

  /* ── WHAT WE DO (3 PROCESSES) ── */
  .processes-section {
    background: var(--navy2);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  .processes-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    margin-top: 64px;
    border: 1px solid var(--border);
  }

  .process-card {
    padding: 48px 40px;
    border-right: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    transition: background 0.3s;
  }

  .process-card:last-child { border-right: none; }

  .process-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--gold);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
  }

  .process-card:hover { background: var(--navy3); }
  .process-card:hover::before { transform: scaleX(1); }

  .process-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: 72px;
    font-weight: 300;
    color: var(--border);
    line-height: 1;
    margin-bottom: 20px;
    transition: color 0.3s;
  }

  .process-card:hover .process-number { color: var(--gold-dim); }

  .process-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--gold);
    margin-bottom: 6px;
    line-height: 1.2;
  }

  .process-subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 20px;
  }

  .process-desc {
    font-size: 16px;
    line-height: 1.8;
    color: var(--warm);
  }

  .process-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 28px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    text-decoration: none;
    transition: gap 0.2s;
  }

  .process-link:hover { gap: 14px; }
  .process-link::after { content: '→'; }

  /* ── STRUCTURE REVIEW CTA ── */
  .sr-section {
    background: var(--navy3);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  .sr-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 100px 48px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }

  .sr-left {}

  .sr-steps {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-top: 48px;
  }

  .sr-step {
    display: flex;
    gap: 24px;
    padding: 24px 0;
    border-bottom: 1px solid var(--border);
  }

  .sr-step:last-child { border-bottom: none; }

  .sr-step-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 300;
    color: var(--gold-dim);
    line-height: 1;
    flex-shrink: 0;
    width: 32px;
  }

  .sr-step-content {}

  .sr-step-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--off-white);
    margin-bottom: 6px;
  }

  .sr-step-text {
    font-size: 16px;
    line-height: 1.8;
    color: var(--warm);
  }

  .sr-right {
    background: var(--navy2);
    border: 1px solid var(--border);
    padding: 52px 44px;
    position: relative;
  }

  .sr-right::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold-dim));
  }

  .sr-card-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 20px;
  }

  .sr-card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    line-height: 1.15;
    color: var(--off-white);
    margin-bottom: 24px;
  }

  .sr-card-title em {
    font-style: italic;
    color: var(--gold);
  }

  .sr-card-body {
    font-size: 16px;
    line-height: 1.8;
    color: var(--warm);
    margin-bottom: 36px;
  }

  .sr-features {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 40px;
  }

  .sr-feature {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    font-size: 16px;
    color: var(--warm);
  }

  .sr-feature::before {
    content: '—';
    color: var(--gold);
    flex-shrink: 0;
    font-family: 'Cormorant Garamond', serif;
  }

  /* ── ADVISOR / BGA SECTION ── */
  .advisor-section {
    background: var(--navy);
  }

  .advisor-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 100px 48px;
  }

  .advisor-intro {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: start;
    margin-bottom: 80px;
  }

  .advisor-segments {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  .advisor-segment {
    background: var(--navy2);
    padding: 36px 32px;
    transition: background 0.25s;
  }

  .advisor-segment:hover { background: var(--navy3); }

  .advisor-segment-icon {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    color: var(--gold);
    margin-bottom: 14px;
  }

  .advisor-segment-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--off-white);
    margin-bottom: 12px;
  }

  .advisor-segment-text {
    font-size: 13px;
    line-height: 1.65;
    color: var(--warm);
  }

  /* Planning Desk highlight box */
  .planning-desk-box {
    background: var(--navy3);
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold);
    padding: 44px 48px;
    margin-top: 64px;
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 60px;
    align-items: center;
  }

  .planning-desk-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 300;
    line-height: 1.1;
    color: var(--off-white);
  }

  .planning-desk-label em {
    display: block;
    font-style: italic;
    color: var(--gold);
    font-size: 28px;
    margin-top: 4px;
  }

  .planning-desk-body {
    font-size: 14px;
    line-height: 1.75;
    color: var(--warm);
  }

  /* ── BOOK TEASER ── */
  .book-section {
    background: var(--navy2);
    border-top: 1px solid var(--border);
  }

  .book-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 80px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 60px;
  }

  .book-text { flex: 1; }

  .book-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--navy);
    background: var(--gold);
    padding: 4px 12px;
    display: inline-block;
    margin-bottom: 20px;
  }

  .book-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(28px, 3vw, 42px);
    font-weight: 300;
    line-height: 1.15;
    color: var(--off-white);
    margin-bottom: 16px;
  }

  .book-title em { font-style: italic; color: var(--gold); }

  .book-body {
    font-size: 16px;
    line-height: 1.8;
    color: var(--warm);
    max-width: 520px;
  }

  .book-cta {
    margin-top: 28px;
  }

  /* ── FOOTER ── */
  footer {
    background: var(--navy2);
    border-top: 1px solid var(--border);
    padding: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 32px;
    flex-wrap: wrap;
  }

  .footer-logo {
    font-family: 'Cormorant Garamond', serif;

    height: 100vh;
    background: var(--navy2);
    border-left: 1px solid var(--border);

function calcAge(dob) {
  if (!dob) return null;
  const today = new Date(), birth = new Date(dob);
  if (isNaN(birth)) return null;
  let age = today.getFullYear() - birth.getFullYear();
  const m = today.getMonth() - birth.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
  return age;
}

function formatDOB(dob) {
  if (!dob) return "";
  const d = new Date(dob);
  if (isNaN(d)) return dob;
  return d.toLocaleDateString("en-US", { month:"long", day:"numeric", year:"numeric" });
}

function netWorthWarrantsEstate(nw) {
  return ["nw_2_5m","nw_5_10m","nw_10_20m","nw_over20m"].includes(nw);

function buildSequence(answers) {
  const seq = [];
  const emp = answers.employment, asset = answers.primary_asset,
        event = answers.event_horizon, nw = answers.net_worth;

  // All universal questions (event_horizon is now last among universals)
  seq.push(...QUESTIONS.filter(q => q.phase === "universal"));

  // LE questions immediately follow since event_horizon is the last universal question
  if (event==="business_sale"||event==="real_estate_sale"||event==="equity_event"||emp==="transitioning"||asset==="real_estate")
    seq.push(...QUESTIONS.filter(q=>q.phase==="le"));

  if (asset==="qp"||asset==="mixed"||emp==="w2"||emp==="retired")
    seq.push(...QUESTIONS.filter(q=>q.phase==="qp"));
  if (emp==="business_owner"||emp==="transitioning"||asset==="business")
    seq.push(...QUESTIONS.filter(q=>q.phase==="business"));

  // If they're a business owner heading into a sale, le_type is redundant — we already know
  // the event type. Skip it and pre-populate via the report generator.
  const bizSaleRedundant = (emp==="business_owner"||asset==="business") && event==="business_sale";

  const qpBig=["2m_5m","over5m"].includes(answers.qp_balance);
  const leBig=["le_500_1m","le_over1m"].includes(answers.le_size);
  if (netWorthWarrantsEstate(nw)||qpBig||leBig||emp==="business_owner")
    seq.push(...QUESTIONS.filter(q=>q.phase==="estate"));

  seq.push(...QUESTIONS.filter(q=>q.phase==="income"));
  seq.push(...QUESTIONS.filter(q=>q.phase==="motivations"));
  seq.push(...QUESTIONS.filter(q=>q.phase==="lifestyle"));
  seq.push(...QUESTIONS.filter(q=>q.phase==="wrap"));

  // Skip concern_spouse if single/widowed
  const skipSpouse = answers.marital==="single"||answers.marital==="widowed";
  // Skip retire_age if already retired
  const skipRetire = answers.employment==="retired";
  // Skip name follow-ups if they don't have that advisor type
  const skipCpaName      = answers.has_cpa      !== "cpa_yes";
  const skipAdvisorName  = answers.has_advisor   !== "adv_yes";
  const skipAttorneyName = answers.has_attorney  !== "att_yes";
  // Skip referring advisor name if not referred by advisor
  const skipReferralName = answers.how_heard !== "hh_advisor";

  // If advisor came via URL param (?a=), skip how_heard and referring_advisor_name
  const hasAdvisorParam = !!(new URLSearchParams(window.location.search).get('a'));
  const skipHowHeard = hasAdvisorParam;
  // Skip partner/buy-sell questions if no partners
  const skipPartners    = answers.biz_has_partners !== "bhp_yes";
  // Skip buy-sell funding if no buy-sell in place
  const skipBuySellFund = answers.biz_buysell !== "bbs_yes";

  // Skip all QP questions after has_qp if they selected "none"
  const hasQPAnswered = Array.isArray(answers.has_qp) && answers.has_qp.length > 0;
  const skipQP = hasQPAnswered && answers.has_qp.includes("hqp_none");
  // Skip Roth pct question if they didn't select a Roth account type
  const skipRothPct = !Array.isArray(answers.has_qp) || !answers.has_qp.some(x => x==="hqp_roth");

  const seen = new Set();
  return seq.filter(q => {
    if (q.condition && !q.condition(answers)) return false;
    if (seen.has(q.id)) return false;
    if (q.phase==="qp" && q.id!=="has_qp" && !q.id.startsWith("inherited_qp") && q.id!=="has_inherited_qp" && skipQP) return false;
    if (q.id==="qp_roth_pct" && skipRothPct) return false;
    if (q.id==="concern_spouse"         && skipSpouse)       return false;
    if ((q.id==="spouse_first_name"||q.id==="spouse_last_name"||q.id==="spouse_dob"||q.id==="spouse_health"||q.id==="anniversary"||q.id==="spouse_bio_sex"||q.id==="spouse_employment"||q.id==="spouse_business"||q.id==="spouse_income"||q.id==="spouse_retirement_plan") && skipSpouse) return false;
    if (q.id==="retire_age"             && skipRetire)       return false;
    if (q.id==="cpa_name"               && skipCpaName)      return false;
    if (q.id==="advisor_name"           && skipAdvisorName)  return false;
    if (q.id==="attorney_name"          && skipAttorneyName) return false;
    if (q.id==="referring_advisor_name" && skipReferralName) return false;
    if ((q.id==="how_heard" || q.id==="referring_advisor_name") && skipHowHeard) return false;
    if ((q.id==="biz_partner_count"||q.id==="biz_buysell"||q.id==="biz_buysell_funding") && skipPartners) return false;
    if (q.id==="le_type" && bizSaleRedundant) return false;
    // Skip minor/adult children questions if no children
  const skipChildrenFollowUp = answers.children_count === "ch_none";
  // Skip adult_children_count if all children are minors (count matches)
  const allMinors =
    (answers.children_count === "ch_1" && answers.minor_children_count === "mc_1") ||
    (answers.children_count === "ch_2" && answers.minor_children_count === "mc_2") ||
    (answers.children_count === "ch_3" && answers.minor_children_count === "mc_3plus") ||
    (answers.children_count === "ch_4plus" && answers.minor_children_count === "mc_3plus") ||
    answers.minor_children_count === "mc_none"; // none are minors → adult_children still needed, but skip if all are minors

  // Actually: skip adult_children_count if minors == total children count
  const skipAdultChildren =
    skipChildrenFollowUp ||
    (answers.children_count === "ch_1" && answers.minor_children_count === "mc_1") ||
    (answers.children_count === "ch_2" && answers.minor_children_count === "mc_2") ||
    (answers.children_count === "ch_3" && answers.minor_children_count === "mc_3plus") ||
    (answers.children_count === "ch_4plus" && answers.minor_children_count === "mc_3plus");

  // Skip biz_retirement_plan if they already have a DB/cash balance plan — nothing to upgrade to
    const hasDB  = Array.isArray(answers.has_qp) && answers.has_qp.includes("hqp_db");
    // Skip if no qualified accounts at all — not relevant
    const hasNoQP = Array.isArray(answers.has_qp) && answers.has_qp.length===1 && answers.has_qp.includes("hqp_none");
    // Skip if only personal IRA/Roth (no employer plan indicated) — business plan question
    // is still relevant since they may have no plan at the business level
    if (q.id==="biz_retirement_plan" && (hasDB || hasNoQP)) return false;
    if (q.id==="biz_buysell_funding"    && skipBuySellFund)  return false;
    if ((q.id==="minor_children_count"||q.id==="adult_children_count") && skipChildrenFollowUp) return false;
    if (q.id==="adult_children_count" && skipAdultChildren) return false;
    seen.add(q.id); return true;
  });
}

function generateReport(answers) {
  const flags=[], tracks=[];
  const firstName=answers.first_name||"", lastName=answers.last_name||"";
  const name=[firstName,lastName].filter(Boolean).join(" ");
  const age=calcAge(answers.dob);
  const retireAge=parseInt(answers.retire_age)||null;
  const yearsToRetire=(age!==null&&retireAge!==null&&retireAge>age)?retireAge-age:null;

  if (answers.qp_balance&&answers.qp_balance!=="under500k") {
    tracks.push("qp");
    if (answers.rmd_status === "rmd_no" || answers.rmd_status === "rmd_partial")
      flags.push({priority:"high",track:"IncomeArc™ QP",text:"RMDs are active or imminent — repositioning window is open now. A tax-free income structure via Roth FIA and ETA IUL should be modeled immediately."});
    else
      flags.push({priority:"medium",track:"IncomeArc™ QP",text:"Qualified plan balance warrants IncomeArc™ QP analysis. Pre-RMD window offers maximum repositioning flexibility."});
    if (["qp_children","qp_mixed"].includes(answers.qp_beneficiary))
      flags.push({priority:"medium",track:"Estate / SECURE Act",text:"Non-spouse beneficiaries are inheriting a qualified account. SECURE Act 10-year rule creates a compressed, taxable distribution problem that IncomeArc™ QP addresses directly."});
  }
  if (answers.le_size&&answers.le_size!=="le_under100") {
    tracks.push("le");
    if (answers.le_timing==="le_open"||answers.le_timing==="le_soon")
      flags.push({priority:"high",track:"IncomeArc™ LE",text:"Transaction has not closed — full ETA structuring window is open. Time-sensitive: the bank financing structure must be in place before closing."});
    else
      flags.push({priority:"medium",track:"IncomeArc™ LE",text:"Transaction has closed. Discuss NQ annuity structuring, living benefits, and taxable brokerage optimization for the net proceeds."});
  }
  if (answers.biz_priorities) {
    tracks.push("business");
    if (answers.biz_priorities.includes("bp_reduce_tax")||["brp_none","brp_sep_simple"].includes(answers.biz_retirement_plan))
      flags.push({priority:"high",track:"Defined Benefit / Cash Balance",text:"Business owner with tax reduction priority and no advanced retirement plan. A defined benefit or cash balance plan could deliver $100,000–$300,000+ in annual deductions."});
    if (answers.biz_priorities.includes("bp_keyman")||answers.biz_priorities.includes("bp_buysell"))
      flags.push({priority:"medium",track:"Business Protection",text:"Buy-sell funding and/or key person coverage identified as priorities. Review life and disability insurance structures."});
    if (answers.biz_priorities.includes("bp_exit"))
      flags.push({priority:"medium",track:"Exit Planning",text:"Business exit is on the horizon. Coordinate with LE track — ETA bank financing may be applicable to sale proceeds."});
  }
  if (netWorthWarrantsEstate(answers.net_worth)) {
    tracks.push("estate");
    if (["nw_10_20m","nw_over20m"].includes(answers.net_worth))
      flags.push({priority:"high",track:"Estate Planning",text:"Net worth level indicates meaningful federal estate tax exposure. ILIT, survivorship coverage, and charitable strategies should be reviewed."});
    else
      flags.push({priority:"medium",track:"Estate Planning",text:"Net worth warrants estate planning review. State-level estate taxes may apply at lower thresholds than federal. Coordinate with estate planning counsel."});
  }
  if (["ep_yes_old","ep_basic","ep_no"].includes(answers.estate_plan))
    flags.push({priority:"medium",track:"Estate Documents",text:"Estate plan is outdated, incomplete, or nonexistent. Referral to estate planning counsel recommended before implementing any multi-layer structure."});
  if (["cp_none","cp_self"].includes(answers.care_plan))
    flags.push({priority:"medium",track:"Healthcare Insulation",text:"No dedicated long-term care plan in place. Layer 2 living benefits IUL addresses care costs without portfolio liquidation."});
  if (["ig_no","ig_partial","ig_unknown"].includes(answers.income_gap))
    flags.push({priority:"medium",track:"Guaranteed Income Floor",text:"Retirement income lacks a contractual guaranteed floor. Layer 1 FIA with GLWB provides income that cannot be outlived and cannot decline regardless of market performance."});
  if (answers.life_insurance==="li_none")
    flags.push({priority:"medium",track:"Life Insurance Gap",text:"No life insurance in place. Depending on estate goals, family situation, and business needs, this may represent a meaningful gap."});

  // Motivation-driven flags
  if (answers.concern_tax_burden==="ct_new"||answers.concern_tax_burden==="ct_somewhat")
    flags.push({priority:"medium",track:"Tax Awareness",text:"Client indicated the deferred tax burden on retirement accounts was not fully on their radar. The RMD tax conversation should be a centerpiece of the StructureReview™."});
  if (answers.concern_care_cost==="cc_portfolio"||answers.concern_care_cost==="cc_unknown")
    flags.push({priority:"medium",track:"Care Cost Exposure",text:"No dedicated care funding plan. Client acknowledged portfolio or unknown as the fallback — reinforcing the Layer 2 living benefits conversation."});
  if (answers.concern_market_seq==="cm_no"||answers.concern_market_seq==="cm_unknown")
    flags.push({priority:"medium",track:"Sequence of Returns Risk",text:"Client has no contractual income protection against early-retirement market loss. Sequence of returns risk conversation is warranted — Layer 1 FIA directly addresses this."});
  if (answers.concern_spouse==="cs_no"||answers.concern_spouse==="cs_unsure")
    flags.push({priority:"medium",track:"Survivor Protection Gap",text:"Client indicated spouse would not be fully provided for. Survivor income planning, life insurance review, and beneficiary structure should be addressed."});
  if (yearsToRetire!==null&&yearsToRetire<=5)
    flags.push({priority:"high",track:"Retirement Timeline",text:`Client targets retirement at age ${retireAge} — approximately ${yearsToRetire} year${yearsToRetire===1?"":"s"} away. Planning window is short. Time-sensitive strategies should be prioritized immediately.`});

  flags.sort((a,b)=>a.priority==="high"?-1:1);
  return {flags,tracks:[...new Set(tracks)],name,firstName,age,retireAge,yearsToRetire};
}

function calcYearsMarried(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr + 'T12:00:00');
  if (isNaN(d)) return null;
  const today = new Date();
  let years = today.getFullYear() - d.getFullYear();
  const notYet = today.getMonth() < d.getMonth() || (today.getMonth() === d.getMonth() && today.getDate() < d.getDate());
  if (notYet) years--;
  return years >= 0 ? years : null;
}

            <div style={{fontSize:9,color:"#6E8299",letterSpacing:".08em",textTransform:"none"}}>
              {isMotivation ? <span style={{color:"rgba(200,169,110,.7)"}}>Goals & Concerns</span> : "StructureReview™"}
            </div>
          </div>
          
        </div>
        <div style={{marginBottom:4}}>
          <div style={{display:"flex",justifyContent:"flex-end",marginBottom:5}}>
            <span style={{fontSize:10,color:"#6E8299"}}>{pct}%</span>
          </div>
          <div style={{height:3,background:"rgba(255,255,255,.07)",borderRadius:2}}>
            <div style={{height:"100%",width:`${pct}%`,background:"linear-gradient(90deg,#C8A96E,#E0C080)",borderRadius:2,transition:"width .4s ease"}}/>
          </div>
        </div>
      </div>

      {/* Body */}
      <div style={{flex:1,padding:"20px 20px 0",overflowY:"auto",WebkitOverflowScrolling:"touch"}}>

        {/* Anchor fact block if present */}
        {question.anchor&&<AnchorFact text={question.anchor}/>}

        <div style={{animation:"fadeUp .32s ease both"}}>
          <h2 data-qid={question.id} style={{fontFamily:"'Cormorant Garamond',serif",fontSize:question.anchor?20:24,fontWeight:400,lineHeight:1.38,color:"#F5F2EC",marginBottom:20}}>
            {question.shortQ||question.q}
          </h2>
        </div>

        {question.type==="single"&&question.options.map((o,i)=>
          <ChoiceBtn key={o.id} label={o.label} selected={answer===o.id} index={i} onClick={()=>{onAnswer(o.id);setTimeout(()=>continueRef.current&&continueRef.current.scrollIntoView({behavior:'smooth',block:'nearest'}),80);}}/>
        )}
        {question.type==="multi"&&<>
          <p style={{fontSize:11,color:"#6E8299",marginBottom:10,fontWeight:500}}>Select all that apply</p>
          {question.options.map((o,i)=>
            <ChoiceBtn key={o.id} label={o.label} selected={multiSel.includes(o.id)} index={i} onClick={()=>{toggleMulti(o.id);if(multiSel.length===0)setTimeout(()=>continueRef.current&&continueRef.current.scrollIntoView({behavior:'smooth',block:'nearest'}),80);}}/>
          )}
        </>}
        {(question.type==="text"||question.type==="email")&&(
          <div style={{animation:"fadeUp .3s ease .08s both"}}>
            <input ref={inputRef} type={question.type==="email"?"email":"text"} value={textVal} placeholder={question.placeholder}
              onChange={e=>{setTextVal(e.target.value);onAnswer(e.target.value);}}
              onKeyDown={e=>e.key==="Enter"&&canContinue&&onNext()}
              style={{width:"100%",padding:"15px 16px",background:"rgba(255,255,255,.05)",border:`1px solid ${question.type==="email"&&textVal.length>3&&!isValidEmail(textVal)?"rgba(196,122,122,.6)":"rgba(255,255,255,.12)"}`,borderRadius:10,color:"#F5F2EC",fontSize:15,outline:"none"}}/>
            {question.type==="email"&&textVal.length>3&&!isValidEmail(textVal)&&(
              <p style={{fontSize:11,color:"#C47A7A",marginTop:7}}>Please enter a valid email — example@domain.com</p>
            )}
          </div>
        )}
        {question.type==="date"&&<DateInput value={answer} onChange={onAnswer} dateDisplay={question.dateDisplay}/>}
        {question.type==="number"&&<NumberInput value={answer} onChange={onAnswer} placeholder={question.placeholder} onNext={onNext}/>}
        {question.type==="select"&&(
          <div style={{animation:"fadeUp .3s ease .08s both",position:"relative"}}>
            <select value={answer||""} onChange={e=>onAnswer(e.target.value)}
              style={{width:"100%",padding:"15px 16px",background:"#162032",border:"1px solid rgba(255,255,255,.12)",borderRadius:10,color:answer?"#F5F2EC":"#6E8299",fontSize:15,outline:"none",colorScheme:"dark",appearance:"none",paddingRight:40}}>
              <option value="" disabled>Select your state...</option>
              {question.options.map(o=><option key={o.id} value={o.id}>{o.label}</option>)}
            </select>
            <span style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",color:"#6E8299",fontSize:12,pointerEvents:"none"}}>▾</span>
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{padding:"16px 20px 24px",flexShrink:0,paddingBottom:"max(24px, env(safe-area-inset-bottom, 24px))"}}>
        {question.why&&(
          <button onClick={()=>setShowWhy(true)} style={{display:"flex",alignItems:"center",gap:7,marginBottom:12,color:"#6E8299",fontSize:12,fontWeight:500}}>
            <span style={{width:17,height:17,borderRadius:"50%",border:"1px solid #4A6070",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#6E8299"}}>?</span>
            Why are we asking this?
          </button>
        )}
        <div style={{display:"flex",gap:10,alignItems:"stretch"}}>
          {stepNum>1&&(
            <button onClick={onBack} style={{
              padding:"15px 20px",borderRadius:11,fontSize:14,fontWeight:600,
              background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",
              color:"#6E8299",flexShrink:0,display:"flex",alignItems:"center",gap:6
            }}>← Back</button>
          )}
          <button ref={continueRef} onClick={()=>{if(question.type==="text"||question.type==="number")onAnswer(textVal||answer);onNext();}} disabled={!canContinue} style={{
            flex:1,padding:"15px",borderRadius:11,fontSize:14,fontWeight:700,letterSpacing:".03em",
            background:canContinue?"#C8A96E":"rgba(255,255,255,.06)",
            color:canContinue?"#0E1824":"#3A5268",
            transition:"all .18s ease",
          }}>{stepNum===totalSteps?"Complete Review →":"Continue →"}</button>
        </div>
      </div>
      {showWhy&&<WhyCard text={question.why} onClose={()=>setShowWhy(false)}/>}
    </div>
  );
}

    const onMessage = (e) => {
      try {
        const data = typeof e.data === "string" ? JSON.parse(e.data) : e.data;
        if (data && data.event === "finish") {
          setVideoEnded(true);

            <div style={{marginBottom:20,padding:"14px 16px",background:"rgba(200,169,110,.05)",border:"1px solid rgba(200,169,110,.15)",borderRadius:8}}>
              <div style={{fontSize:9,fontWeight:700,letterSpacing:".16em",textTransform:"uppercase",color:"#C8A96E",marginBottom:10}}>Client Motivation Snapshot</div>
              {motivSummary.map((m,i)=>(
                <div key={i} style={{display:"grid",gridTemplateColumns:"140px 1fr",gap:10,padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,.05)"}}>
                  <span style={{fontSize:11,color:"#6E8299"}}>{m.label}</span>
                  <span style={{fontSize:11,color:"#F5F2EC",fontWeight:500,fontStyle:m.label==="Retirement vision"?"italic":"normal"}}>{m.val}</span>
                </div>
              ))}
            </div>
          )}

          <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,color:"#F5F2EC",marginBottom:12,borderBottom:"1px solid rgba(255,255,255,.07)",paddingBottom:7}}>Planning Flags &amp; Priorities</h2>
          {report.flags.length===0&&<p style={{fontSize:13,color:"#6E8299",marginBottom:20}}>No specific flags generated.</p>}
          {report.flags.map((f,i)=>(
            <div key={i} style={{display:"flex",gap:14,marginBottom:9,padding:"11px 13px",background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.06)",borderLeft:`3px solid ${pColor[f.priority]||"#6E8299"}`,borderRadius:"0 6px 6px 0"}}>
              <div style={{minWidth:82}}>
                <div style={{fontSize:8,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:pColor[f.priority]||"#6E8299"}}>{pLabel[f.priority]||"Note"}</div>
                <div style={{fontSize:9,color:"#6E8299",marginTop:2}}>{f.track}</div>
              </div>
              <p style={{fontSize:12,lineHeight:1.6,color:"#C8BFA8",fontWeight:300}}>{f.text}</p>
            </div>
          ))}

          <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,color:"#F5F2EC",marginBottom:12,borderBottom:"1px solid rgba(255,255,255,.07)",paddingBottom:7,marginTop:22}}>Full Response Summary</h2>
          {phases.map(phase=>{
            const qs=Object.entries(answers).filter(([k])=>qMap[k]&&qMap[k].phase===phase.id);
            if(qs.length===0)return null;
            return(
              <div key={phase.id} style={{marginBottom:16}}>
                <div style={{fontSize:9,fontWeight:700,letterSpacing:".16em",textTransform:"uppercase",color:"#C8A96E",marginBottom:7}}>{phase.label}</div>
                {qs.map(([k,v])=>(
                  <div key={k} style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,.05)"}}>
                    <span style={{fontSize:11,color:"#6E8299",lineHeight:1.45}}>{qMap[k].shortQ||qMap[k].q}</span>
                    <span style={{fontSize:11,color:"#F5F2EC",fontWeight:500,lineHeight:1.45}}>{fmt(qMap[k],v)}</span>
                  </div>
                ))}
              </div>
            );
          })}

          <div style={{marginTop:20,padding:"15px 17px",background:"rgba(200,169,110,.06)",border:"1px solid rgba(200,169,110,.18)",borderRadius:8}}>
            <div style={{fontSize:9,fontWeight:700,letterSpacing:".16em",textTransform:"uppercase",color:"#C8A96E",marginBottom:10}}>Recommended Next Steps</div>
            {[
              "Schedule StructureReview™ conversation — 30–45 min, client and advisor present",
              report.tracks.includes("qp")&&"Request QP ETA illustration — RMD projection, MAGI model, Roth FIA sizing",
              report.tracks.includes("le")&&answers.le_timing!=="le_closed"&&"Initiate LE ETA bank facility — must be structured before closing",
              report.tracks.includes("business")&&["brp_none","brp_sep_simple"].includes(answers.biz_retirement_plan)&&"Model defined benefit / cash balance plan — potential $100K–$300K+ annual deduction",
              report.tracks.includes("estate")&&"Coordinate with estate planning attorney on beneficiary structure and estate tax exposure",
              ["cp_none","cp_self"].includes(answers.care_plan)&&"Initiate Layer 2 living benefits underwriting — health-dependent, start early",
              report.yearsToRetire!==null&&report.yearsToRetire<=5&&`Retirement in ${report.yearsToRetire} year${report.yearsToRetire===1?"":"s"} — prioritize time-sensitive structures immediately`,
            ].filter(Boolean).map((s,i)=>(
              <div key={i} style={{display:"flex",gap:9,marginBottom:7,alignItems:"start"}}>
                <div style={{width:17,height:17,borderRadius:"50%",background:"rgba(200,169,110,.14)",border:"1px solid rgba(200,169,110,.28)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:700,color:"#C8A96E",flexShrink:0,marginTop:1}}>{i+1}</div>
                <p style={{fontSize:12,lineHeight:1.55,color:"#C8BFA8",fontWeight:300}}>{s}</p>
              </div>
            ))}
          </div>

          <a href="#" onClick={(e)=>{
              e.preventDefault();
              // Build supplement URL with client_id and sr_id
              const params = new URLSearchParams();
              if(report.clientId) params.set('client_id', report.clientId);
              if(report.srId) params.set('sr_id', report.srId);
              window.open('https://www.integratedplanningpartners.com/allocation-supplement.html?' + params.toString(), '_blank');
            }} style={{display:"block",width:"100%",marginTop:16,padding:"14px",background:"linear-gradient(135deg,#C8A96E,#E0C080)",color:"#0B1220",borderRadius:10,fontSize:13,fontWeight:700,letterSpacing:".04em",textAlign:"center",textDecoration:"none",boxSizing:"border-box"}}>
              Begin Allocation Supplement →
            </a>
            <button onClick={onBack} style={{width:"100%",marginTop:10,padding:"13px",background:"rgba(255,255,255,.04)",color:"#6E8299",borderRadius:10,fontSize:12,border:"1px solid rgba(255,255,255,.07)"}}>← Start Over</button>
          <p style={{fontSize:10,color:"#1A3050",lineHeight:1.5,marginTop:16,marginBottom:8}}>Advisor brief — not for client distribution. IncomeArc™, IncomeArchitect™ Modeler, and StructureReview™ are trademarks of Integrated Planning Partners. © 2026.</p>
        </div>
      </div>
    </div>
  );
}

// ── Main ──
function App() {
  const [view,setView]=useState("welcome");
  const [advisorId,setAdvisorId]=useState(null);
  const [advisorCode,setAdvisorCode]=useState(null);

  // Read ?a= URL param and resolve advisor on mount
  React.useEffect(()=>{
    const params = new URLSearchParams(window.location.search);
    const code = params.get('a');
    if(code){
      setAdvisorCode(code);
      // Look up advisor_id from Supabase
      const SB_URL='https://piixgvxrasddphklgazh.supabase.co';
      const SB_KEY='sb_publishable_acvdk0hBniaB6qOD8_k8XQ_9R6FNbP_';
      fetch(SB_URL+'/rest/v1/advisor_profiles?advisor_code=eq.'+encodeURIComponent(code)+'&select=id,first_name,last_name&limit=1',{
        headers:{'apikey':SB_KEY,'Accept':'application/json'}
      })
      .then(r=>r.json())
      .then(data=>{ if(data&&data[0]) setAdvisorId(data[0].id); })
      .catch(()=>{});
    }
  },[]);
  const [answers,setAnswers]=useState({});
  const [sequence,setSequence]=useState([]);
  const [step,setStep]=useState(0);
  const [report,setReport]=useState(null);

  useEffect(()=>{
    const s=document.createElement("style");s.textContent=GS;document.head.appendChild(s);
    return()=>document.head.removeChild(s);
  },[]);

  const start=()=>{setSequence(buildSequence({}));setStep(0);setAnswers({});setView("flow");};
  const currentQ=sequence[step];

  const handleAnswer=val=>{
    let na={...answers,[currentQ.id]:val};

    // When marital status changes to single/divorced/widowed, clear any spouse-dependent answers
    if(currentQ.id==='marital' && ['single','divorced','widowed'].includes(val)){
      if(['qp_spouse','qp_mixed'].includes(na.qp_beneficiary)) delete na.qp_beneficiary;
      if(Array.isArray(na.estate_concern)) na.estate_concern=na.estate_concern.filter(x=>x!=='ec_survivor');
    }
    // When children_count changes to none, clear any children-dependent answers
    if(currentQ.id==='children_count' && val==='ch_none'){
      if(['qp_children','qp_mixed'].includes(na.qp_beneficiary)) delete na.qp_beneficiary;
      if(Array.isArray(na.estate_concern)) na.estate_concern=na.estate_concern.filter(x=>x!=='ec_equalize');
    }

    setAnswers(na);
    // Rebuild sequence on universal questions AND any question that gates a conditional branch
    const rebuildTriggers = ["universal","has_qp","has_inherited_qp","biz_has_partners","biz_buysell","biz_retirement_plan"];
    if(currentQ.phase==="universal" || rebuildTriggers.includes(currentQ.id)) {
      const newSeq = buildSequence(na);
      setSequence(newSeq);
      // Keep step pointing at the same question ID in the new sequence
      const newIdx = newSeq.findIndex(q => q.id === currentQ.id);
      if (newIdx !== -1 && newIdx !== step) setStep(newIdx);
    }
  };

  const next=()=>{
    if(step>=sequence.length-1){const r=generateReport(answers);setReport(r);setView("complete");}
    else setStep(s=>s+1);
  };

  if(view==="welcome") return (<WelcomeScreen onStart={start}/>);
  if(view==="complete") return (<CompletionScreen onReport={()=>setView("report")} onAdvisor={()=>setView("advisor")} answers={answers} report={report} advisorId={advisorId} advisorCode={advisorCode}/>);
  if(view==="report") return (<ClientReport answers={answers} report={report} onBack={start}/>);
  if(view==="advisor") return (<AdvisorBrief answers={answers} report={report} onBack={start}/>);
  if(view==="flow"&&currentQ)return(
    <QuestionScreen question={currentQ} answer={answers[currentQ.id]} onAnswer={handleAnswer} onNext={next} onBack={()=>step>0&&setStep(s=>s-1)} stepNum={step+1} totalSteps={sequence.length||1} allAnswers={answers}/>
  );
  return null;
}

ReactDOM.render(<App/>, document.getElementById('root'));c
